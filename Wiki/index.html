    .sidebar-header { padding: var(--space-32) var(--space-24) var(--space-24); }
    .brand { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; color: var(--color-text-main); margin-bottom: var(--space-24); cursor: pointer; }

    .search-box {

    }
    .search-box:focus { border-color: var(--color-text-muted); outline: none; }
    
    .tree { flex: 1; overflow-y: auto; padding: 0 var(--space-16) var(--space-24); }
    .tree::-webkit-scrollbar { width: 4px; }
    .tree::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .nav-group-title {
        font-size: 11px; font-weight: 700; color: var(--color-text-muted);
        text-transform: uppercase; letter-spacing: 0.1em; margin: var(--space-24) 0 var(--space-8);
        padding-left: var(--space-8); cursor: pointer; user-select: none;
    }
    .nav-group-title:hover { color: var(--color-text-main); }
    .nav-group-title::before { content: "▾ "; }

        color: var(--color-text-muted); cursor: pointer; border-radius: var(--radius-sm);

    .article-body table { width: 100%; border-collapse: collapse; margin-bottom: var(--space-32); font-size: 14px; }
    .article-body th, .article-body td { border-bottom: 1px solid var(--color-border); padding: var(--space-16) var(--space-8); text-align: left; }
    .article-body th { font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; }
    
    .article-body hr { border: none; border-top: 1px solid var(--color-border); margin: var(--space-32) 0; }

    .search-result-desc { font-size: 14px; color: var(--color-text-muted); }
    .search-match { background: rgba(0,0,0,0.1); padding: 0 4px; border-radius: 2px; color: var(--color-text-main); font-weight: 600; }

</style>

const bodyHtml = {"Hot Cache": "<h1>Hot Cache</h1>\n<p>A ~500-word summary of the most recent context in the wiki vault. Stored in <code>wiki/hot.md</code>. Updated at the end of every session and after every significant ingest or query.</p>\n<p>The hot cache exists to answer one question: \"where did we leave off?\" A new session reads <code>hot.md</code> first. If the answer is there, it skips crawling the rest of the wiki.</p>\n<hr>\n<h2>What It Stores</h2>\n<ul><li>What was most recently ingested or discussed</li><li>Key recent facts and takeaways</li><li>Pages recently created or updated</li><li>Active threads and open questions</li><li>What the user is currently focused on</li></ul>\n<hr>\n<h2>Format</h2>\n<pre><code>---\ntype: meta\ntitle: \"Hot Cache\"\nupdated: YYYY-MM-DDTHH:MM:SS\n---\n\n# Recent Context\n\n## Last Updated\nYYYY-MM-DD — [what happened]\n\n## Key Recent Facts\n- [Most important recent takeaway]\n- [Second]\n\n## Recent Changes\n- Created: new wiki pages from this ingest\n- Updated: existing pages with new connections\n- Flagged: contradictions between sources where found\n\n## Active Threads\n- User is researching [topic]\n- Open question: [thing being investigated]</code></pre>\n<hr>\n<h2>Rules</h2>\n<ul><li>Keep it under 500 words. It is a cache, not a journal.</li><li>Overwrite it completely each time. Not append-only.</li><li>One file. Not split by date.</li><li>Updated after every ingest, significant query, and at the end of each session.</li></ul>\n<hr>\n<h2>Why It Matters</h2>\n<p>Without the hot cache, every session starts cold: read the index (1000 tokens), read several domain sub-indexes, read several individual pages. With the hot cache, the first 500 tokens often have everything needed.</p>\n<p>In practice, adding <code>hot.md</code> to an executive assistant vault dramatically reduces the token cost of session startup compared to crawling multiple wiki pages.</p>\n<p>The hot cache is especially valuable in cross-project setups: another Claude Code project can point at this vault and read <code>hot.md</code> first to get recent context at minimal token cost.</p>\n<hr>\n<h2>Connections</h2>\n<p>The hot cache is part of the <a href=\"#\" class=\"wiki-link\" data-name=\"LLM Wiki Pattern\">LLM Wiki Pattern</a> token discipline strategy. See <a href=\"#\" class=\"wiki-link\" data-name=\"index\">index</a> for how the broader navigation works.</p>", "Ollama": "<h1>Ollama</h1>\n<p>Ollama is a local LLM runner that simplifies running open-source models on personal hardware. It provides both a native API and compatibility layers for Anthropic and OpenAI protocols.</p>\n<h2>Core Features</h2>\n<ul><li><strong>Model Management</strong>: <code>ollama pull/run/rm/ls/ps/stop</code> for model lifecycle</li><li><strong>Custom Models</strong>: Modelfile with FROM (base/GGUF/safetensors), PARAMETER, TEMPLATE, SYSTEM instructions</li><li><strong>API Compatibility</strong>: Anthropic-compatible (<code>/v1/messages</code>) and OpenAI-compatible (<code>/v1/chat/completions</code>)</li><li><strong>Integration Launch</strong>: <code>ollama launch claude</code> for one-click Claude Code connection</li><li><strong>Thinking Mode</strong>: Supported for Qwen3, DeepSeek R1, GPT-OSS models</li></ul>\n<h2>Key Configuration</h2>\n<table><thead><tr><th>Feature</th><th>Variable / Parameter</th></tr></thead><tbody><tr><td>Context window</td><td>`num_ctx` (default 4096) or `OLLAMA_CONTEXT_LENGTH`</td></tr><tr><td>Flash attention</td><td>`OLLAMA_FLASH_ATTENTION=1`</td></tr><tr><td>KV cache quantization</td><td>`OLLAMA_KV_CACHE_TYPE=q8_0` (recommended)</td></tr><tr><td>Keep model in memory</td><td>`keep_alive=-1`</td></tr><tr><td>Concurrent requests</td><td>`OLLAMA_NUM_PARALLEL` (default 1)</td></tr></tbody></table>\n<h2>Anthropic Compatible API</h2>\n<p>Connect to Claudian / Claude Code:</p>\n<pre><code>export ANTHROPIC_AUTH_TOKEN=ollama\nexport ANTHROPIC_BASE_URL=http://localhost:11434\n# No /v1 suffix for Anthropic endpoint</code></pre>\n<h2>Recommended Cloud Models via Ollama</h2>\n<ul><li><code>kimi-k2.5:cloud</code> — best overall</li><li><code>glm-5:cloud</code> — strong alternative</li><li><code>minimax-m2.7:cloud</code> — solid performer</li><li><code>qwen3.5:cloud</code> — available</li></ul>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"Local LLM Deployment\">Local LLM Deployment</a> — parent concept covering all local LLM tools</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Claude Code Local Setup\">Claude Code Local Setup</a> — how to connect Claude Code to various local runtimes</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Anthropic Compatible API\">Anthropic Compatible API</a> — the protocol standard used for connection</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"LM Studio\">LM Studio</a> — alternative local LLM runner with GUI</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"oMLX\">oMLX</a> — Apple Silicon optimized inference engine</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"OptiQ\">OptiQ</a> — mixed-precision quantization tool for MLX models</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Antigravity Tools\">Antigravity Tools</a> — local API proxy to cloud models (different approach)</li></ul>", "Local LLM Deployment": "<h1>Local LLM Deployment</h1>\n<p>Running large language models locally on personal hardware, as opposed to relying on cloud API services. This covers the full ecosystem of tools, models, and integration patterns.</p>\n<h2>Ecosystem Overview</h2>\n<h3>Local Runtimes</h3>\n<table><thead><tr><th>Tool</th><th>Platform</th><th>Strengths</th></tr></thead><tbody><tr><td>[[Ollama]]</td><td>macOS, Windows, Linux</td><td>Easiest setup, Claude Code integration, API compatibility</td></tr><tr><td>[[LM Studio]]</td><td>macOS, Windows</td><td>GUI-first, model browser, server mode</td></tr><tr><td>[[oMLX]]</td><td>Apple Silicon only</td><td>MLX-optimized, efficient on M-series chips</td></tr><tr><td>[[OptiQ]]</td><td>Apple Silicon only</td><td>Mixed-precision quantization for memory efficiency</td></tr></tbody></table>\n<h3>API Proxy to Cloud</h3>\n<table><thead><tr><th>Tool</th><th>Backend</th><th>Purpose</th></tr></thead><tbody><tr><td>[[Antigravity Tools]]</td><td>Tencent Cloud Copilot</td><td>Local proxy to cloud models (15 models, 4 vendors)</td></tr></tbody></table>\n<h2>Common Integration Pattern</h2>\n<p>All local runtimes connect to Claude Code / other AI tools via environment variables:</p>\n<pre><code>export ANTHROPIC_BASE_URL=http://localhost:<PORT>\nexport ANTHROPIC_AUTH_TOKEN=<token>  # or ANTHROPIC_API_KEY\nclaude</code></pre>\n<h2>Model Recommendations by Hardware</h2>\n<table><thead><tr><th>Hardware</th><th>Recommended Model</th><th>Runtime</th></tr></thead><tbody><tr><td>16GB RAM</td><td>Qwen3.5-9B (OptiQ 4bit)</td><td>OptiQ / Ollama</td></tr><tr><td>16-32GB RAM</td><td>qwen3-coder:7b / gemma2:9b</td><td>Ollama</td></tr><tr><td>M high-end / RTX 4090</td><td>qwen3-coder:30b / GLM-4</td><td>Ollama / LM Studio</td></tr><tr><td>Any (cloud)</td><td>deepseek-v4-flash / glm-5</td><td>Antigravity Tools</td></tr></tbody></table>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"Ollama\">Ollama</a> — primary local runner used by Kevin</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Claude Code Local Setup\">Claude Code Local Setup</a> — how all these tools connect to Claude Code</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Anthropic Compatible API\">Anthropic Compatible API</a> — the protocol bridge</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Model Quantization\">Model Quantization</a> — techniques for running larger models on limited hardware</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Apple Silicon Optimization\">Apple Silicon Optimization</a> — M-series specific optimizations (MLX, oMLX)</li></ul>", "Claude Code Local Setup": "<h1>Claude Code Local Setup</h1>\n<p>How to configure Claude Code CLI to use local LLM models instead of Anthropic's cloud API. Multiple approaches exist depending on the local runtime.</p>\n<h2>Environment Variable Pattern</h2>\n<p>Claude Code uses Anthropic SDK environment variables to connect to local runtimes:</p>\n<pre><code>export ANTHROPIC_BASE_URL=http://localhost:<PORT>\nexport ANTHROPIC_AUTH_TOKEN=<token>    # for Ollama (Anthropic compat)\n# OR\nexport ANTHROPIC_API_KEY=<key>         # for LM Studio / OptiQ\n# OR (via settings.json)\nexport ANTHROPIC_MODEL=<model-name>    # optional, model name override</code></pre>\n<h2>Per-Runtime Configuration</h2>\n<table><thead><tr><th>Runtime</th><th>Port</th><th>Auth Variable</th><th>URL Suffix</th></tr></thead><tbody><tr><td>[[Ollama]]</td><td>11434</td><td>`ANTHROPIC_AUTH_TOKEN=ollama`</td><td>No `/v1`</td></tr><tr><td>[[LM Studio]]</td><td>1234</td><td>`ANTHROPIC_API_KEY=local-key`</td><td>`/v1`</td></tr><tr><td>[[oMLX]]</td><td>8000</td><td>`ANTHROPIC_AUTH_TOKEN=<key>`</td><td>No `/v1`</td></tr><tr><td>[[OptiQ]]</td><td>8080</td><td>`ANTHROPIC_API_KEY=not-used`</td><td>No `/v1`</td></tr><tr><td>[[Antigravity Tools]]</td><td>8002</td><td>Sub API Key</td><td>`/v1`</td></tr></tbody></table>\n<h2>One-Click Method</h2>\n<pre><code>ollama launch claude --model qwen3-coder:7b</code></pre>\n<p>This auto-configures the environment and launches Claude Code with the specified Ollama model.</p>\n<h2>settings.json Method</h2>\n<p>For CodeBuddy / persistent config, use <code>settings.json</code> env section:</p>\n<pre><code>{\n  \"env\": {\n    \"ANTHROPIC_AUTH_TOKEN\": \"ollama\",\n    \"ANTHROPIC_BASE_URL\": \"http://localhost:11434\",\n    \"ANTHROPIC_MODEL\": \"qwen3.5:9b\"\n  }\n}</code></pre>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"Ollama\">Ollama</a> — primary runtime, supports <code>ollama launch claude</code></li><li><a href=\"#\" class=\"wiki-link\" data-name=\"LM Studio\">LM Studio</a> — GUI alternative</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"oMLX\">oMLX</a> — Apple Silicon optimized</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"OptiQ\">OptiQ</a> — mixed-precision quantization</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Antigravity Tools\">Antigravity Tools</a> — cloud proxy alternative</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Anthropic Compatible API\">Anthropic Compatible API</a> — protocol details</li></ul>", "Anthropic Compatible API": "<h1>Anthropic Compatible API</h1>\n<p>Ollama implements an Anthropic-compatible API endpoint that allows any tool using the Anthropic Python/TypeScript SDK to connect to local models. This is the key bridge between local LLMs and tools like Claude Code, Claudian, and CodeBuddy.</p>\n<h2>Endpoint</h2>\n<p><code>/v1/messages</code> — same as Anthropic's Messages API.</p>\n<h2>Environment Variables</h2>\n<pre><code>export ANTHROPIC_AUTH_TOKEN=ollama    # required but value is ignored\nexport ANTHROPIC_BASE_URL=http://localhost:11434    # NO /v1 suffix</code></pre>\n<p>Key difference from OpenAI-compatible setup: Anthropic endpoint does NOT use <code>/v1</code> in the base URL.</p>\n<h2>Supported Features</h2>\n<table><thead><tr><th>Feature</th><th>Status</th></tr></thead><tbody><tr><td>Messages / Streaming</td><td>✅</td></tr><tr><td>System prompts</td><td>✅</td></tr><tr><td>Multi-turn conversations</td><td>✅</td></tr><tr><td>Vision (base64 images)</td><td>✅ (URL not supported)</td></tr><tr><td>Tools / function calling</td><td>✅</td></tr><tr><td>Thinking / extended thinking</td><td>✅</td></tr><tr><td>Tool choice</td><td>❌</td></tr><tr><td>Prompt caching</td><td>❌</td></tr><tr><td>PDF support</td><td>❌</td></tr></tbody></table>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"Ollama\">Ollama</a> — implements this API</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Claude Code Local Setup\">Claude Code Local Setup</a> — uses this API for local connection</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Local LLM Deployment\">Local LLM Deployment</a> — parent concept</li></ul>", "Apple Silicon Optimization": "<h1>Apple Silicon Optimization</h1>\n<p>Techniques and tools for running LLMs efficiently on Apple Silicon (M1-M4) hardware. Apple's unified memory architecture allows running models up to the system's total RAM, but requires specialized optimizations.</p>\n<h2>Key Tools</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"oMLX\">oMLX</a></strong> — MLX-native inference engine, optimized for Apple Silicon</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"OptiQ\">OptiQ</a></strong> — Mixed-precision quantization for MLX models</li></ul>\n<h2>Optimization Techniques</h2>\n<ul><li><strong>Model Quantization</strong>: Reduce model precision (e.g., 4-bit) to fit in available RAM</li><li><strong>KV Cache Quantization</strong>: <code>OLLAMA_KV_CACHE_TYPE=q8_0</code> halves KV cache memory</li><li><strong>Flash Attention</strong>: <code>OLLAMA_FLASH_ATTENTION=1</code> for faster attention computation</li><li><strong>SSD Cache</strong>: Page KV cache to SSD for long context (oMLX)</li><li><strong>MTP Decode</strong>: Multi-token prediction for faster generation (OptiQ)</li></ul>", "Model Quantization": "<h1>Model Quantization</h1>\n<p>Techniques to reduce the memory footprint of LLMs by using lower-precision numerical representations for weights and/or activations.</p>\n<h2>Types</h2>\n<ul><li><strong>Uniform Quantization</strong>: Same bit-width for all layers (e.g., Q4_K_M, Q5_K_M)</li><li><strong>Mixed-Precision Quantization</strong> (<a href=\"#\" class=\"wiki-link\" data-name=\"OptiQ\">OptiQ</a>): Different bit-widths per layer based on sensitivity analysis</li><li><strong>KV Cache Quantization</strong>: Quantize the key-value cache to reduce memory during long context inference</li></ul>\n<h2>Recommended Settings</h2>\n<table><thead><tr><th>Setting</th><th>Value</th><th>Effect</th></tr></thead><tbody><tr><td>KV cache type</td><td>`q8_0`</td><td>Halves KV cache memory vs `f16`</td></tr><tr><td>Model precision</td><td>4-bit</td><td>~4x memory reduction vs fp16</td></tr><tr><td>OptiQ target bits</td><td>5.0</td><td>Balanced quality/size</td></tr></tbody></table>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"OptiQ\">OptiQ</a> — implements mixed-precision quantization</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Apple Silicon Optimization\">Apple Silicon Optimization</a> — quantization is key for Apple Silicon</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Local LLM Deployment\">Local LLM Deployment</a> — quantization enables running larger models on limited hardware</li></ul>", "Agent Skill Design Patterns": "<h1>Agent Skill Design Patterns</h1>\n<p>Five standardized patterns for structuring Agent skill logic (SKILL.md format), identified from Google Cloud, Anthropic, and Vercel internal practices. They go beyond the file format standard to address how skill logic should be organized internally.</p>\n<p>Origin: Google Cloud Tech (Twitter/X), March 2026.</p>\n<hr>\n<h2>Foundational Mechanism: Progressive Disclosure</h2>\n<p>Skills don't load all at once. They load in three layers:</p>\n<ol><li><strong>Metadata only</strong> (~50 tokens) — name + description, loaded at startup</li><li><strong>Full instructions</strong> (2000-5000 tokens) — loaded when user request matches the skill description</li><li><strong>References & assets</strong> — loaded on-demand during execution, only when needed</li></ol>\n<p>This means you can distribute knowledge across many files, and the agent only fetches what it actually needs. This is why patterns like Tool Wrapper and Reviewer put detailed knowledge in <code>references/</code> instead of the main instruction file.</p>\n<hr>\n<h2>The 5 Patterns</h2>\n<h3>1. Tool Wrapper</h3>\n<p><strong>What it solves</strong>: Packaging domain-specific knowledge so agents can apply it on-demand without bloating the system prompt.</p>\n<p><strong>How it works</strong>: Encapsulate library best practices, team conventions, or domain expertise into a skill. The main instruction tells the agent <em>when</em> and <em>how</em> to use the knowledge; the detailed knowledge lives in <code>references/</code> files loaded only when needed.</p>\n<p><strong>Example</strong>: A FastAPI expert skill that loads <code>references/conventions.md</code> only when reviewing code.</p>\n<p><strong>When to use</strong>: When your skill is essentially answering \"how to correctly do X\".</p>\n<hr>\n<h3>2. Generator</h3>\n<p><strong>What it solves</strong>: Inconsistent output structure — sometimes summaries are included, sometimes not; heading levels vary; format drifts over time.</p>\n<p><strong>How it works</strong>: Output templates in <code>assets/</code>, style guides in <code>references/</code>, and the instruction acts as a project manager: read template → read style guide → collect missing variables from user → fill in the blanks.</p>\n<p><strong>Key design choice</strong>: Actively ask the user for missing information instead of letting the agent guess. This prevents hallucinated filler content.</p>\n<p><strong>When to use</strong>: API docs, standardized commit messages, project READMEs, weekly reports — any scenario where format matters more than content.</p>\n<hr>\n<h3>3. Reviewer</h3>\n<p><strong>What it solves</strong>: Code review prompts grow longer and more fragile as you add rules; updating one rule risks breaking others.</p>\n<p><strong>How it works</strong>: Separate \"what to check\" from \"how to check it\". Evaluation criteria live in <code>references/review-checklist.md</code> (modular, easy to update). The instruction only describes the review process: load checklist → read code → apply each rule → generate structured report with severity levels.</p>\n<p><strong>Scalability benefit</strong>: Swap the checklist file (Python style → OWASP security) and you get a completely different reviewer — without changing the SKILL.md instruction at all.</p>\n<p><strong>When to use</strong>: Automated PR reviews, pre-human-review machine checks, security scanning, document quality assessment.</p>\n<hr>\n<h3>4. Inversion</h3>\n<p><strong>What it solves</strong>: Agents love to guess and generate immediately. Give them a vague request and they'll fill in all blanks with assumptions, delivering a seemingly complete result that's actually off-target.</p>\n<p><strong>How it works</strong>: The agent becomes the interviewer. It asks structured questions in phases, and only starts working after all information is collected. The key is a hard gate instruction: \"Do not begin building or designing until all phases are complete.\"</p>\n<p><strong>Phase structure</strong>: Typically 2-3 phases (problem discovery → technical constraints → synthesis), each with specific questions.</p>\n<p><strong>When to use</strong>: Project planning, architecture design, requirements analysis — any task where incomplete information leads to poor results.</p>\n<hr>\n<h3>5. Pipeline</h3>\n<p><strong>What it solves</strong>: Complex multi-step tasks where the agent might skip steps or proceed with bad intermediate results.</p>\n<p><strong>How it works</strong>: The instruction itself is the workflow definition. Explicit sequential steps with hard checkpoints (gates) between them. Each step only loads the reference files it needs, keeping the context window clean.</p>\n<p><strong>Key feature</strong>: Diamond gates — explicit conditions that must be met before proceeding to the next step. Often includes human confirmation at critical junctions to prevent the agent from continuing with flawed intermediate output.</p>\n<p><strong>When to use</strong>: Multi-step document generation, code refactoring pipelines, data processing workflows — any task with multiple steps that must run in order with confirmation points.</p>\n<hr>\n<h2>How to Choose</h2>\n<table><thead><tr><th>Question</th><th>Pattern</th></tr></thead><tbody><tr><td>Apply domain knowledge to user input?</td><td>**Tool Wrapper**</td></tr><tr><td>Generate consistently structured output?</td><td>**Generator**</td></tr><tr><td>Systematically evaluate something?</td><td>**Reviewer**</td></tr><tr><td>Need lots of context that users don't volunteer?</td><td>**Inversion**</td></tr><tr><td>Multiple sequential steps with checkpoints?</td><td>**Pipeline**</td></tr></tbody></table>\n<p><strong>Patterns are composable</strong>, not mutually exclusive. A pipeline can embed a reviewer at the final step; a generator can start with inversion to collect template variables. Composition is the norm, not the exception.</p>\n<hr>\n<h2>Why This Matters</h2>\n<p>System prompts are flat, fragile, and hard to maintain. All content exists in context simultaneously, causing interference. Updates in one place can break other behaviors. And they're not reusable across projects.</p>\n<p>Structured skills with proper patterns provide:</p>\n<ul><li><strong>Separation of concerns</strong> — instructions, knowledge, and templates live in different places</li><li><strong>On-demand loading</strong> — progressive disclosure keeps context windows clean</li><li><strong>Reusability</strong> — skills work across tools and projects</li></ul>\n<p>This isn't just engineering neatness — it affects agent reliability. A clearly structured skill is less likely to drift; a knowledge-layered skill is less likely to forget critical instructions in long contexts.</p>\n<p>Choosing the right design pattern is choosing how much uncertainty you're willing to tolerate in agent behavior.</p>\n<hr>\n<h2>Connections</h2>\n<p>See <a href=\"#\" class=\"wiki-link\" data-name=\"LLM Wiki Pattern\">LLM Wiki Pattern</a> for another pattern of structured knowledge management.</p>\n<p>See <a href=\"#\" class=\"wiki-link\" data-name=\"DragonScale Memory\">DragonScale Memory</a> for advanced memory structuring patterns.</p>\n<p>See <a href=\"#\" class=\"wiki-link\" data-name=\"5 Agent Skill Design Patterns\">5 Agent Skill Design Patterns</a> for the original source.</p>", "Intent Recognition": "<h1>Intent Recognition</h1>\n<p>意图识别。判断用户想要做什么，然后路由到对应的工作流或技能。</p>\n<p>当一个 agent 集成了很多功能时，不能把所有 system prompt 都塞给一个 LLM——上下文太长、注意力分散、效果差。需要先识别意图，再调用对应的能力。</p>\n<hr>\n<h2>为什么需要意图识别</h2>\n<p><strong>问题：</strong> 功能越多，system prompt 越长，LLM 越容易选错流程。</p>\n<ul><li>3 个功能 → 还能凑合</li><li>20 个功能 → 上下文爆炸，效果灾难</li></ul>\n<p><strong>解决方案：</strong> 加一层意图识别。</p>\n<pre><code>用户输入 → 意图识别 → 路由到对应工作流/技能 → 执行</code></pre>\n<hr>\n<h2>三种实现方法</h2>\n<h3>1. LLM 识别</h3>\n<p>用轻量级 LLM（如 flash 版）输出意图，然后 switch case 路由。</p>\n<ul><li><strong>优点</strong>：能力最强，能理解复杂语义</li><li><strong>缺点</strong>：最慢，token 消耗大</li><li><strong>适用</strong>：复杂、模糊的用户输入</li></ul>\n<h3>2. 正则/关键词匹配</h3>\n<p>代码层面匹配关键词或正则表达式。</p>\n<ul><li><strong>优点</strong>：最快、最稳、最好调试</li><li><strong>缺点</strong>：不够灵活，只能匹配预设模式</li><li><strong>适用</strong>：明确的、高频的指令</li></ul>\n<h3>3. BERT/Rerank 模型</h3>\n<p>用语义相似度匹配，计算 query 和每个 intent 的相关度。</p>\n<ul><li><strong>优点</strong>：比 LLM 快，比正则灵活，可以微调</li><li><strong>缺点</strong>：能力不如 LLM</li><li><strong>适用</strong>：中等复杂度，有标注数据可以微调的场景</li></ul>\n<hr>\n<h2>速度 vs 能力</h2>\n<table><thead><tr><th>方法</th><th>速度</th><th>能力</th><th>可微调</th></tr></thead><tbody><tr><td>正则匹配</td><td>最快</td><td>最弱</td><td>❌</td></tr><tr><td>BERT/Rerank</td><td>中等</td><td>中等</td><td>✅</td></tr><tr><td>LLM</td><td>最慢</td><td>最强</td><td>✅</td></tr></tbody></table>\n<p><strong>实际使用：混合使用。</strong> 先用正则快速拦截高频明确指令，剩下的交给 LLM 或 BERT。</p>\n<hr>\n<h2>LLM 输出格式</h2>\n<p>用 LLM 做意图识别时，通常输出三个字段：</p>\n<ol><li><strong>intent</strong> — 识别到的意图</li><li><strong>confidence</strong> — 置信度（0-1）</li><li><strong>complement</strong> — 补充信息（信息不够时，问用户要什么）</li></ol>\n<p><strong>示例：</strong></p>\n<pre><code>{\n  \"intent\": \"申请请假\",\n  \"confidence\": 0.72,\n  \"complement\": \"请问您的工号是？\"\n}</code></pre>\n<hr>\n<h2>低置信度处理</h2>\n<p>confidence 太低时，不要硬猜。</p>\n<p><strong>处理方式：</strong></p>\n<ul><li>直接拒绝，让用户重新描述</li><li>或者问一个澄清问题</li><li>不要用低置信度的结果直接执行</li></ul>\n<p><strong>核心原则：</strong> 猜错的代价比问一句大得多。</p>\n<hr>\n<h2>不只是第一次路由</h2>\n<p>意图识别不是只有\"用户第一次输入时\"那一下。</p>\n<p><strong>贯穿整个交互过程：</strong></p>\n<ul><li>用户说\"改一下这句\" → 识别为\"点式修改\"意图 → 走修改流程</li><li>用户说\"不行\" → 识别为\"否定\"意图 → 走否定流程（问一个二元问题）</li><li>用户说\"短一点\" → 识别为\"删减长度\"意图 → 走删减流程</li><li>用户说\"我有个想法\" → 识别为\"新想法\"意图 → 走想法验证流程</li></ul>\n<p>每一轮用户输入，都要先识别意图，再走对应的工作流。</p>\n<hr>\n<h2>和 Skills 的关系</h2>\n<p>技能选择本质上就是意图识别。</p>\n<p>通用 agent（如 Claude Code、OpenCode）里看不到显式的\"意图识别层\"，因为它已经整合到 skills 选取里了：</p>\n<ol><li>用户输入</li><li>读 SKILLS.md 索引</li><li>找到最匹配的 skill</li><li>注入 skill 内容 → 变成专业 agent</li></ol>\n<p>整个过程就是意图识别。</p>\n<hr>\n<h2>设计要点</h2>\n<ol><li><strong>意图要互斥</strong> — 两个意图不要太像，不然 LLM 也分不清</li><li><strong>数量要控制</strong> — 不要一下搞 50 个意图，10-20 个比较合适</li><li><strong>要有兜底</strong> — 识别不出来时怎么办？拒绝？转人工？还是走通用对话？</li><li><strong>可以迭代</strong> — 收集识别错的 case，微调模型或补充正则</li><li><strong>信息不够就问</strong> — 不要硬猜，补全信息再执行</li></ol>\n<hr>\n<h2>不仅适用于 Agent</h2>\n<p>任何有多个功能入口的系统，都需要意图识别：</p>\n<ul><li>客服机器人（咨询/投诉/下单）</li><li>语音助手（打电话/发短信/设闹钟）</li><li>设计工具（生成/修改/导出）</li><li>剧本写作（写场景/改台词/剪长度）</li></ul>\n<p>本质都是：先判断用户要什么，再用对应的方式处理。</p>", "Open Knowledge Format": "<h1>Open Knowledge Format (OKF)</h1>\n<p>Google Cloud 推出的开源、中立的规范标准，将 <a href=\"#\" class=\"wiki-link\" data-name=\"LLM Wiki Pattern\">LLM Wiki Pattern</a> 从概念变成可执行的工程标准。</p>\n<h2>文件格式规范</h2>\n<ul><li><strong>扩展名</strong>：<code>.md</code></li><li><strong>编码</strong>：UTF-8</li><li><strong>组成</strong>：顶部 YAML 元数据（Frontmatter）+ 下方 Markdown 正文（Body）</li></ul>\n<h2>YAML 元数据规范</h2>\n<ul><li><strong>唯一必填字段</strong>：<code>type</code>（字符串），告诉 AI 或解析器这个文件是什么知识实体（如 <code>type: table</code>、<code>type: api_endpoint</code>、<code>type: playbook</code>）</li><li><strong>推荐可选字段</strong>：<code>title</code>、<code>description</code>、<code>tags</code>（数组）、<code>owner</code>/<code>author</code>，以及任意业务自定义 KV 字段</li></ul>\n<h2>正文与链接规范</h2>\n<ul><li><strong>正文</strong>：标准 Markdown（CommonMark / GFM），人类和 AI 都能读</li><li><strong>交叉引用</strong>：使用 <strong>标准相对路径 Markdown 链接</strong>，格式为 <code>[显示文本](./其他文件.md)</code> 或 <code>[显示文本](../目录/文件.md)</code>，确保在 GitHub、本地 IDE、AI Agent 中引用关系都不会断裂</li></ul>\n<h2>三大设计原则</h2>\n<h3>1. 最少干预（Minimally Opinionated）</h3>\n<p>只强制 <code>type</code> 字段，不干涉内容模型。不同团队可以按自己的习惯组织正文，无需在分类学上达成一致。</p>\n<h3>2. 生产者与消费者解耦（Producer/Consumer Independence）</h3>\n<p>写入者和读取者彻底分离。人类手写的 Markdown 可被 AI 消费；数据管道导出的知识可被人类浏览；一个 LLM 总结的知识可被另一个 LLM 检索。</p>\n<h3>3. 是格式，不是平台（Format, not platform）</h3>\n<p>不绑定任何云服务、数据库、大模型厂商或智能体框架。无需专有 SDK、账号或运行环境，普通编辑器 + Git 即可管理。</p>\n<h2>与 LLM Wiki 的关系</h2>\n<p>此前 Obsidian、Notion、AGENTS.md 等方案各自为战，格式互不相通，产生知识孤岛。OKF 提供了一套标准化的\"容器\"和\"目录\"，让 AI 智能体可以顺畅读取、交叉比对、自动更新，最终将静态文档库变成真正\"活着\"的 LLM Wiki。</p>\n<h2>标准示例</h2>\n<pre><code>---\ntype: database_table\ntitle: users_v2\ndescription: 核心用户表，包含用户的基本信息和认证状态。\nowner: data-engineering-team\ntags:\n  - core-data\n  - pii\nlast_updated: \"2026-06-26\"\n---\n\n# users_v2 数据表说明\n\n这是系统中用于存储所有注册用户基础数据的核心表。\n\n## 字段说明 (Schema)\n\n| 字段名 | 类型 | 描述 |\n|---|---|---|\n| `user_id` | UUID | 用户的全局唯一标识符（主键） |\n| `email` | String | 用户注册邮箱 |\n| `status` | String | 账户状态，参考 [Account Status Enum](./enums/account_status.md) |\n\n## 依赖关系\n\n该表的数据来源于上游的统一认证服务，具体的同步逻辑请参考 [User Auth Pipeline](../pipelines/user_auth_sync.md)。</code></pre>\n<h2>设计哲学</h2>\n<p>OKF 的精髓是<strong>极简</strong>：不需要数据库，普通文本编辑器就能创建，Git 原生管理版本。通过强制 <code>type</code> 分类和 Markdown 文件链接，AI 智能体可以像网络爬虫一样在本地文件夹中遍历出完整的企业知识图谱。</p>\n<h2>与 Kevin 的 Wiki 对比</h2>\n<table><thead><tr><th>维度</th><th>OKF 标准</th><th>Kevin 的 Wiki</th></tr></thead><tbody><tr><td>链接格式</td><td>`[文本](./文件.md)` 相对路径</td><td>`[[Wikilink]]`</td></tr><tr><td>必填字段</td><td>仅 `type`</td><td>`type` + 更多字段</td></tr><tr><td>frontmatter 丰富度</td><td>极简</td><td>`complexity`, `status`, `aliases`, `related`, `sources` 等</td></tr><tr><td>目录分类</td><td>无强制</td><td>concepts/ entities/ sources/ 分类</td></tr><tr><td>链接工具</td><td>纯文本编辑器 + Git</td><td>Obsidian（图谱、双向链接面板）</td></tr></tbody></table>\n<p>Kevin 的 Wiki 是 OKF 的超集——OKF 是最小公分母标准，Kevin 的标准是面向 Obsidian + AI 协同的实践标准，更丰富但需要 Obsidian 生态支持。</p>\n<h2>Connections</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"LLM Wiki Pattern\">LLM Wiki Pattern</a> — OKF 是其具体标准化实现</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Andrej Karpathy\">Andrej Karpathy</a> — 提出了 LLM Wiki 设想</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"sources/Google OKF 2026\">sources/Google OKF 2026</a> — 来源页</li></ul>", "Skill Five-Layer Structure": "<h1>Skill Five-Layer Structure</h1>\n<p>Skill 的五层架构。一个完整的、好用的 Skill，不是一坨 prompt，而是五层结构的叠加。</p>\n<hr>\n<h2>五层结构</h2>\n<h3>第一层：方法论层</h3>\n<p><strong>是什么、为什么。</strong> 这个 Skill 背后的理论、原则、框架。</p>\n<ul><li>核心思想是什么？</li><li>为什么要这么做？</li><li>有哪些底层原则？</li></ul>\n<p><strong>例子：</strong></p>\n<ul><li>图片设计 Skill → 描述比重原则、克制原则、参考图优先原则</li><li>剧本写作 Skill → Show don't tell、三幕式、英雄之旅</li><li>出图工作流 → 系统化思维、解耦思维、防错优先</li></ul>\n<p><strong>这一层放在 Wiki 里。</strong> 通用方法论，跨项目复用。</p>\n<hr>\n<h3>第二层：写作/执行规则层</h3>\n<p><strong>怎么做。</strong> 具体的规则、注意事项、禁忌、最佳实践。</p>\n<ul><li>有哪些必须遵守的规则？</li><li>哪些地方容易出错？</li><li>有哪些最佳实践？</li></ul>\n<p><strong>例子：</strong></p>\n<ul><li>图片设计 → 不要用程度词、次要元素描述要少、能垫图就垫图</li><li>剧本写作 → 每句台词都要推动剧情、每个场景都要有价值变化</li><li>出图 → 提示词分层拼装、自审三件套（逻辑矛盾→极端化→主次比例）</li></ul>\n<p><strong>这一层放在 Skill 内部。</strong> 每个 Skill 有自己的规则。</p>\n<hr>\n<h3>第三层：工作流层</h3>\n<p><strong>怎么和用户交互。</strong> 用户的不同意图对应什么处理流程。</p>\n<ul><li>用户可能会要什么？（有哪些意图）</li><li>每个意图对应什么处理步骤？</li><li>信息不够时怎么问？</li><li>用户否定时怎么应对？</li><li>出问题时怎么兜底？</li></ul>\n<p><strong>核心：意图识别 + 对应流程。</strong></p>\n<p><strong>例子：</strong></p>\n<ul><li>剧本写作 Skill → 7 个意图（要场景、给修改、提想法、否定、要剪长度、要审计、信息不足）</li><li>出图工作流 → 4 步必选 + 可选插拔（场景设计、物料包、返工、沉淀）</li><li>电商主图 Skill → 双模引擎（白底图 + 场景图）</li></ul>\n<p><strong>这一层是 Skill 的灵魂。</strong> 决定了用户用起来顺不顺手。</p>\n<hr>\n<h3>第四层：输出工具层</h3>\n<p><strong>交付什么格式。</strong> 最终产出的格式、模板、导出方式。</p>\n<ul><li>输出什么格式？（Markdown / JSON / 图片 / 视频）</li><li>有哪些模板？</li><li>怎么导出？</li><li>输出到哪里？</li></ul>\n<p><strong>例子：</strong></p>\n<ul><li>剧本写作 → 角色圣经模板、世界观模板、分镜模板</li><li>电商详情页 → 逐屏文案模板、图片规格说明</li><li>出图 → 提示词格式、输出目录结构</li></ul>\n<p><strong>这一层决定了交付物的质量和可用性。</strong></p>\n<hr>\n<h3>第五层：质量控制层</h3>\n<p><strong>节奏、删减、验收、自检。</strong> 怎么保证输出质量，怎么控制节奏，怎么验收。</p>\n<ul><li>怎么自检？</li><li>验收标准是什么？</li><li>节奏怎么控制？</li><li>太长了怎么删？</li><li>出问题了怎么修？</li></ul>\n<p><strong>例子：</strong></p>\n<ul><li>剧本写作 → 节拍计算、删减原则、审计清单</li><li>出图 → 自审三件套（逻辑矛盾→极端化→主次比例）</li><li>代码 Skill → 测试用例、lint 检查</li></ul>\n<p><strong>这一层决定了 Skill 的可靠性。</strong></p>\n<hr>\n<h2>各层的关系</h2>\n<pre><code>方法论层（为什么）\n    ↓\n执行规则层（怎么做）\n    ↓\n工作流层（怎么交互）\n    ↓\n输出工具层（交付什么）\n    ↓\n质量控制层（怎么保证质量）</code></pre>\n<ul><li><strong>上层指导下层</strong>：方法论决定了规则，规则决定了工作流，工作流决定了输出格式，输出格式决定了质量控制的方式</li><li><strong>下层反馈上层</strong>：实际使用中发现的问题，可以反过来优化上层的规则和方法论</li></ul>\n<hr>\n<h2>Wiki 和 Skill 的分工</h2>\n<table><thead><tr><th>层级</th><th>放哪里</th><th>说明</th></tr></thead><tbody><tr><td>方法论层</td><td>**Wiki**</td><td>通用概念，跨项目复用，互相链接</td></tr><tr><td>执行规则层</td><td>**Skill 内部**</td><td>每个 Skill 有自己的具体规则</td></tr><tr><td>工作流层</td><td>**Skill 内部**</td><td>每个 Skill 有自己的交互流程</td></tr><tr><td>输出工具层</td><td>**Skill 内部**</td><td>每个 Skill 有自己的输出模板</td></tr><tr><td>质量控制层</td><td>**Skill 内部**</td><td>每个 Skill 有自己的验收标准</td></tr></tbody></table>\n<p><strong>Wiki 存第一层（方法论），Skill 存全部五层。</strong></p>\n<hr>\n<h2>判断一个 Skill 好不好</h2>\n<p>看五层是不是都齐全：</p>\n<ul><li>❌ 只有一坨 prompt → 不好用</li><li>✅ 有方法论 + 规则 + 工作流 + 输出模板 + 质量控制 → 好用</li></ul>\n<p>缺哪层补哪层。</p>", "AI技能自管理": "<h1>AI技能自管理</h1>\n<p>AI 自动创建、优化、归档技能的方法论。核心是三个机制：<strong>技能自动生成</strong>、<strong>技能使用追踪</strong>、<strong>技能生命周期管理</strong>。</p>\n<hr>\n<h2>机制一：技能自动生成</h2>\n<p>AI 做完复杂任务后，自动回顾操作步骤，按固定模板生成 SKILL.md。</p>\n<p><strong>核心逻辑：</strong></p>\n<ol><li>AI 回顾刚才的操作步骤（或用户指定的来源）</li><li>按硬性模板填空（不是自由发挥）</li><li>模板结构固定：标题 → 触发条件 → 前置依赖 → 操作步骤 → 常见坑 → 验证方法</li><li>禁止编造命令，所有指令必须来自实际操作验证</li></ol>\n<p><strong>可复用的规则：</strong></p>\n<ul><li>skill 模板必须标准化，8 个固定章节，AI 不能自己发明结构</li><li>frontmatter 必须有 name + description，校验不通过就报错</li><li>附属文件只能放在 references/templates/scripts/assets 四个目录下</li></ul>\n<hr>\n<h2>机制二：技能使用追踪</h2>\n<p>记录每个 skill 的最后使用时间，作为生命周期管理的依据。</p>\n<p><strong>追踪内容：</strong></p>\n<ul><li>最后使用时间</li><li>使用次数</li><li>修改次数</li><li>查看次数</li><li>状态（active / stale / archived）</li></ul>\n<hr>\n<h2>机制三：技能生命周期管理</h2>\n<p>分两层：自动判断（不用 AI）+ AI 合并（可选）。</p>\n<h3>第一层：自动归档（纯逻辑，不需要 AI）</h3>\n<p>定时检查每个 skill 的使用时间：</p>\n<table><thead><tr><th>条件</th><th>操作</th></tr></thead><tbody><tr><td>30 天没用</td><td>标记为 stale（过时）</td></tr><tr><td>90 天没用</td><td>自动归档到 .archive/</td></tr><tr><td>stale 后又被用了</td><td>自动恢复为 active</td></tr><tr><td>用户标记为 pin</td><td>跳过所有自动操作</td></tr></tbody></table>\n<p>归档不是删除，是移到 <code>.archive/</code> 目录，随时可恢复。</p>\n<h3>第二层：AI 合并（可选，默认不开启）</h3>\n<p>把相关的多个小 skill 合并成一个\"大类\"skill：</p>\n<ul><li>比如 <code>pdf提取</code>、<code>docx提取</code>、<code>csv提取</code> → 合并成 <code>文档提取</code></li><li>合并后保留每个子 skill 的独特内容作为章节</li><li>旧的 skill 归档</li></ul>\n<hr>\n<h2>在你的系统里怎么用</h2>\n<p>这三个机制不需要装 Hermes 也能用：</p>\n<ol><li><strong>技能模板规范</strong> — 写死 SKILL.md 的结构，AI 按规范填空</li><li><strong>使用时间追踪</strong> — 记录每个 skill 最后使用时间，超过阈值自动归档</li><li><strong>归档可恢复</strong> — 不是删文件，是移走，随时可以恢复</li></ol>", "AI打光五法": "<h1>AI 打光五法</h1>\n<p>五种导演级打光方法，每种都有明确的摄影原理和提示词写法。核心思路：<strong>用摄影逻辑替代抽象词，让 AI 画面从\"生成感\"走向\"影像感\"。</strong></p>\n<hr>\n<h2>1. 侧逆光 — 电影感</h2>\n<p>光源在人物<strong>侧后方</strong>，打亮人物边缘轮廓，适合古风短剧、情绪镜头、人物出场。</p>\n<p><strong>三个作用：</strong></p>\n<ol><li><strong>主体分离</strong> — 人物边缘亮光让主体从背景跳出，解决\"画面平\"的问题</li><li><strong>轮廓勾勒</strong> — 头发、发丝、纱衣、步摇等元素被光勾出，画面更细腻</li><li><strong>电影感</strong> — 电影很少用正面平光，侧逆光创造前后层次</li></ol>\n<blockquote>不是普通的\"背后有一圈光\"，而是强逆光切出边缘 + 柔和补光保留细节 + 眼神光注入生命力 + 体积光增加纵深。</blockquote>\n<p><strong>情绪控制</strong>：暖色轮廓光→温暖浪漫；冷色轮廓光→冷静神秘。</p>\n<hr>\n<h2>2. 轮廓光 — 主体分离与情绪控制</h2>\n<p>强调人物<strong>边缘光线控制</strong>，让主体从暗背景中\"切\"出来。比侧逆光更突出边缘光的强度和清晰度。</p>\n<p><strong>适用场景</strong>：深色背景、夜景、古风室内、烟雾场景。人物出场、古风女主回眸、神明感角色登场、品牌大片式肖像。</p>\n<p><strong>四层打光逻辑</strong>：强逆光切边缘 + 柔和补光保留细节 + 眼神光注入生命力 + 体积光增加纵深。</p>\n<hr>\n<h2>3. 侧光 — 明暗对比塑造情绪</h2>\n<p>光源在人物<strong>侧前方</strong>，一半脸亮一半脸暗，用明暗关系传递情绪。即使没有表情，观众也能感受到角色的状态。</p>\n<p><strong>适用场景</strong>：人物独白、秘密揭晓、矛盾冲突、内心挣扎。</p>\n<p><strong>控制要点</strong>：亮面清晰，暗面不过黑，暗部保留皮肤纹理和五官细节，眼睛保留眼神光。不同色调（暖/冷/中性）影响情绪方向。</p>\n<blockquote>侧光不是让画面变暗，而是用一明一暗塑造人物情绪。</blockquote>\n<hr>\n<h2>4. 硬光 — 商业广告与产品质感</h2>\n<p>光影<strong>边缘清晰</strong>，有形状有秩序，适合商业广告、产品展示、品牌视觉。</p>\n<p><strong>核心手法</strong>：强光穿过百叶窗、窗框、镂空道具，在产品和背景上形成几何投影。光线本身成为画面设计的一部分。</p>\n<p><strong>适用场景</strong>：护肤品/香水/饮料产品图、品牌宣传、时尚大片、高质感静物。</p>\n<p><strong>控制要点</strong>：阴影清晰但不杂乱，高光干净不过曝，品牌标识可见，投影有设计感但不抢主体。</p>\n<hr>\n<h2>5. 低位光 / 近身道具光 — 神秘感与戏剧性</h2>\n<p>光源贴近人物，来自下方、侧下方、胸前或手边的发光道具（灯笼、烛台、法器、荧光物件等），形成集中局部照明。</p>\n<p><strong>三个特点：</strong></p>\n<ol><li><strong>有明确光源</strong> — 观众知道光从哪里来，画面不假</li><li><strong>局部照明</strong> — 只照亮靠近光源的区域，不平均铺满整张脸</li><li><strong>天然情绪</strong> — 明暗反差大，产生神秘感、压迫感、危险感</li></ol>\n<p><strong>适用场景</strong>：奇幻、悬疑、人物觉醒、暗场对话、古风夜戏、神秘仪式。</p>\n<p><strong>控制要点</strong>：光源合理 + 位置明确 + 强度克制。避免粗暴的\"底光照脸\"，要写清光源是什么、照哪里、暗部保留多少。</p>\n<hr>\n<h2>光线模块化写法</h2>\n<p>写提示词时把光线写成独立的 <code>【光线布置】</code> 段落，说清四件事：</p>\n<ol><li><strong>光从哪里来</strong> — 方向决定空间感</li><li><strong>光主要照哪里</strong> — 重点决定层次</li><li><strong>暗部怎么处理</strong> — 暗部保留细节，不过黑不过脏</li><li><strong>补光和眼神光</strong> — 主光负责氛围，补光保留细节，眼神光注入生命力</li></ol>\n<blockquote>**一个稳定的光线模块结构：**<br>`【光线布置】以 [光线类型] 作为主光，光源位于 [方向]，重点照亮 [位置]，形成 [明暗关系]。暗部 [处理方式]。人物正面 [补光方式]。眼睛位置 [眼神光处理]。背景 [背景处理]。整体画面 [情绪/风格]。`</blockquote>\n<hr>\n<h2>与现有概念的关系</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"摄影语言锚定质感\">摄影语言锚定质感</a> — 打光是最具体的摄影语言之一，一个灯光关键词 > 十个形容词</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"光线布置模块化\">光线布置模块化</a> — 将打光方法固化为可复用的提示词段落结构</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a> — 灯光词汇表与运镜词汇表互补，共同构成 AI 影像工具箱</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a> — 打光提示词也要克制，不堆砌光效，每种光说清逻辑</li></ul>", "光线布置模块化": "<h1>光线布置模块化</h1>\n<p>把光线写成独立的 <code>【光线布置】</code> 段落，与人物、场景、服装、风格分开。<strong>不要在 prompt 里把所有东西混在一起写。</strong></p>\n<hr>\n<h2>为什么需要模块化</h2>\n<p>很多人写提示词时把人物、场景、服装、风格、镜头、光线全部混在一起。AI 接收到的信息很乱，最后光线不稳定。</p>\n<p>模块化好处：</p>\n<ul><li>每段只做一件事，AI 更容易理解</li><li>同一套光线模块可以跨场景复用</li><li>调试时只改光线段落，不影响其他元素</li></ul>\n<hr>\n<h2>光线四要素</h2>\n<p>一个完整的光线模块必须说清这四件事：</p>\n<h3>1. 光从哪里来（方向）</h3>\n<p>最重要。光源位置决定画面空间感。没有方向，AI 默认平均光→画面平。</p>\n<ul><li>正前方 → 平光，适合高调棚拍</li><li>侧前方 → 侧光，明暗对比</li><li>侧后方 → 侧逆光，边缘轮廓</li><li>正后方 → 逆光/剪影</li><li>上方 → 天光/顶光</li><li>下方 → 底光/道具光</li></ul>\n<h3>2. 光主要照哪里（重点）</h3>\n<p>光线不是平均铺满画面，要有重点。写清楚照亮什么位置：发丝、侧脸、肩膀、手部、产品表面、背景墙面。</p>\n<h3>3. 暗部怎么处理（控制）</h3>\n<p>大光比画面容易脸黑、细节丢失、五官变形。必须写：暗部不是完全死黑，保留皮肤纹理、五官结构和材质细节。</p>\n<h3>4. 补光和眼神光（生命力）</h3>\n<p>主光负责氛围，补光保留细节，眼神光注入生命力。人物画面里只要眼睛没有光，再精致的脸也显得呆。</p>\n<hr>\n<h2>标准结构</h2>\n<pre><code>【光线布置】以 [光线类型] 作为主光，光源位于 [方向]，\n[如何照亮主体]，形成 [明暗关系]。\n暗部 [处理方式]，不过黑不过曝。\n人物正面加入 [补光方式]，保留 [细节]。\n眼睛位置保留 [眼神光描述]。\n背景 [背景处理]。\n整体画面 [情绪/风格描述]。</code></pre>\n<hr>\n<h2>与现有概念的关系</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI打光五法\">AI打光五法</a> — 五种打光方法的具体提示词模板，都遵循这个模块化结构</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"摄影语言锚定质感\">摄影语言锚定质感</a> — 光线模块是最核心的摄影语言之一</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"变量与不变量分离\">变量与不变量分离</a> — 光线模块作为不变量，场景变化时只替换人物/场景段落</li></ul>", "AI室内光控制": "<h1>AI 室内光控制</h1>\n<p>室外光和室内光是两套完全不同的生成机制。室外有默认的天光（太阳），你不需要解释光从哪来。但室内是一个封闭的黑盒子——如果你不指定光源，AI 就会开启\"上帝视角\"的漫反射白光，这就是室内画面\"平\"、\"假\"、\"塑料廉价感\"的根源。</p>\n<hr>\n<h2>方法一：先定义光源，再定义方向</h2>\n<h3>问题</h3>\n<p>很多人这样写室内光：</p>\n<pre><code>A cozy living room, warm light, 8k resolution.</code></pre>\n<p>只给了\"暖光\"指令，没告诉 AI 光从哪来。AI 随机抓取画面中的物体充当光源，光线出现在错误的地方，破坏构图重心。</p>\n<h3>解法</h3>\n<p>为光找一个\"宿主\"——在提示词中明确植入发光体。</p>\n<p><strong>公式</strong>：[场景描述] + [具体光源实体] + [光线投射动作] + [受光物体]</p>\n<p><strong>自然光示例</strong>（窗帘作为光源实体）：</p>\n<pre><code>A cozy living room in the late afternoon. Sunlight streams through\na large white curtain, casting soft, diffused light across the room.\nThe curtain glows warmly, becoming the primary light source.</code></pre>\n<p><strong>人造光示例</strong>（霓虹灯作为光源实体）：</p>\n<pre><code>A dark bedroom illuminated only by a flickering neon sign\noutside the window. The pink and blue light cuts across the wall,\ncasting long, colored shadows across the empty bed.</code></pre>\n<hr>\n<h2>方法二：写衰减路径，而不是写强度</h2>\n<h3>问题</h3>\n<p>很多人写室内光用感觉词：soft、weak、bright。但 AI 不是通过调整\"亮度滑块\"来理解光的，它是通过像素的明暗对比和过渡来构建空间的。只写\"柔光\"，AI 会把所有阴影提亮，导致画面变灰。</p>\n<h3>解法</h3>\n<p>描述光从亮到暗的过程——光的衰减路径（Falloff）。告诉 AI 光从哪里开始、在哪里结束。</p>\n<p><strong>公式</strong>：[主体动作] + [光照起点（强）] + [光照终点（衰减/消失）]</p>\n<p><strong>示例</strong>（书桌阅读场景）：</p>\n<pre><code>Close-up of an elderly scholar reading a thick book in a dark library.\nA single small candle strictly illuminates the pages and his fingers,\nthe light rapidly falling off towards his shoulders, leaving the\nbackground bookshelves in deep shadow. Chiaroscuro, Rembrandt lighting.</code></pre>\n<p>→ 蜡烛照亮书页和手指，光线向肩膀处迅速衰减，背景书架处于深重阴影。</p>\n<h3>关键词库</h3>\n<table><thead><tr><th>关键词</th><th>效果</th><th>适合场景</th></tr></thead><tbody><tr><td>Rapid falloff / High contrast falloff</td><td>快速衰减，强烈戏剧感</td><td>黑色电影、悬疑风格</td></tr><tr><td>Gradual fade / Soft gradient</td><td>渐变消失，光线像水漫延</td><td>日系小清新、家居广告</td></tr><tr><td>Pool of light</td><td>光潭，把光限制在一个圆圈内</td><td>舞台感、聚焦主体</td></tr></tbody></table>\n<blockquote>**核心心法**：别告诉 AI\"这里很暗\"，要告诉它\"光走不到这里\"。AI 会自动拉开明暗差，层次感就出来了。</blockquote>\n<hr>\n<h2>方法三：室内亮度靠反射，不靠直射</h2>\n<h3>问题</h3>\n<p>新手认为要把房间照亮就需要大灯直射，但会造成生硬的\"探照灯效应\"——阴影死黑，高光过曝。真正把空间填亮的是光线撞击墙面、地板后的漫反射（Bounce Light）。</p>\n<h3>解法</h3>\n<p>不仅要写主光源，还要写环境光是如何产生的——光线撞击材质后的反弹。</p>\n<p><strong>公式</strong>：[材质环境] + [主光源撞击] + [反射后的环境色填充]</p>\n<p><strong>示例</strong>（白色房间+木地板）：</p>\n<pre><code>A spacious, minimalist art gallery space, pure white walls.\nStrong afternoon sunlight strikes the polished orange wood floor,\nwarm color bounces upward and illuminates the white ceiling and walls,\nfilling the shadows with a subtle orange tint.\nPhotorealistic, global illumination rendering.</code></pre>\n<p>→ 阳光（白色）撞击木地板（黄色），反射出暖黄色光填充暗部。写出这种色温传递，真实感指数级上升。</p>\n<h3>材质对反射的影响</h3>\n<ul><li><strong>Matte / Rough textures（哑光/粗糙）</strong> — 吸收光线，反射柔和，适合温馨复古感</li><li><strong>Glossy / Polished surfaces（光面/抛光）</strong> — 强反射，有镜面光，适合科技感、现代奢华</li></ul>\n<blockquote>**核心心法**：室内光的本质不是\"亮度控制\"，而是\"空间理解\"。通过描述反射，强迫 AI 理解房间的三维结构——墙在哪里、地在哪里、光怎么弹来弹去。</blockquote>\n<hr>\n<h2>总结</h2>\n<ol><li><strong>定义光源实体</strong> — 告诉 AI 光是从具体的窗户或灯具出来的，拒绝无源之光</li><li><strong>描绘衰减路径</strong> — 描述光从亮到暗的过程，而不是单纯调整亮度参数</li><li><strong>利用反射机制</strong> — 描写光线撞击物体后的反弹，用漫反射填充暗部</li></ol>\n<blockquote>与 [[光线布置模块化]] 配合使用：将上述三个方法写入独立的 `【光线布置】` 段落。</blockquote>", "AI光源提示词模板库": "<h1>AI 光源提示词模板库</h1>\n<p>20 种可直接复制使用的 <code>【光线布置】</code> 提示词模板，覆盖常见场景和情绪。每个模板都遵循<a href=\"#\" class=\"wiki-link\" data-name=\"光线布置模块化\">光线布置模块化</a>的四要素结构（方向、重点、暗部、补光）。</p>\n<hr>\n<h2>自然光（日间）</h2>\n<h3>1. 窗边柔光</h3>\n<p><code>【光线布置】以窗边自然柔光作为主光，光源位于人物侧前方，从窗户方向斜向照入，柔和打亮人物半边脸、眉眼、鼻梁、嘴唇、手部和衣领。另一侧脸部缓慢过渡进自然阴影，暗部保留皮肤纹理和五官结构，不过黑不过脏。人物正面加入极弱漫反射补光，让面部层次更自然。眼睛位置保留温润眼神光，背景保持柔和虚化，整体画面安静、细腻、真实，适合人物独白、回忆和温柔情绪镜头。</code></p>\n<h3>2. 顶部天光</h3>\n<p><code>【光线布置】以顶部自然天光作为主光，光源来自人物上方或斜上方，柔和覆盖人物头顶、肩部、发丝和上半身衣料，形成自然的日间环境光效果。脸部受光均匀但不平，鼻梁、眼窝和下巴保留轻微阴影。人物正面加入少量反射补光，避免眼部过暗。眼睛中保留细小清亮的高光，背景明亮但不过曝，整体画面干净、自然、生活化，适合日常剧情、白天室外和真实感人物画面。</code></p>\n<h3>3. 阴天漫射光</h3>\n<p><code>【光线布置】以阴天漫射光作为整体环境主光，光源来自厚云层反射后的天空，光线柔和均匀，没有明显硬阴影。人物脸部、服装和背景都被柔和包裹，明暗反差较低，但五官结构和衣料纹理仍然清晰。人物正面不需要强补光，只保留自然的面部层次和眼神光。背景色彩略微压低，整体画面安静、克制、真实，适合生活感剧情、雨后场景、清冷情绪和写实短剧镜头。</code></p>\n<hr>\n<h2>自然光（特殊时段）</h2>\n<h3>4. 黄金时刻逆光</h3>\n<p><code>【光线布置】以日落前后的暖色逆光作为主光，光源位于人物侧后方或正后方，低角度金色阳光打亮人物发丝、肩膀、侧脸轮廓和衣服边缘，形成柔和明亮的金色边缘光。人物正面加入暖色漫反射补光，轻微提亮面部暗部，保留皮肤质感和五官细节。空气中有轻微雾感和光晕，背景虚化并呈现暖调散景，整体画面温暖、浪漫、柔和，适合相遇、回眸、离别和人物高光时刻。</code></p>\n<h3>5. 清晨薄雾光</h3>\n<p><code>【光线布置】以清晨低角度柔光作为主光，光源从画面侧后方穿过薄雾照入，轻轻打亮人物发丝、肩部、脸部侧缘和衣服纹理。光线强度柔和，暗部保留细节，不过曝不过灰。人物正面加入极弱漫反射补光，让面部保持自然透亮。空气中有明显薄雾，光线穿过雾气形成柔和体积光束，背景层次逐渐淡化，整体画面清新、安静、带有清晨的诗意和故事感。</code></p>\n<hr>\n<h2>夜景 / 低照度</h2>\n<h3>6. 月光冷光</h3>\n<p><code>【光线布置】以冷色月光作为主光，光源位于人物侧上方或侧后方，蓝白色光线打亮人物侧脸、发丝、肩膀和衣服边缘。人物正面只保留极弱补光，让暗部不过黑，同时保持夜晚的冷静氛围。眼睛位置保留细小冷色高光，让人物显得清醒、孤独、有距离感。背景整体压暗，远处有微弱环境光和轻微雾气，整体画面冷静、神秘、克制，适合夜戏、独处、悬疑和古风冷感镜头。</code></p>\n<h3>7. 烛光暖光</h3>\n<p><code>【光线布置】以烛火暖光作为主光，光源来自人物面前或侧前方较近的位置，暖黄色光线轻轻照亮人物脸部下方、嘴唇、鼻梁、手指和衣服前襟。光线范围有限，亮部柔和，暗部保留细节，不让脸部变形。人物正面有微弱漫反射补光，保留眼神高光和皮肤纹理。背景保持较暗，远处有少量烛火散景，整体画面温暖、私密、安静，适合夜谈、书信、密会和古风室内戏。</code></p>\n<h3>8. 灯笼环境光</h3>\n<p><code>【光线布置】以灯笼暖光作为主要环境光，光源来自人物侧方、身后或手边的灯笼，暖色光柔和照亮人物侧脸、手部、衣袖和周围环境。人物边缘有轻微暖色轮廓光，正面加入微弱补光，避免脸部死黑。眼睛位置保留柔和眼神光，背景中有多个虚化灯笼光点，空气中带有轻微雾气和暖色光晕，整体画面温暖、节日感、古风感强，适合灯会、夜市、相遇和浪漫剧情。</code></p>\n<h3>9. 火光跳动光</h3>\n<p><code>【光线布置】以火焰暖光作为主光，光源来自人物侧前方或下方的篝火、火把或火盆，橙红色光线照亮人物脸部一侧、手部、衣服褶皱和周围地面。光线具有轻微跳动感，亮暗变化不完全均匀。人物暗部保留细节，不过黑不过脏。眼睛中有细小暖色火光高光，背景保持深色并有少量烟雾，整体画面紧张、原始、危险，适合夜间对峙、逃亡、战前和悬疑镜头。</code></p>\n<hr>\n<h2>城市 / 现代</h2>\n<h3>10. 霓虹侧光</h3>\n<p><code>【光线布置】以霓虹色侧光作为主光，光源来自画面侧方的城市灯牌、霓虹灯或彩色招牌，冷暖混合光线照亮人物侧脸、头发边缘、肩膀和服装表面。人物正面加入极弱补光，保留五官结构和皮肤细节。眼睛位置带有细小彩色高光，背景有虚化霓虹灯点和湿润反光地面，整体画面现代、迷离、情绪化，适合都市夜景、赛博感、雨夜和孤独人物镜头。</code></p>\n<h3>11. 雨夜路灯光</h3>\n<p><code>【光线布置】以雨夜路灯作为主光，光源位于人物侧上方或背后，暖黄色或冷白色灯光穿过雨丝照亮人物头发、肩部、伞面和衣服边缘。人物正面加入微弱环境补光，保证脸部暗部不死黑。眼睛位置保留湿润高光，地面和衣料上有雨水反射，背景压暗并带有虚化灯光，整体画面潮湿、孤独、电影感强，适合雨夜等待、分离、重逢和情绪爆发前的镜头。</code></p>\n<h3>12. 车灯逆光</h3>\n<p><code>【光线布置】以车灯强逆光作为主光，光源位于人物背后或侧后方，强光从低位照来，打亮人物头发边缘、肩部轮廓和腿部边缘，在地面形成长阴影。人物正面加入极弱补光，保留脸部五官和眼神，不让主体完全变成剪影。空气中有雾气、尘埃或雨丝，车灯穿过空气形成可见光束，背景保持暗场，整体画面紧张、危险、具有电影悬疑感，适合追车、对峙、逃亡和夜间动作场景。</code></p>\n<hr>\n<h2>舞台 / 表演</h2>\n<h3>13. 舞台追光</h3>\n<p><code>【光线布置】以舞台追光作为主光，光源从人物正上方或斜上方聚焦照下，集中打亮人物脸部、肩膀、上半身和脚下区域，背景大面积压暗，让主体从黑暗中突出。人物正面加入少量柔和补光，避免眼窝过深。眼睛位置保留清晰高光，空气中有轻微烟雾，追光形成明显体积光柱，整体画面具有舞台感、仪式感和人物高光感，适合登场、表演、觉醒和命运时刻。</code></p>\n<h3>14. 聚光灯硬光</h3>\n<p><code>【光线布置】以聚光灯硬光作为主光，光源位于人物侧上方或正上方，形成集中、边缘清晰的照明区域。光线重点打亮人物脸部、肩膀和身体轮廓，背景快速进入暗部，形成强烈明暗反差。人物正面加入极弱补光，保留暗部五官结构。眼睛有清晰高光，背景保持简洁黑场或暗色空间，整体画面强烈、孤立、有审判感，适合审问、真相揭开、舞台表演和人物心理压力镜头。</code></p>\n<hr>\n<h2>特殊效果</h2>\n<h3>15. 轮廓剪影光</h3>\n<p><code>【光线布置】以强逆光作为主光，光源位于人物正后方，人物正面大部分保持暗部，只在头发、肩膀、侧脸和衣服边缘形成清晰轮廓光。正面补光极弱，只保留少量五官暗部细节，不完全变成黑影。背景光源明亮但不过曝，空气中有雾气或尘埃，让逆光形成柔和光晕。整体画面神秘、安静、具有强烈剪影感，适合人物登场、悬念制造、背影镜头和命运感画面。</code></p>\n<h3>16. 高调棚拍光</h3>\n<p><code>【光线布置】以大面积柔光作为主光，光源位于人物正前方偏上方，均匀打亮人物脸部、皮肤、服装和背景。两侧加入柔和补光，减少面部阴影，让皮肤干净通透。眼睛位置保留明亮眼神光，背景保持浅色、干净、无杂乱阴影。整体光比低，画面明亮、清透、商业感强，适合美妆、人像定妆照、白底人物展示、服装展示和干净高级的商业人物画面。</code></p>\n<h3>17. 低调暗场光</h3>\n<p><code>【光线布置】以窄范围侧光作为主光，光源位于人物侧前方，集中打亮人物半边脸、眼神、手部或关键道具，其他区域大面积进入暗部。暗部保留少量细节，不过黑不过脏。人物正面只加入极弱补光，维持暗场氛围。眼睛位置有细小清晰高光，背景保持深色并弱化细节，整体画面克制、压抑、神秘，适合悬疑、复仇、秘密对话和人物心理戏。</code></p>\n<h3>18. 反射补光</h3>\n<p><code>【光线布置】以侧方自然光作为主光，同时使用地面、墙面、水面或白色反光板形成反射补光。主光负责打亮人物一侧脸部和身体边缘，反射光从人物正面或下方轻柔回填暗部，让面部阴影更柔和。暗部保留皮肤纹理和五官结构，不死黑不过曝。眼睛中有自然反射高光，背景保持真实环境层次，整体画面自然、真实、细腻，适合写实短剧、外景人像和生活感镜头。</code></p>\n<h3>19. 水面反射光</h3>\n<p><code>【光线布置】以水面反射光作为辅助主光，光源来自水面反射后的波动光线，从人物下方或侧下方轻轻映照到脸部、脖颈、衣服和周围墙面。光线带有柔和流动感，亮部有轻微波纹变化，暗部保留细节。人物正面加入极弱补光，保留五官结构和眼神高光。背景保持湿润、安静、带有轻微反光，整体画面梦幻、流动、带有诗意，适合水边、雨后、浴池、庭院和奇幻氛围镜头。</code></p>\n<h3>20. 彩色分离光</h3>\n<p><code>【光线布置】以双色分离光作为主光组合，一侧使用暖色光打亮人物脸部、肩膀和衣服边缘，另一侧使用冷色光勾勒头发、侧脸和背景轮廓。人物正面加入微弱中性补光，保留皮肤质感和五官结构，避免色彩污染过重。眼睛位置保留清晰高光，背景一侧偏冷一侧偏暖，形成明显色彩对比。整体画面具有冲突感、现代感和视觉张力，适合人物对立、情绪撕裂、品牌大片和强风格视觉画面。</code></p>\n<hr>\n<h2>使用方式</h2>\n<ol><li><strong>直接复制</strong> — 找到匹配场景的模板，直接复制 <code>【光线布置】</code> 段落到 prompt 中</li><li><strong>组合使用</strong> — 将主光 + 补光 + 背景光组合，例如\"黄金时刻逆光 + 反射补光\"</li><li><strong>调参微调</strong> — 调整关键参数：光色（暖/冷）、强度（强/柔）、方向（角度偏移）、光比（明暗比例）</li><li><strong>情绪匹配</strong> — 根据镜头情绪选择对应光源：温暖→窗边柔光/烛光；冷静→月光/阴天；紧张→车灯/火光</li></ol>\n<hr>\n<h2>与现有概念的关系</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI打光五法\">AI打光五法</a> — 这个模板库是五法的具体实现，每个模板都对应一种或多种打光方法</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"光线布置模块化\">光线布置模块化</a> — 所有模板遵循相同的模块化结构</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"摄影语言锚定质感\">摄影语言锚定质感</a> — 模板本身是最具体的摄影语言实践</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a> — 灯光词汇表的延伸，提供完整的中文提示词段落而非单个词汇</li></ul>", "描述比重原则": "<h1>描述比重原则</h1>\n<p>AI 生成图片时，画面元素的描述字数要和它的重要性成正比。次要元素描述过多会喧宾夺主，导致 AI 把注意力放错地方。</p>\n<hr>\n<h2>核心内容</h2>\n<p>AI 是按\"字数权重\"来分配注意力的。你写得越多的东西，AI 越觉得它重要。</p>\n<p><strong>标准比例：</strong></p>\n<ul><li>主体描述：50-60%</li><li>次要元素：20-30%</li><li>环境/光线：10-15%</li><li>情绪氛围：5-10%</li></ul>\n<p><strong>关键规则：</strong></p>\n<ul><li>次要元素的描述字数，永远不能超过主体</li><li>不重要的元素，能不写就不写</li><li>如果某个元素抢戏了，第一反应是减少它的描述字数，而不是增加主体的描述</li></ul>\n<hr>\n<h2>为什么重要</h2>\n<p>很多人做 AI 出图的误区是\"每个元素都写清楚\"，但实际上写得越清楚，AI 越容易把次要元素当成主体。</p>\n<p>比如：</p>\n<ul><li>描述手部细节写了 40%，手就会变成画面主体</li><li>背景写得太详细，背景就会抢前景的戏</li><li>情绪词堆砌太多，画面就会过度渲染</li></ul>\n<hr>\n<h2>应用场景</h2>\n<h3>场景图生成</h3>\n<ul><li>主体（产品/植物/人物）：详细描述形态、材质、颜色</li><li>环境：只写大的场景关系，不写细节</li><li>光线：简单描述类型和方向</li></ul>\n<h3>多元素构图</h3>\n<ul><li>先确定谁是主角，谁是配角</li><li>主角的描述字数要明显多于配角</li><li>配角只写\"有什么\"，不写\"长什么样\"</li></ul>\n<h3>文字预留设计</h3>\n<ul><li>需要放文字的区域，描述要简洁、均匀</li><li>不要写\"留白\"、\"空区域\"这类刻意的词</li><li>用自然的均匀元素（天空、墙面、水面）来形成文字区域</li></ul>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：每个元素都详细描述</h3>\n<ul><li>结果：所有元素权重一样，画面没有重点</li><li>正确做法：主体详细，次要简略</li></ul>\n<h3>❌ 误区 2：发现元素抢戏，就增加主体描述</h3>\n<ul><li>结果：整体字数膨胀，比例还是不对</li><li>正确做法：减少次要元素的描述，而不是增加主体的</li></ul>\n<h3>❌ 误区 3：用\"主体\"、\"主要\"这类词来强调</h3>\n<ul><li>结果：AI 对这类词不敏感，效果很差</li><li>正确做法：用字数比例来控制，比什么词都管用</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"燃烧场景铁律\">燃烧场景铁律</a> — 燃烧场景下的比重控制</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"诗意写实风格\">诗意写实风格</a> — 诗意写实风格的权重分配公式</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"协作流程\">协作流程</a> — 提示词结构的主次顺序规则</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"岩玫瑰海岸场景\">岩玫瑰海岸场景</a> — 手部比重调整的实战案例</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"00-婷美出图工作流\">00-婷美出图工作流</a> — 婷美主图出图流程中的比重控制应用</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"琥珀光影展台提示词矩阵\">琥珀光影展台提示词矩阵</a> — 电商主图提示词组合中的比重分配</li></ul>", "视觉描述优先原则": "<h1>视觉描述优先原则</h1>\n<p>AI 生成图片时，需要的是\"视觉画面\"，不是\"文字描述\"。技术术语、抽象形容词、文学化表达，都会让 AI 跑偏。越具体、越视觉化、越像\"你眼睛看到的东西\"，效果越好。</p>\n<hr>\n<h2>核心内容</h2>\n<p>AI 模型是在图像数据上训练的，它对\"视觉特征\"的理解远好于对\"文字概念\"的理解。</p>\n<p><strong>什么是好的描述：</strong></p>\n<ul><li>你闭上眼睛能想象出画面的词</li><li>具体的、可感知的视觉特征</li><li>比如：<code>paper-thin</code>、<code>golden stamens</code>、<code>soft diffused light</code></li></ul>\n<p><strong>什么是坏的描述：</strong></p>\n<ul><li>抽象的、概念性的词</li><li>技术术语、专业词汇</li><li>文学化、情绪化的表达</li><li>比如：<code>elegant</code>、<code>poetic</code>、<code>filaments</code>、<code>anthers</code></li></ul>\n<hr>\n<h2>为什么重要</h2>\n<p>很多人以为\"描述越详细，效果越好\"，但实际上正好相反。</p>\n<p><strong>原因：</strong></p>\n<ol><li>技术术语在训练数据里出现得少，AI 理解不准确</li><li>抽象形容词每个人的理解都不一样，AI 会按它的理解来，不一定是你要的</li><li>文学化表达会让 AI 过度渲染，失去真实感</li></ol>\n<p><strong>核心洞察：描述错误比不描述问题还大。</strong></p>\n<hr>\n<h2>应用场景</h2>\n<h3>产品图生成</h3>\n<ul><li>不要详细描述产品的每个细节</li><li>用极简提示词 + 参考图的策略</li><li>让 AI 从参考图学习细节，而不是从文字描述</li></ul>\n<h3>植物/自然场景</h3>\n<ul><li>不要用植物学/生物学的专业术语</li><li>用视觉化的描述：颜色、形状、质感</li><li>比如不说 <code>filaments and anthers</code>，说 <code>golden stamens</code></li></ul>\n<h3>风格定义</h3>\n<ul><li>不要用抽象的风格词（<code>poetic</code>、<code>lyrical</code>、<code>cinematic</code>）</li><li>用具体的视觉元素来定义风格</li><li>比如不说 <code>poetic atmosphere</code>，说 <code>soft diffused light, quiet, calm</code></li></ul>\n<hr>\n<h2>词汇对比</h2>\n<h3>光线</h3>\n<table><thead><tr><th>❌ 不好</th><th>✅ 好</th></tr></thead><tbody><tr><td>`professional lighting`</td><td>`soft diffused light`</td></tr><tr><td>`dramatic light`</td><td>`golden stamens catching the pale light`</td></tr><tr><td>`bright sunlight`</td><td>`light as if filtered through gauze`</td></tr></tbody></table>\n<h3>质感</h3>\n<table><thead><tr><th>❌ 不好</th><th>✅ 好</th></tr></thead><tbody><tr><td>`ultra-detailed`</td><td>`paper-thin and crinkled like silk`</td></tr><tr><td>`plump anthers`</td><td>`dense golden stamens`</td></tr><tr><td>`perfect texture`</td><td>`subtle natural texture`</td></tr></tbody></table>\n<h3>姿态</h3>\n<table><thead><tr><th>❌ 不好</th><th>✅ 好</th></tr></thead><tbody><tr><td>`elegant pose`</td><td>`naturally resting`</td></tr><tr><td>`perfectly arranged`</td><td>`lean naturally, some facing away`</td></tr><tr><td>`graceful`</td><td>`unguarded, as if glimpsed in passing`</td></tr></tbody></table>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：用专业术语显得更准确</h3>\n<ul><li>结果：AI 反而理解错了，生成奇怪的东西</li><li>正确做法：用大白话的视觉描述，比专业术语管用</li></ul>\n<h3>❌ 误区 2：形容词越多越有氛围感</h3>\n<ul><li>结果：AI 过度渲染，画面假、刻意</li><li>正确做法：氛围词要克制，3-5 个就够了</li></ul>\n<h3>❌ 误区 3：把参考图里的细节都用文字描述一遍</h3>\n<ul><li>结果：文字描述和参考图打架，AI 不知道听谁的</li><li>正确做法：参考图能表达的，文字就不要重复写</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"白底产品照技能\">白底产品照技能</a> — 极简提示词 + 参考图策略的完整应用</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"岩玫瑰海岸场景\">岩玫瑰海岸场景</a> — 技术术语 vs 视觉描述的实战对比</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"诗意写实风格\">诗意写实风格</a> — 禁用词和推荐词的完整清单</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"参考图优先原则\">参考图优先原则</a> — 为什么图比文字更准确</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"00-婷美出图工作流\">00-婷美出图工作流</a> — 婷美主图出图流程中的视觉化描述应用</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"琥珀光影展台提示词矩阵\">琥珀光影展台提示词矩阵</a> — 电商主图提示词的视觉化表达</li></ul>", "参考图优先原则": "<h1>参考图优先原则</h1>\n<p>对于视觉任务，一张参考图比一千字的描述都管用。能图生图，就不要纯文字生图。参考图是控制 AI 输出最准确、最高效的方式。</p>\n<hr>\n<h2>核心内容</h2>\n<p>文字描述天生就有歧义，每个人对同一个词的理解都不一样。但图片没有歧义，AI 看到图片就知道你要什么。</p>\n<p><strong>参考图的作用：</strong></p>\n<ol><li><strong>控制形态</strong> — 产品长什么样、形状、比例</li><li><strong>控制质感</strong> — 材质、光泽、表面细节</li><li><strong>控制角度</strong> — 视角、透视、构图</li><li><strong>控制风格</strong> — 整体视觉调性、色彩倾向</li></ol>\n<p><strong>视频场景的关键帧垫图规则</strong>：如果已有故事板垫图或关键帧图像作为参考，视频提示词只需描写核心动作和摄像机运动（人物做了什么、怎么做的、镜头怎么动），不要重复描写画面背景、人物外观、光线、色调——这些已经在垫图里了。重复描写会导致垫图和文字冲突，AI 不知道该听谁的。只写动作、运动方向、因果链、摄像机运动即可。</p>\n<hr>\n<h2>为什么重要</h2>\n<p><strong>文字描述的问题：</strong></p>\n<ul><li>有歧义：每个人对\"优雅\"、\"自然\"的理解都不一样</li><li>不精确：你写 100 字，也不如一张图说的清楚</li><li>容易误解：AI 可能按字面意思理解，而不是你想要的意思</li></ul>\n<p><strong>参考图的优势：</strong></p>\n<ul><li>无歧义：是什么样就是什么样</li><li>精度高：细节、比例、质感都能准确传达</li><li>效率高：找一张图，比写 100 字描述快得多</li></ul>\n<hr>\n<h2>应用场景</h2>\n<h3>产品图生成</h3>\n<ul><li>必须有清晰的正视实拍图作为主参考</li><li>俯视图、侧视图作为辅助参考</li><li>多角度生成时，用已生成的满意图作为主参考，保持一致性</li></ul>\n<h3>风格迁移</h3>\n<ul><li>用参考图来定义你想要的风格</li><li>比用文字描述风格准确得多</li></ul>\n<h3>系列图片一致性</h3>\n<ul><li>第一张图确定后，后续图都用它作为参考</li><li>保证同一系列的产品形态、质感、风格一致</li></ul>\n<hr>\n<h2>参考图使用策略</h2>\n<h3>主次参考图</h3>\n<ul><li><strong>主参考图</strong>：决定整体形态、质感、风格的核心参考</li><li><strong>辅助参考图</strong>：只提供某一方面的参考（角度、细节、局部）</li><li>必须在提示词里明确说明：\"第一张图是主参考，第二张图仅用于角度参考\"</li></ul>\n<h3>参考图选择</h3>\n<ul><li>主参考图必须是目标角度的清晰图片</li><li>不要用错误角度的图作为主参考</li><li>参考图越清晰，效果越好</li></ul>\n<h3>图生图 + 文字提示</h3>\n<ul><li>图生图不是\"完全照着画\"</li><li>文字提示用来控制变化的部分</li><li>不变的部分靠参考图，变化的部分靠文字</li></ul>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：一张参考图搞定所有角度</h3>\n<ul><li>结果：生成的角度总是和参考图差不多</li><li>正确做法：不同角度要有对应角度的参考图，或者用已生成的图 + 角度描述</li></ul>\n<h3>❌ 误区 2：参考图越多越好</h3>\n<ul><li>结果：多张参考图互相打架，AI 不知道听谁的</li><li>正确做法：1 张主参考 + 1-2 张辅助参考就够了</li></ul>\n<h3>❌ 误区 3：有了参考图就不用写提示词了</h3>\n<ul><li>结果：AI 完全照搬参考图，没有你想要的变化</li><li>正确做法：参考图控不变的部分，提示词控变化的部分</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"白底产品照技能\">白底产品照技能</a> — 参考图策略的完整应用</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"一致性锚点原则\">一致性锚点原则</a> — 用参考图保持系列图片的一致性</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"视觉描述优先原则\">视觉描述优先原则</a> — 为什么视觉信息比文字信息准确</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"岩玫瑰海岸场景\">岩玫瑰海岸场景</a> — 工具选择比提示词更重要的案例</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"00-婷美出图工作流\">00-婷美出图工作流</a> — 婷美主图出图流程中的垫图策略</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"琥珀光影展台提示词矩阵\">琥珀光影展台提示词矩阵</a> — 电商主图生成中的参考图应用</li></ul>", "克制原则": "<h1>克制原则</h1>\n<p>AI 对\"程度词\"和\"动态词\"的理解容易走极端。说\"不要太大\"，它可能就给你弄没了；说\"有点火\"，它可能就给你烧成灾难现场。所以要用静态的、状态的、克制的描述，不要用动态的、动作的、强烈的词。</p>\n<hr>\n<h2>核心内容</h2>\n<p>AI 的\"反向修正\"能力很差。你说\"不要 A\"，它可能直接跳到\"完全相反的 Z\"，而不是\"稍微少一点 A\"。</p>\n<p><strong>两个关键表现：</strong></p>\n<ol><li><strong>极端化</strong>：程度词容易被放大</li><li><strong>动态化</strong>：动作词容易被夸张</li></ol>\n<p><strong>应对策略：</strong></p>\n<ul><li>用静态描述，不用动态描述</li><li>用状态描述，不用动作描述</li><li>直接说你要什么，不说你不要什么</li><li>程度要克制，不要用强烈的词</li></ul>\n<hr>\n<h2>为什么重要</h2>\n<p>很多人做 AI 出图的问题是\"用力过猛\"：</p>\n<ul><li>想让画面有氛围，就堆一堆情绪词</li><li>想让火小一点，就写\"不要大火\"</li><li>想让手小一点，就写\"手很小\"</li></ul>\n<p>结果往往适得其反：</p>\n<ul><li>情绪词堆太多 → 画面过度渲染，假</li><li>说\"不要大火\" → AI 可能理解成\"有火\"，反而更大</li><li>说\"手很小\" → AI 可能直接让手消失了</li></ul>\n<hr>\n<h2>应用场景</h2>\n<h3>燃烧/火焰场景</h3>\n<ul><li>❌ 不用：<code>spreading</code>、<code>catching fire</code>、<code>consuming</code>、<code>engulfing</code></li><li>✅ 要用：<code>with flames</code>、<code>occasional</code>、<code>a few</code></li><li>用静态描述（with），不用动作描述（spreading）</li></ul>\n<h3>程度调整</h3>\n<ul><li>❌ 不说：\"不要太大\"、\"再小一点\"</li><li>✅ 要说：具体的比例或位置描述</li><li>比如不说\"手小一点\"，说\"hand partially visible from bottom edge\"</li></ul>\n<h3>氛围营造</h3>\n<ul><li>❌ 不用：<code>dramatic</code>、<code>epic</code>、<code>melancholic</code>、<code>moody</code></li><li>✅ 要用：<code>quiet</code>、<code>calm</code>、<code>serene</code>、<code>soft diffused light</code></li><li>氛围词要克制，3-5 个就够了</li></ul>\n<h3>文字预留</h3>\n<ul><li>❌ 不说：<code>providing clean space</code>、<code>blank area for text</code></li><li>✅ 要说：自然的均匀元素描述</li><li>比如 <code>uniform overcast sky</code>、<code>calm water surface</code></li></ul>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：用否定词来调整</h3>\n<ul><li>问题：AI 对否定词的理解很差，容易反向极端化</li><li>正确做法：直接描述你想要的状态，不说你不要什么</li></ul>\n<h3>❌ 误区 2：动态词比静态词更生动</h3>\n<ul><li>问题：动态词会让 AI 把动作夸张化，失去控制</li><li>正确做法：用静态的状态描述，比动态的动作描述更可控</li></ul>\n<h3>❌ 误区 3：氛围词越多越有感觉</h3>\n<ul><li>问题：氛围词堆太多，画面会过度渲染，显得假、刻意</li><li>正确做法：氛围词要克制，用具体的光线、色彩、场景来营造氛围，而不是直接说\"有氛围\"</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"摄影语言锚定质感\">摄影语言锚定质感</a> — 用摄影参数替代抽象词，克制原则的具体实践</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"反向约束\">反向约束</a> — 明确说不要什么，与克制原则互补（克制管描述，反向约束管禁止）</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"燃烧场景铁律\">燃烧场景铁律</a> — 燃烧场景的克制策略</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"诗意写实风格\">诗意写实风格</a> — 诗意写实风格的克制度把握</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"协作流程\">协作流程</a> — 极端化问题的应对方法</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"文字预留技巧\">文字预留技巧</a> — 文字区域的自然呈现方式</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"描述比重原则\">描述比重原则</a> — 字数权重的克制</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"00-婷美出图工作流\">00-婷美出图工作流</a> — 婷美主图出图流程中的极端化检查</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"琥珀光影展台提示词矩阵\">琥珀光影展台提示词矩阵</a> — 电商主图提示词中的克制原则应用</li></ul>", "一致性锚点原则": "<h1>一致性锚点原则</h1>\n<p>同一系列的图片，必须有一个\"锚点\"来保持风格一致。这个锚点可以是一张参考图、一组关键词、或者一个成功案例。没有锚点，AI 每次生图的随机性会导致系列图片风格不统一。</p>\n<hr>\n<h2>核心内容</h2>\n<p>AI 每次生图都有随机性。如果没有锚点，同一系列的 4 张图可能风格完全不一样，像 4 个人做的。</p>\n<p><strong>什么是锚点：</strong></p>\n<ul><li>一张已确认的参考图（最有效）</li><li>一组固定的风格关键词</li><li>一个成功的提示词模板</li><li>一个明确的风格定义</li></ul>\n<p><strong>锚点的作用：</strong></p>\n<ul><li>保持色调一致</li><li>保持光线一致</li><li>保持质感一致</li><li>保持构图风格一致</li></ul>\n<hr>\n<h2>为什么重要</h2>\n<p>做系列图片（比如小红书 4 图、产品 9 宫格、品牌视觉）时，一致性是最基本的要求。</p>\n<p><strong>没有锚点的问题：</strong></p>\n<ul><li>每张图的色调都不一样</li><li>有的亮有的暗</li><li>有的写实有的卡通</li><li>放在一起看很割裂，不像同一个系列</li></ul>\n<p><strong>有了锚点的好处：</strong></p>\n<ul><li>整体视觉统一</li><li>品牌感强</li><li>专业度高</li></ul>\n<hr>\n<h2>应用场景</h2>\n<h3>系列产品图</h3>\n<ul><li>用第一张满意的产品图作为主参考</li><li>后续所有角度的图都用它来保持产品形态、质感的一致性</li><li>9 宫格测试法就是这个原理</li></ul>\n<h3>同风格多场景</h3>\n<ul><li>先确定第一张成功的图作为风格基准</li><li>提取关键风格元素：色调、光线、构图</li><li>后续图片都要包含这些元素</li></ul>\n<h3>品牌视觉</h3>\n<ul><li>建立品牌风格定义文档</li><li>所有品牌相关的图片都要对齐这个定义</li><li>包括：色彩、光线、质感、构图、情绪</li></ul>\n<hr>\n<h2>建立锚点的方法</h2>\n<h3>方法 1：参考图锚点（最推荐）</h3>\n<ul><li>生成第一张图，直到满意</li><li>用这张图作为后续所有图的主参考</li><li>优点：最准确、最直观</li><li>缺点：需要先生成一张满意的图</li></ul>\n<h3>方法 2：关键词锚点</h3>\n<ul><li>提炼出 3-5 个核心风格关键词</li><li>每张图的提示词里都必须包含这些词</li><li>优点：简单、灵活</li><li>缺点：不如参考图准确</li></ul>\n<h3>方法 3：模板锚点</h3>\n<ul><li>把成功的提示词做成模板</li><li>每次只替换场景部分，风格部分保持不变</li><li>优点：效率高</li><li>缺点：容易僵化</li></ul>\n<h3>🔹 批量生成技巧：全局风格只写一次</h3>\n<p>九宫格预览或多图批量生成时，全局风格（视觉风格、色彩方案、光线氛围）只写一次即可，不在每个格子/每张图中重复描述。</p>\n<p><strong>为什么：</strong></p>\n<ul><li>重复描述会稀释注意力，AI 把每个格子当成独立画面处理</li><li>全局风格写在末尾统一描述，AI 理解这是一组统一风格的系列图</li></ul>\n<p><strong>做法：</strong></p>\n<pre><code>[逐屏内容]\nFrame 1: ...\nFrame 2: ...\nFrame 3: ...\n\n[全局风格统一描述]\nGlobal style (applies to all frames): [风格关键词]. [色彩方案]. [光线氛围].</code></pre>\n<p><strong>注意：</strong></p>\n<ul><li>特殊屏幕（如成分屏）的特殊视觉要求，需要在对应 Frame 中单独标注</li><li>但全局通用风格（色调、光线、整体氛围）只写一次</li></ul>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：每张图都重新写提示词</h3>\n<ul><li>结果：每张图的风格都不一样</li><li>正确做法：确定一个基准后，后续图都在基准上微调</li></ul>\n<h3>❌ 误区 2：只靠文字描述保持一致</h3>\n<ul><li>结果：文字描述有歧义，AI 每次理解都不一样</li><li>正确做法：用参考图作为锚点，比文字准确得多</li></ul>\n<h3>❌ 误区 3：锚点太多</h3>\n<ul><li>结果：多个锚点互相矛盾，AI 不知道听谁的</li><li>正确做法：一个系列只有一个主锚点，其他都是辅助</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"参考图优先原则\">参考图优先原则</a> — 为什么参考图是最好的锚点</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"角色锚定\">角色锚定</a> — 锚点原则在角色一致性场景下的具体应用</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"白底产品照技能\">白底产品照技能</a> — 9 宫格测试法的一致性策略</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"诗意写实风格\">诗意写实风格</a> — 系列图片风格一致性的方法</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"出图工作流\">出图工作流</a> — 同批次一致性的要求</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"协作流程\">协作流程</a> — 风格一致性规则</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"00-婷美出图工作流\">00-婷美出图工作流</a> — 婷美主图批量生成的一致性控制</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"琥珀光影展台提示词矩阵\">琥珀光影展台提示词矩阵</a> — 电商主图系列的风格锚点</li></ul>", "摄影语言锚定质感": "<h1>摄影语言锚定质感</h1>\n<p>获取照片真实质感的方法：<strong>用摄影镜头语言（镜头/光线/构图/胶片）替代\"超逼真\"等抽象词。</strong></p>\n<h2>核心原则</h2>\n<p>当想要真实质感时，用摄影语言比用形容词效果要好得多：</p>\n<ul><li><strong>不要写</strong>：\"超逼真、照片级画质\"</li><li><strong>要写</strong>：\"35mm 胶片照片、中景、视线高度、50mm 镜头、柔和海岸光、前景深、轻微胶片质感\"</li><li><strong>反向约束</strong>：\"不要美化、不要重度修图、不要电影光、不要戏剧化成分、不要风格化构图\"</li></ul>\n<h2>和克制原则的关系</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a> 要求用静态的、状态化的描述避免 AI 走极端。摄影语言锚定质感就是这一原则的具体实践——用具体的摄影参数替代抽象的程度词。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "Gobo投影光影": "<h1>Gobo投影光影</h1>\n<p>Gobo（Go-Between）是放在光源前的图案模板，用来产生特定形状的投影光影。在产品摄影和商业出图中，Gobo 光影可以快速提升画面的质感和氛围。</p>\n<h2>核心原理</h2>\n<p>不是写提示词描述光影效果，而是<strong>用一张光影参考图作为垫图</strong>，让模型直接参考那张图的光影形状来渲染。</p>\n<h2>完整提示词模板</h2>\n<h3>图生图（已有图片加光影）</h3>\n<pre><code>给上传的这张图加上戏剧性的投影光影。\n只编辑这张图，只改灯光。\n保持构图、相机角度、透视、主体、轮廓、材质、标签、文字完全不变。\n保持背景色调不变，不要重新设计背景。\n不要添加、删除或重新设计任何元素。\n只使用上传的光影参考图来塑造投影光和阴影形状。\n光影必须是真实的投影光包裹在 3D 表面上的效果，不能是平面叠加贴图。\n\n光源方向：[左侧/右侧/顶部/后方]\n光线质感：[锐利/柔和/雾化]\n覆盖范围：[背景为主/主体为主/全画面]\n环境补光：[低/中/高]\n氛围：[空气干净/薄雾/水汽]\n情绪：[高端商业/时尚/自然/梦幻]\n\n保持产品标签和 Logo 的可读性。\n只改灯光和阴影，其他一切不变。</code></pre>\n<h3>文生图（直接生成带光影的新图）</h3>\n<pre><code>生成一张新的场景图，光影参考上传的光影参考图。\n场景：[你的场景描述]\n光源方向：[左侧/右侧/顶部]\n光线质感：[锐利/柔和/雾化]\n覆盖范围：[主体和墙面/全画面]\n环境补光：[低/中/高]\n氛围：[薄雾/水汽/空气干净]\n情绪：[高级静奢/自然/时尚]\n光影必须是真实的投影光，不能是平面贴图。</code></pre>\n<h2>参数调节</h2>\n<table><thead><tr><th>参数</th><th>选项</th><th>效果</th></tr></thead><tbody><tr><td>光线质感</td><td>锐利 / 柔和 / 雾化</td><td>锐利=百叶窗感，柔和=商业感，雾化=梦幻感</td></tr><tr><td>覆盖范围</td><td>背景为主 / 主体为主 / 全画面</td><td>控制光影打在哪儿</td></tr><tr><td>环境补光</td><td>低 / 中 / 高</td><td>低=对比强，高=画面亮</td></tr><tr><td>氛围</td><td>空气干净 / 薄雾 / 水汽</td><td>影响画面通透感</td></tr></tbody></table>\n<h2>光影类型与场景匹配</h2>\n<table><thead><tr><th>光影类型</th><th>适合场景</th></tr></thead><tbody><tr><td>百叶窗光</td><td>时尚人像、产品、酒店、黑色电影</td></tr><tr><td>窗格光</td><td>香水/护肤品、室内场景、建筑感</td></tr><tr><td>植物叶影</td><td>度假风、热带、美妆、自然感</td></tr><tr><td>水波光</td><td>spa、浴室、泳池、高级感</td></tr><tr><td>线性光</td><td>极简产品、科技感、舞台光</td></tr><tr><td>抽象光影</td><td>实验性、烟雾感、梦幻</td></tr></tbody></table>\n<h2>素材来源</h2>\n<p>本仓库 <code>Temp/dramatic-gobo-lighting/assets/gobos/</code> 下有 64 张 Gobo 素材图可直接使用，也支持自己找任意光影参考图来垫。</p>", "反向约束": "<h1>反向约束</h1>\n<p>写提示词时<strong>明确说不要什么</strong>，比只说要什么更有效。</p>\n<h2>核心原则</h2>\n<p>AI 模型在生成时倾向于\"自由发挥\"，反向约束就是主动告诉模型边界在哪里：</p>\n<ul><li><strong>编辑任务</strong>：\"不要改变任何其他元素\"（关键句）</li><li><strong>照片真实</strong>：\"不要美化、不要重度修图、不要电影光、不要戏剧化成分、不要风格化构图\"</li><li><strong>Logo/广告</strong>：\"不要额外文字、不要水印、不要 Logo\"</li><li><strong>角色一致性</strong>：\"不要重新设计我的角色\"</li><li><strong>产品图</strong>：\"不要重新设计产品风格\"</li><li><strong>草图渲染</strong>：\"不要添加额外的新元素或者文字\"</li></ul>\n<p>约束越紧，模型执行越准。不完美的时候，<strong>收紧约束</strong>比\"再说一遍\"更有效。</p>\n<h2>和克制原则的关系</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a> 是从<strong>描述角度</strong>（用静态克制动态）约束 AI，反向约束是从<strong>禁止角度</strong>（明确说不要什么）约束 AI。两者互补。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "提示词模板八要素": "<h1>提示词模板八要素</h1>\n<p>图像生成提示词的标准化模板结构，从 OpenAI 28 个官方案例中提炼。适用于各类图像生成模型。</p>\n<h2>八要素</h2>\n<table><thead><tr><th>#</th><th>要素</th><th>说明</th><th>示例</th></tr></thead><tbody><tr><td>1</td><td>**交付物**</td><td>生成什么类型的图</td><td>融资详情页、手机界面、教学图</td></tr><tr><td>2</td><td>**受众**</td><td>谁在看这张图</td><td>学生、客户、投资人</td></tr><tr><td>3</td><td>**画布**</td><td>尺寸和规格</td><td>横版/竖版/手机框/海报</td></tr><tr><td>4</td><td>**文字**</td><td>必须出现的文字（用引号逐字引用）</td><td>\"品牌名\"、\"标语\"</td></tr><tr><td>5</td><td>**层级**</td><td>内容结构</td><td>标题、图表、说明、角标、留白</td></tr><tr><td>6</td><td>**视觉**</td><td>视觉语言</td><td>白底、低饱和度、无装饰噪声</td></tr><tr><td>7</td><td>**数据**</td><td>真实数据直接写入</td><td>2021-2026年柱状图数据</td></tr><tr><td>8</td><td>**质量档次**</td><td>低/中/高档选择</td><td>小字密集用高档</td></tr></tbody></table>\n<h2>使用方式</h2>\n<p>模板不是顺序填空，而是检查清单。写提示词时逐一检查这八个要素是否都已覆盖。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "AI角色资产搭建": "<h1>AI 角色资产搭建</h1>\n<p>AI 短剧/视频的第一步不是直接生成视频，而是先搭建人物资产。一个完整的人物资产至少包含三样东西：人物的脸、人物的发型和妆造、人物的服装和整体轮廓。</p>\n<hr>\n<h2>人物资产三件套</h2>\n<p>不建议只生成一张人物图（信息量不够）。更好的做法是把三张拆开生成，最后再融合：</p>\n<ol><li><strong>脸部三视图</strong> — 包含脸部、妆造和发饰</li><li><strong>全身三视图</strong> — 固定人物的服装结构</li><li><strong>融合输出</strong> — 将前两者融合为稳定的人物锚点</li></ol>\n<p><strong>注意</strong>：不要一开始就追求特别复杂的造型。元素越多，生成视频时越容易崩。真正高级的短剧人物不是元素越多越好，而是<strong>特征要清晰</strong>。比如女主可以固定三个记忆点：高颅顶黑发、金色古风头饰、浅色系长裙。</p>\n<hr>\n<h2>男/女角色妆造差异</h2>\n<p><strong>男性角色</strong>的妆造重点不在脸上，而在服装和发型。妆面太重容易失去角色本身的质感。男性角色真正撑住气场的三个部分：</p>\n<ul><li><strong>发型</strong> — 高马尾利落有力量感、半披发清冷疏离、发冠束发端正有家世、凌乱散发受伤疲惫</li><li><strong>服装</strong> — 盔甲代表将军、劲装代表侠客、长袍代表文人公子、暗纹黑衣代表刺客、宽袖官服代表权臣</li><li><strong>配饰</strong> — 剑、玉佩、发冠、披风、腰带、护腕、扳指，都能帮助建立身份</li></ul>\n<p>示例：</p>\n<ul><li>少年将军 → 妆造更利落，发型束起，服装有硬挺感</li><li>病弱公子 → 妆造更干净克制，发型松一点，服装颜色淡一点</li></ul>\n<p><strong>女性角色</strong>需要的更多，不只是服装状态，更要注重面部妆容和发饰。身份、性格和阶层往往靠妆面和发饰传递。需要写清楚的几个方面：</p>\n<ul><li>服装：颜色、材质、款式、刺绣、层次</li><li>发型：高髻、低髻、披发、编发、盘发</li><li>发饰：金步摇、玉簪、珍珠、银饰、花钿</li><li>妆面：眉形、眼妆、唇色、腮红、妆容完整度</li><li>状态：端庄、疲惫、刚哭过、刚赴宴、刚逃亡、刚醒来</li></ul>\n<p>示例：</p>\n<ul><li>宫廷贵妃 → 眉眼更精致，有被规矩养出来的贵气</li><li>落魄千金 → 妆可以有一点残次</li></ul>\n<p><strong>进阶</strong>：妆造不仅要符合身份，还要符合人物当下的状态。同样是贵妃，刚参加完宫宴和刚经历失宠，妆造一定不一样。<strong>身份决定妆造方向，状态决定妆造细节。</strong></p>\n<hr>\n<h2>妆造提示词公式</h2>\n<p>写角色妆造时，不要只写\"好看的脸\"\"精致五官\"\"高级感\"。这些词太空泛，AI 很难准确理解。使用以下公式：</p>\n<blockquote>**角色身份 + 服装材质 + 发型发饰 + 面部妆容 + 色彩气质 + 当前状态 + 画面质感**</blockquote>\n<p>示例：</p>\n<pre><code>古风女贵妃，深红色宫装，金线刺绣，发髻高盘，点缀金步摇，\n妆面完整，唇色浓郁，眼神平静克制，刚参加完宫宴，柔和光影，细腻质感。</code></pre>\n<p>这段提示词不只是写了\"她是谁\"，还写了她穿什么、戴什么、妆容怎样、处在什么状态。</p>\n<h3>男性角色示例</h3>\n<ul><li><strong>清冷侠客</strong>：年轻男性，黑色窄袖劲装，半披长发，银色发扣，衣料有轻微磨损，腰间佩剑，神情疏离，眼神克制，冷色调画面，江湖氛围。</li><li><strong>世家公子</strong>：年轻男性，月白色长袍，玉冠束发，衣服有浅色暗纹，手持折扇，面容清俊，气质温和疏离，庭院背景，光线柔和。</li></ul>\n<blockquote>男性角色的写法：**不要急着给脸加妆，要先让服装和发饰说明他的身份。**</blockquote>\n<h3>女性角色示例</h3>\n<ul><li><strong>宫宴贵妃</strong>：深红色宫装，金线刺绣，高盘发髻，金步摇，妆面完整，眼妆精致，唇色浓郁，神情端庄克制，刚参加完宫宴，华丽宫殿背景，柔和灯火。</li><li><strong>失宠贵妃</strong>：暗红色旧宫装，发髻略微松散，金饰减少，妆面不完整，唇色偏淡，眼神疲惫，坐在冷清宫室中，窗外微光，画面安静压抑。</li></ul>\n<blockquote>女性角色的写法：**同样的五官，换一套妆造就换了一个角色。** 服装颜色、发型发饰、妆面完整度、当前状态都要写清楚。</blockquote>\n<hr>\n<h2>状态决定细节</h2>\n<p>真正让角色鲜活的，不是\"他是谁\"，而是\"他刚经历了什么\"。<strong>身份决定妆造方向，状态决定妆造细节。</strong></p>\n<table><thead><tr><th>角色</th><th>场景</th><th>妆造表现</th></tr></thead><tbody><tr><td>世家公子</td><td>刚赴完宴</td><td>月白长袍、玉冠束发、衣袍整洁，气质温润</td></tr><tr><td>世家公子</td><td>刚被责罚</td><td>发冠微乱、衣袖褶皱、外袍颜色更沉，眼神压抑</td></tr><tr><td>大家闺秀</td><td>春日宴后</td><td>妆面完整、发饰精致、衣服柔和，端庄温婉</td></tr><tr><td>大家闺秀</td><td>得知变故</td><td>发饰减少、唇色变淡、衣裙更素，眼神隐忍</td></tr></tbody></table>\n<hr>\n<h2>角色\"活人感\"</h2>\n<p>人只要活着就一定在顺便做某件事。很多 AI 人物的问题在于虽然长得像人，却没有任何生活状态——这就是\"人物待机感\"。</p>\n<p><strong>核心公式</strong>：人物 + 正在做的小事 + 下意识反应 + 情绪落点</p>\n<p>真正重要的不是动作本身，而是<strong>行为动机</strong>。比如同样是喝咖啡，干喝是摆拍，边看前面边无意识转杯子才像真人。</p>\n<p><strong>多人物</strong>：不要让每个人都在那里表演。不要一个人行动、另一个人反应。多人物提示词的关键不是动作越多越真实，而是人物之间要有<strong>反应</strong>。</p>\n<blockquote>活人感的具体动作写法（四层动态、对手戏调度）详见 [[AI视频动作设计]]</blockquote>\n<p><strong>⚠️ 动作重复陷阱</strong>：同一个\"活人感\"动作不要反复出现。频繁叹气、频繁摸头发、频繁转头——再真实的动作，连续出现 3 次以上就会变成模板化，观众会明显察觉到\"他又在叹气了\"。正确做法是<strong>一段提示词里只使用 1 次活人感动作</strong>，其余靠场景互动和动作逻辑驱动自然感。如果 AI 生成的视频里某个动作反复出现，说明提示词里该动作的描述权重过高，需要降低或分散到其他动作上。</p>\n<hr>\n<h2>微表情三控（视频版）</h2>\n<p>AI 视频的底层逻辑缺陷：它不懂\"克制\"。过强的情绪指令（如 \"Angry\", \"Laughing\"）会被 AI 每一帧都尝试强化，最终导致\"情绪过载\"——笑容越张越大直到崩坏，或全程 100% 强度纹丝不动像动态面具。微表情控制不仅是为了真实，更是为了\"稳\"。</p>\n<h3>方法一：控制情绪强度</h3>\n<p><strong>问题</strong>：AI 默认\"最大值\"。写下 <code>A girl laughing loudly</code>，AI 会从第 1 秒到第 5 秒维持 100% 笑容强度，缺乏呼吸感和回落瞬间。</p>\n<p>❌ 错误写法（导致油腻感）：</p>\n<pre><code>Beautiful woman smiling happily at the camera.</code></pre>\n<p>→ 像拍广告僵硬假笑的模特，笑容没有任何变化。</p>\n<p>✅ 正确写法（用微量修饰词替代大情绪词）：</p>\n<pre><code>A relaxed woman, a faint hint of a smile at the corner of her mouth,\nher gaze soft, facial muscles relaxed, no posed feeling.</code></pre>\n<p><strong>视频实战对比</strong>：</p>\n<p>❌ 反面（只写情绪结果）：</p>\n<pre><code>The woman is drinking coffee and smiling happily. She is enjoying the morning.</code></pre>\n<p>→ AI 让人物一直保持杯子在嘴边，脸上挂着僵硬的微笑。</p>\n<p>✅ 正面（写动作全过程）：</p>\n<pre><code>The woman brings the cup to her lips, pauses to smell the aroma,\nher eyes close slightly, then she blows gently on the steam before taking a sip.</code></pre>\n<p>→ 通过物理动作牵动面部肌肉——闻香气时鼻翼翕动、吹气时嘴唇形状变化，自然消除假笑感。</p>\n<blockquote>**填空公式**：[放松/自然的状态词] + [微量修饰词] + [面部肌肉状态] + [无摆拍感]</blockquote>\n<p>></p>\n<blockquote>**填空词库**：relaxed, faint, subtle, gentle, soft, natural, effortless, unposed, slight, mild</blockquote>\n<h3>方法二：动作驱动法</h3>\n<p><strong>问题</strong>：只写表情，AI 凭空捏造面部运动。比如写 <code>Shy woman</code>，AI 让人物直勾勾盯着镜头然后脸红扭捏，非常恐怖。</p>\n<p><strong>原理</strong>：真实人类的表情是身体动作的\"副产品\"，不是独立存在的。写动作，AI 根据人体运动学顺带生成表情。</p>\n<p>❌ 错误写法（只写表情）：</p>\n<pre><code>The woman is shy and looking directly at the camera.\nShe smiles shyly at the viewer. Static head, just facial expression changing.</code></pre>\n<p>→ 人物死盯着观众挤表情，非常不自然。</p>\n<p>✅ 正确写法（动作驱动表情）：</p>\n<pre><code>She feels shy. She immediately lowers her head to avoid eye contact.\nHer eyes look down, nervously glancing to the side.\nShe tucks her chin, gently biting her lower lip. She dares not look at the camera.</code></pre>\n<p>→ 用\"低头\"承接\"害羞\"，AI 知道她为什么低头，动作更含蓄柔和。</p>\n<blockquote>**填空公式**：[情绪触发] + [身体微动] + [视线转移] + [承接动作]</blockquote>\n<p>></p>\n<blockquote>**填空词库**：lowers head, avoids eye contact, looks down, glances away, tucks chin, bites lip, turns away, shifts weight</blockquote>\n<h3>方法三：动态演变写法</h3>\n<p><strong>问题</strong>：给 AI 一个静态描述（如\"他很伤心\"），AI 不知道第 1 秒和第 5 秒有什么区别，只能死循环。</p>\n<p><strong>原理</strong>：微表情的本质是 Change（变化）。需要在提示词中写入时间轴。</p>\n<p><strong>公式</strong>：Start（起始状态）→ Transition（变化动作）→ End（最终微表情）</p>\n<p><strong>示例</strong>：一个\"如释重负\"的镜头</p>\n<pre><code>A close-up of a man's face. He maintains a serious, contemplative expression,\nhis brow slightly furrowed. He slowly closes his eyes and takes a deep,\nvisible breath, his shoulders dropping. As he exhales, a faint,\nrelieved smile slowly forms at the corners of his mouth.</code></pre>\n<ul><li><strong>第一阶段（Start）</strong>：锚定起始帧状态——严肃沉思、眉头微皱</li><li><strong>第二阶段（Transition）</strong>：闭眼+深呼吸——用物理动作切断严肃情绪</li><li><strong>第三阶段（End）</strong>：释然微笑——经过深呼吸铺垫，笑容有血有肉</li></ul>\n<blockquote>**填空公式**：[起始状态] + [触发动作/物理变化] + [最终微表情结果]</blockquote>\n<p>></p>\n<blockquote>**填空词库**：maintains...expression → slowly begins to / gradually transitions → faint/slight/subtle smile/expression forms</blockquote>\n<hr>\n<h3>微表情词库与脚本库</h3>\n<p>以下工具库与上述三个方法配合使用，提供可直接调用的词汇和完整脚本。</p>\n<p><strong>情绪降噪词库</strong>（用于方法一——控制强度）：</p>\n<table><thead><tr><th>类别</th><th>词</th><th>用法</th></tr></thead><tbody><tr><td>基础降维</td><td>subtle, faint, slight, soft, gentle, mild, delicate</td><td>将情绪强度从 100% 降至 30%，最通用的\"去油\"前缀</td></tr><tr><td>克制与隐藏</td><td>suppressed, restrained, hidden, masked, held back, understated, reserved</td><td>表现\"想动又不敢动\"的高级张力</td></tr><tr><td>极微状态</td><td>barely visible, imperceptible, a hint of..., trace of..., in the eyes, ghost of a smile</td><td>用于电影特写，情绪几乎看不见，全靠观众脑补</td></tr><tr><td>时间流逝</td><td>fleeting, brief, gradual, slow-forming, hesitant, intermittent</td><td>给情绪加时间限制，防止表情像面具一样挂在脸上</td></tr><tr><td>状态形容词</td><td>relaxed, neutral, calm, stoic, unbothered, absent-minded, dreamy</td><td>直接描述\"松弛\"状态，而非情绪</td></tr></tbody></table>\n<p><strong>生理反应动作库</strong>（用于方法二——动作驱动）：</p>\n<table><thead><tr><th>部位</th><th>动作</th><th>对应的情绪</th></tr></thead><tbody><tr><td>嘴部</td><td>biting lower lip, licking lips, pursed lips, trembling chin, jaw clenching, blowing out air, swallowing</td><td>害羞/紧张/犹豫/愤怒/恐惧</td></tr><tr><td>头部与手部</td><td>tucking hair behind ear, scratching back of neck, rubbing eyes, covering mouth, tilting head, shifting weight, dropping shoulders</td><td>尴尬/困惑/疲惫/好奇/放松</td></tr></tbody></table>\n<p><strong>眼神演技库</strong>（打破\"死盯镜头\"的尴尬感）：</p>\n<table><thead><tr><th>类型</th><th>动作</th><th>用途</th></tr></thead><tbody><tr><td>动态视线</td><td>avoiding eye contact, darting eyes, looking down, glancing sideways, shifting gaze</td><td>害羞/心虚/顺从/偷看</td></tr><tr><td>眼神状态</td><td>unfocused/zoning out, dilated pupils, squinting, rapid blinking, watery eyes</td><td>放空/心动/怀疑/惊讶/感动</td></tr></tbody></table>\n<p><strong>黄金时序脚本</strong>（用于方法三——动态演变写法）：</p>\n<p><strong>脚本 01：心动的瞬间</strong></p>\n<pre><code>Starts with a neutral expression, looking around a room.\nSuddenly, the gaze locks onto something off-camera.\nPupils dilate visibly, and the blinking slows down.\nA soft, unconscious smile slowly spreads across the face.</code></pre>\n<p><strong>脚本 02：强行憋笑</strong></p>\n<pre><code>The character is trying desperately not to laugh.\nLips are pressed tight together, cheeks are slightly puffed.\nShoulders are shaking slightly.\nFinally, they cover their mouth with a hand and look down to hide the amusement.</code></pre>\n<p><strong>脚本 03：由期待转为失落</strong></p>\n<pre><code>Starts with an expectant, happy face, waiting for news.\nThen, looks down at a phone screen. The smile fades rapidly.\nThe light in the eyes disappears (becomes dull).\nFinally, lets out a subtle sigh and looks away blankly.</code></pre>\n<p><strong>脚本 04：隐忍的怒火</strong></p>\n<pre><code>The character is listening to someone.\nSuddenly, the jaw clenches visibly (masseter muscle flexes).\nNostrils flare slightly. Eyes narrow into a cold stare.\nFinally, forces a fake, stiff smile to mask the anger.</code></pre>\n<p><strong>脚本 05：极度疲惫的苏醒</strong></p>\n<pre><code>The character has heavy eyelids, struggling to keep eyes open.\nBlinks slowly and deliberately. Rubs eyes with the back of the hand.\nLets out a long, tired yawn, covering mouth. Eyes are watery.</code></pre>\n<hr>\n<h2>微表情情绪特征集（实战模板）</h2>\n<p>以下提示词模板来自 <a href=\"#\" class=\"wiki-link\" data-name=\"sources/微表情情绪特征集\">sources/微表情情绪特征集</a>，一字不差，可直接复制使用。</p>\n<p>所有情绪描述均为通用的面部肌肉动作，不受角色/性别/时代限制。将 <code>人物@标签</code> 替换为你的角色即可。</p>\n<hr>\n<h3>第一批：完整镜头版（带场景/音频模板）</h3>\n<p>以下4组共享同一套镜头、背景和音频模板，替换情绪描述即可使用。模板句可独立替换为其他场景。</p>\n<p><strong>通用镜头/背景/音频模板</strong>：</p>\n<pre><code>音频只保留人物极轻微的真实声音，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见米黄色的古风屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<p><strong>内疚</strong>：</p>\n<pre><code>人物@角色 嘴角向下微微伴随细微颤抖，眼睑低垂眼神躲闪自我否定，面容失去光彩展现心理负荷沉重感，头部呈放弃防御状低垂不语，全程表情自然细腻。音频只保留人物极轻微的真实声音，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见米黄色的古风屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<p><strong>藐视</strong>：</p>\n<pre><code>人物@角色 单侧嘴角傲慢上扬挤压，眼神轻视且上眼睑微闭呈俯视，未上扬侧面部肌肉冷漠僵直，头部微上扬后倾以下巴示人，全程表情自然细腻。音频只保留人物极轻微的真实声音，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见米黄色的古风屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<p><strong>忍笑</strong>：</p>\n<pre><code>人物@角色 嘴角强行压下上扬弧度但又压不住的泄露，眼睛弯成快乐月牙状，眼角布满深邃笑纹，脸颊极力克制大笑憋得微泛红高耸，头部因憋笑带来的胸腔震动产生高频微抖。全程表情自然细腻。音频只保留人物极轻微的真实声音，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见米黄色的古风屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<p><strong>微笑</strong>：</p>\n<pre><code>人物@角色 嘴角轻快自然上扬，眼神柔和且下眼睑轻微上提，头部保持平正微偏向对话者，苹果肌被颧骨肌肉自然上提，全程表情自然细腻。音频只保留人物极轻微的真实声音，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见米黄色的古风屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<hr>\n<h3>第二批：纯面部动作精炼版</h3>\n<p>以下9组去掉场景模板，聚焦面部动作本身，收尾统一用\"全部神态流利并富有层次\"。可自由搭配任意镜头/背景/音频。</p>\n<p><strong>藐视</strong>：</p>\n<pre><code>角色单边唇尖骄纵勾起，目光鄙夷且上眼皮略带怂拉成向下打量的样子，头稍稍抬高，用下颚尖正对前方，眼神不屑，全部神态流利并富有层次</code></pre>\n<p><strong>微笑</strong>：</p>\n<pre><code>人物唇线舒展自如向上，头维持正向状态温柔的看向对方，嘴角上扬至颧骨，苹果肌饱满，眼角微微笑出细纹，全部神态流利且富有层次</code></pre>\n<p><strong>内疚</strong>：</p>\n<pre><code>人物嘴角向下伴随微微的颤抖，眼睑低垂眼神躲闪自我否定，面容失去光彩展现心理负荷的沉重感，头部低垂不语，全程表情自然细腻</code></pre>\n<p><strong>憋笑</strong>：</p>\n<pre><code>角色唇角用力抿紧试图遏制上翘趋势的嘴角，却仍有笑意流露，双目眯成喜悦的弯月形状，外眼角堆叠深层笑意纹路，面颊因竭力忍耐情绪而发红并微微隆起，脑袋因克制笑意引发的横膈膜共振而显现微微晃动，全部神态流利且富有层次</code></pre>\n<p><strong>失落</strong>：</p>\n<pre><code>角色眉头无力的向两边耸拉且眉尾下垂，双目空洞无神，嘴角下撇，肩膀微垂，头也微微低下，全部神态流利且富有层次</code></pre>\n<p><strong>惊讶瞪眼</strong>：</p>\n<pre><code>人物眉毛上扬，眼睛瞪圆，嘴巴微张，面部表情呆滞，眼神茫然，脸颊上出现两滴汗珠</code></pre>\n<p><strong>意外挑眉</strong>：</p>\n<pre><code>人物的眉峰上扬，眼睛微睁，露出意外的眼神，嘴角稍微张开一点，</code></pre>\n<p><strong>惊喜交加</strong>：</p>\n<pre><code>目光含星，带有泪光，面颊微红，用手捂住自己的嘴巴，显露激动地状态</code></pre>\n<p><strong>惊恐万分</strong>：</p>\n<pre><code>脸色煞白，瞳孔放大嘴张大，一身的冷汗，身体会显后仰的趋势</code></pre>\n<hr>\n<h3>第三批：动态情绪演变（时间轴版）</h3>\n<p>以下两组为带时间轴的情绪演变，适合长镜头。<code>@角色</code> 替换即可。</p>\n<p><strong>忧郁隐忍（完整弧线版）——15秒四段式</strong>：</p>\n<p>人物与背景设定：</p>\n<pre><code>电影级特写镜头。@角色 处于疲惫的状态，凌乱的黑发丝散落在脸颊和额头。视线低垂，单手握拳轻轻托住下巴，表情隐忍且充满故事感。穿着一件宽松柔软的米白色针织开衫，内搭白色衬衫。背景是一个昏暗的室内，画面右侧有一个失焦模糊的落地电风扇，远处背景有一盏微弱的暖黄色光源。电影级布光，哑光肤质，柔和光线，肤色自然，画面干净，色彩柔和。色彩基调为暗绿色、深棕色与远处的暖黄色交织。极度写实的皮肤质感。使用极浅景深和50mm电影镜头拍摄，画面带有轻微的胶片颗粒感。整体氛围：忧郁、文学电影感、坚韧。</code></pre>\n<p>15秒连续动作和表情调度：</p>\n<pre><code>保持@角色 的画面风格。色彩自然，光影柔和。特写构图，镜头呼吸感。\n0-3秒：画面从极度安静开始。@角色 保持着初始图片中的姿态，嘴唇轻轻抿住，嘴角微微下压。然后头部微微上扬，眼神专注地凝视着画面上方。胸腔有极其细微、缓慢的呼吸起伏。真实的皮肤纹理和凌乱的发丝在侧光下清晰可见。眼神中透着一种深深的委屈和疲惫。\n3-7秒：第4秒，保持仰望的姿势不变，但眼眶湿润，像努力忍住眼泪。全程表情自然细腻，情绪安稳隐忍，不大哭，不张嘴哭喊，不夸张抽泣。第5秒，眼神没有移动，只是眼睑微微颤抖了一下。\n7-11秒：第8秒，似乎意识到了自己的失态。一只手迅速抬起，手背极其粗暴、快速地在脸颊上抹了一下，将泪水擦干。这个动作带着一种对自己脆弱的恼怒和不耐烦。擦拭时，脸颊肌肉被手部动作挤压变形。\n11-15秒：第12秒，手部迅速放下离开画面。深吸了一口气（胸腔明显起伏），重新调整了表情。下巴微微抬得更高了一些，眼神重新回到最初的仰望方向，但此刻的眼神比开始时更加空洞、倔强，仿佛刚才的脆弱从未发生过。</code></pre>\n<p><strong>忧郁隐忍（精简弧线版）——8秒三段式</strong>：</p>\n<pre><code>【8秒连续动作和表情调度】@角色 从安静平静逐渐到克制难过。前2秒：眼神低垂，嘴唇放松，表情平静安静。2-5秒：嘴唇轻轻抿住，嘴角微微下压，眉头轻皱，眼神失落委屈。5-8秒：眼眶湿润，左侧脸颊出现一两滴细小自然泪滴或泪痕，像努力忍住眼泪。全程表情自然细腻，情绪安稳隐忍，不大哭，不张嘴哭喊，不夸张抽泣。音频只保留人物极轻微的真实声音：轻微鼻息、压抑呼吸、短促吸气、低声哽咽和克制哭腔，音量很小，贴近面部。近景构图，背景采用浅景深虚化处理，隐约可见深色木制家具和屏风。单一连续镜头，无剪切，无镜头移动。</code></pre>\n<hr>\n<h3>使用说明</h3>\n<ul><li>两批无优劣之分，只是两种写法风格——第一批带完整镜头模板（复制即用），第二批聚焦纯面部动作（更灵活搭配）</li><li>所有情绪描述均通用，替换 <code>人物@标签</code> 即可适配任意角色</li><li>第一批的通用模板句可替换为其他场景的镜头/背景/音频描述</li><li>第二批可自由搭配任意镜头/背景/音频，收尾句\"全部神态流利并富有层次\"强调情绪变化弧线</li><li>新增情绪：失落、惊讶瞪眼、意外挑眉、惊喜交加、惊恐万分</li></ul>\n<hr>\n<h2>AI 捏脸：一个强项两个辅助</h2>\n<p>AI 捏脸有两种方法：</p>\n<ol><li><strong>普通法</strong>：按结构拆成三个层面（骨骼/比例/五官），分别找参考，用画布画出大致五官位置</li><li><strong>进阶法</strong>：在可捏脸的工具中根据 AI 建议一步步调整</li></ol>\n<p><strong>核心逻辑</strong>：有些五官单看好看但放一起不一定好看（如狐狸眼配鹰钩鼻像反派巫婆）。最简单的方法是<strong>\"一个强项两个辅助\"</strong>——以一个五官为核心特征，其余作为辅助配合，避免特征冲突。</p>\n<p><strong>三停五眼</strong>：中庭偏长显成熟有距离感，中庭偏短显甜显亲和。</p>\n<hr>\n<h2>常见错误</h2>\n<h3>错误一：只写五官，不写身份</h3>\n<p>只写\"精致五官，漂亮脸蛋，高级感\"→ 人物可能好看，但没有角色记忆点。正确做法是用妆造公式写清楚身份。</p>\n<h3>错误二：男性角色妆面太重</h3>\n<p>将军、侠客、侍卫、谋士等角色，重点在服装、发型、配饰和气场，不要过度强调浓妆。</p>\n<h3>错误三：女性角色只写衣服，不写妆面</h3>\n<p>女性的贵气、清冷、温柔、疲惫、失落，很多时候靠妆面和发饰表现。妆容是否完整、唇色深浅、发髻是否整齐，都会影响角色故事感。</p>\n<ol><li><strong>用时间段拆分动作</strong> — 不要把所有人物的动作写在同一句话里。规定具体时间和具体人物，AI 对时间结构的理解比自然语言顺序更清晰</li><li><strong>锁定锚定角色</strong> — 修改多人动作时，明确需要修改的角色和被保留的部分</li><li><strong>把复杂动作拆成多个阶段</strong> — 动作越复杂人物越容易崩。很多流畅的 AI 视频不是一次生成出来的，而是拆成多个阶段慢慢生成的</li></ol>", "人感审美与材质重塑": "<h1>人感审美与材质重塑</h1>\n<p>AI 人物之所以假，最大的原因是\"塑料感\"和\"摆拍感\"。活人感不是靠加滤镜来的，而是靠重新定义 AI 对材质和真实的理解。</p>\n<hr>\n<h2>减法审美（剪词技术）</h2>\n<p>要画面显贵，你要做的是\"减词\"而不是\"加词\"：</p>\n<ol><li><strong>剪噪点</strong> — AI 生成的底图暗藏噪点，像空气里飘着灰。用反向提示词把它们全部画掉，让画面空气先变干净</li><li><strong>剪塑料感</strong> — AI 最喜欢加假反光（皮肤反光离谱、布料亮得像 PVC）。把所有人工的不真实的光泽全部摘掉，让材质找回它的触感与呼吸</li><li><strong>剪假光</strong> — 光边太软、亮点太炸、好像整个画面被一层薄雾吞掉了形状。用反向提示词
