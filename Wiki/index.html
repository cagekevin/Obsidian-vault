把它们按回现实，让光线重新贴入物体走</li></ol>\n<p><strong>核心</strong>：反向提示词不是否定，而是一种合理的减法。把噪音剪掉，风格才会稳定。</p>\n<hr>\n<h2>手工感回归</h2>\n<p>目前正在见证一个巨大的风向回摆——回到不规则的字标、回到带有肌理的插画风格。这些品牌在释放一种信号：画面看起来是<strong>有人类参与创作过的</strong>。</p>\n<p><strong>操作方法</strong>：</p>\n<ol><li>拍一张你喜欢的任意图案照片</li><li>放进图生图的工作流，用提示词框架强制指令一种模拟的实体媒介（圆珠笔、粗头马克笔、泼墨效果）</li><li>最终得到手绘艺术的高价值信号 + 渲染级的创作速度</li></ol>\n<p>很多你以为很有人味的品牌视觉，其实从头到尾都是 AI 生成的——只不过它被设计成看起来像是被人创作的。</p>\n<hr>\n<h2>材质层级重置</h2>\n<p>AI 会默认把皮肤当成一种需要被美化的视觉效果——这是油腻感的根本原因。</p>\n<p><strong>解法</strong>：</p>\n<ol><li>在提示词里加入材质约束词，把皮肤从\"审美层\"拉回\"材质层\"（加入毛孔、纹理等具体的肤质细节描述）</li><li>把光当成结构而不是氛围。先让光线站住结构（强调明暗关系或光线分布），AI 会先建立脸部体积，高光不集中，皮肤自然就不油</li><li>只选一个区域最真实。AI 天生追求统一，会把整张脸拉到同一水平，反而显假。给 AI 一个明确的真实感焦点，AI 才會有重点</li></ol>\n<hr>\n<h2>打破摆拍感</h2>\n<p>永远站着的世界是没有实拍感的。大多数人做 AI 视频喜欢用正面平视的机位——画面虽然清晰，但没有空间感，因为这个机位本质是旁观者视角，观众很难被带入。</p>\n<p><strong>核心问题</strong>：AI 视频的首帧通常是一张完美的\"定妆照\"——人物居中、光线正好、背景干净。当首帧已经具备教科书般的完整构图时，观众看到的就不再是一个正在发生的\"叙事过程\"，而是一个已经被精心布置好的\"结果\"。</p>\n<p><strong>解法</strong>：让镜头变\"笨\"一点——不知道主角在哪里、拿不稳机器、反应慢半拍。允许画面不完美，这种\"失控感\"才是打破 AI 假象的终极武器。</p>\n<h3>技法一：前景遮挡与不完整视角</h3>\n<p><strong>问题</strong>：叙事起点完成度过高。真实的摄影师是在\"寻找画面\"的——镜头切入时可能没有完美对准主体，视线被前景遮挡，需要花几秒钟去\"找到\"焦点。</p>\n<p><strong>策略</strong>：让画面从\"不完整\"开始，通过运镜去\"补完\"画面。</p>\n<p><strong>关键技法</strong>：前景遮挡（Foreground Obstruction）、构图偏移（Off-center Composition）、窥视视角（Peeking View）。</p>\n<p><strong>图片提示词示例</strong>（首帧刻意破坏完美构图）：</p>\n<pre><code>Cinematic shot, a young woman walking through a crowded night market,\nshot from behind a chain-link fence, the fence is partially out of focus\nin the foreground, creating a sense of peeking or observing.</code></pre>\n<p>→ 通过铁丝网后视角、部分遮挡、失焦，制造偷窥或观察的真实感。</p>\n<p><strong>视频提示词公式</strong>：[起始状态] + [运镜动作] + [最终落幅]</p>\n<p><strong>视频提示词示例</strong>：</p>\n<pre><code>The camera starts partially obscured by foliage, then slowly\npans right to reveal the subject sitting on a park bench.\nThe movement feels exploratory, as if discovering the scene.</code></pre>\n<h3>技法二：轨迹的去平滑化</h3>\n<p><strong>问题</strong>：AI 视频的运镜轨迹是线性、数学般精准的。模拟人眼视角或手持摄影时，\"丝般顺滑\"就是最大的破绽。人类摄影师有呼吸带来的微颤、步伐带来的颠簸、犹豫时的停顿。</p>\n<p><strong>策略</strong>：拒绝匀速运动，制造变速和停顿。</p>\n<p><strong>关键技法</strong>：推进减速（Decelerating Push）、微轻停顿（Micro-pause）、手持震感（Handheld Shake）。</p>\n<p><strong>图片提示词示例</strong>：</p>\n<pre><code>Handheld camera shot, slight natural micro-movements and vibrations,\nas if held by a human operator. The composition feels alive,\nnot locked off on a tripod.</code></pre>\n<p><strong>视频提示词示例</strong>：</p>\n<pre><code>Camera slowly pushes in towards the subject, but the movement is not smooth.\nIt has subtle hesitations and micro-pauses, as if the operator is\ncarefully composing the shot in real-time. A slight handheld tremor\nis present throughout.</code></pre>\n<h3>技法三：时间关系倒置</h3>\n<p><strong>问题</strong>：AI 视频最致命的死穴——同步性。人物起跑的瞬间，镜头同时也开始移动，两者在时间轴上是完美的毫秒级同步。但在真实拍摄中，主体的动作一定早于摄影师的反应——这个 0.5 秒的延迟就是\"真实感\"的灵魂。</p>\n<p><strong>策略</strong>：让人物先发生动作，镜头再\"慌乱\"地跟上。</p>\n<p><strong>关键技法</strong>：延迟跟随（Delayed Tracking）、被动构图（Reactive Framing）。</p>\n<p><strong>图片提示词示例</strong>：</p>\n<pre><code>A woman suddenly starts running from a standstill.\nThe camera reacts with a slight delay, whipping around to track her,\nbriefly losing her from the frame before catching up.\nThe composition is reactive, not planned.</code></pre>\n<p><strong>视频提示词示例</strong>：</p>\n<pre><code>The subject suddenly turns and walks away. The camera,\nas if caught off guard, reacts with a delay before starting to follow.\nThere is a brief whip pan as it catches up, and the subject\nmomentarily goes out of frame.</code></pre>\n<blockquote>**关键描述词**：reacts with a delay（延迟反应）、whip pan（甩镜头）、briefly out of frame（短暂出画）</blockquote>\n<hr>\n<hr>\n<h2>PBR 材质术语库</h2>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《材质提示词撰写逻辑》<br><br>相关概念：[[AI提示词修正思路]]（精确术语比抽象词更有效）</blockquote>\n<p>材质提示词的核心不是堆\"金属质感\"\"高级感\"，而是用专业术语精确描述材质属性。以下术语可直接在提示词中使用：</p>\n<table><thead><tr><th>术语</th><th>含义</th><th>提示词用法</th></tr></thead><tbody><tr><td>**PBR材质**</td><td>基于物理的渲染材质，让材质和光的关系更真实</td><td>`PBR materials, physically-based rendering`</td></tr><tr><td>**粗糙度（Roughness）**</td><td>表面反光是锐利还是发散，不是摸起来差不扎手</td><td>`roughness variation, mixed roughness`</td></tr><tr><td>**菲涅尔效应（Fresnel）**</td><td>越斜越容易反光（裸铁没反光，清漆层产生菲涅尔）</td><td>`Fresnel reflections, subtle Fresnel`</td></tr><tr><td>**AO（环境光遮蔽）**</td><td>缝隙阴影强调，结构夹角处通常更暗</td><td>`ambient occlusion, AO details`</td></tr><tr><td>**GI（全局光照）**</td><td>光照到物体后还在环境里反弹</td><td>`global illumination, bounced light`</td></tr><tr><td>**高光滚降（Specular Rolloff）**</td><td>高光从亮到不亮过渡是否自然，没有会像塑料</td><td>`smooth specular rolloff, natural highlight falloff`</td></tr><tr><td>**粗糙度变化（Roughness Variation）**</td><td>现实中同一物体不同区域粗糙度不同（新面板vs旧面板、易积灰处vs常擦拭处）</td><td>`surface roughness variation, uneven wear, accumulated dust in crevices`</td></tr></tbody></table>\n<p><strong>核心逻辑</strong>：从 CG 模型变成被拍摄到的真实物体，最大的差别是细节。不是大战损大划痕，而是现实中肉眼不一定注意到、但摄影机近看会有的小纹理。脏要脏得有逻辑，旧要旧得有逻辑。</p>\n<p><strong>实操示例</strong>：</p>\n<pre><code>PBR materials, mixed roughness surfaces, subtle Fresnel reflections,\nambient occlusion in crevices, global illumination,\nsmooth specular rolloff, surface wear with logical dirt accumulation.</code></pre>\n<hr>\n<h2>三维渲染二维感（皮克斯去AI感）</h2>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《皮克斯风格去除AI感》</blockquote>\n<p>></p>\n<blockquote>核心提示词：**3D rendered with painterly 2D texture**</blockquote>\n<p>></p>\n<blockquote>中文理解：用3D的方式做出空间、光影和材质，再用2D的方式处理角色、轮廓和画面质感。</blockquote>\n<p>皮克斯风格去除 AI 感的核心提示词：<strong>三维渲染二维感</strong>（3D rendering with 2D aesthetics）。</p>\n<p><strong>原理</strong>：高级动画电影会故意把 3D 做得不那么 3D。保留三维的体积感（脸部结构、皮肤反光、衣服褶皱、真实灯光），同时加入二维绘画的处理（夸张表情、手绘纹理、柔和色块、非真实比例）。用 3D 技术做 2D 审美。</p>\n<p><strong>为什么有效</strong>：传统 3D 动画最怕的问题——太光滑、太塑料、太像玩具。\"三维渲染二维感\"让画面介于真实和平面之间，既有真实空间感又有艺术审美。</p>\n<p><strong>提示词示例</strong>：</p>\n<pre><code>Pixar-style character, 3D rendering with 2D aesthetics,\ncinematic lighting, volumetric atmosphere, semi-realistic materials,\nhand-painted textures, exaggerated expressions,\nfilm-level composition, not toy-like, not overly polished.</code></pre>\n<hr>\n<h2>主动制造瑕疵（视频场景）</h2>\n<p>真实感来自不完美。高级电影喜欢保留不完美：</p>\n<h3>人物瑕疵清单</h3>\n<ul><li>轻微毛孔</li><li>肤色变化（不均匀）</li><li>头发碎发</li><li>眼下阴影</li><li>旧衣服褶皱</li></ul>\n<h3>环境瑕疵清单</h3>\n<ul><li>灰尘粒子</li><li>划痕</li><li>磨损老化痕迹</li></ul>\n<h3>写状态，少写名字</h3>\n<table><thead><tr><th>❌ 错误写法</th><th>✅ 正确写法</th></tr></thead><tbody><tr><td>金属</td><td>轻微氧化、边缘磨损</td></tr><tr><td>皮肤</td><td>轻微毛孔、肌理变化</td></tr><tr><td>布料</td><td>旧衣服的褶皱、织物纹理</td></tr></tbody></table>\n<p><strong>核心</strong>：理解的不是物体，而是<strong>状态</strong>。真实感的本质不是完美，而是<strong>可信</strong>。</p>\n<blockquote>相关：[[AI视频电影质感]]（整合了色调=情绪、留白=呼吸、瑕疵=真实三要素）</blockquote>", "AI角色声音控制": "<h1>AI 角色声音控制</h1>\n<p>控制 AI 角色声音的核心不是堆砌情绪词，而是搭建声音结构。不要只告诉 AI 角色是谁，要告诉 AI 角色怎么说话。</p>\n<hr>\n<h2>控制音色：声音公式</h2>\n<p>不要只写\"一个少年将军说话\"\"一个冷艳公主开口\"，这类写法只告诉 AI 角色是谁，没有告诉 AI 声音是什么样的。使用声音公式：</p>\n<blockquote>**年龄感 + 声线质感 + 语速 + 情绪底色 + 发声习惯**</blockquote>\n<p>示例对比：</p>\n<p>❌ 错误写法：<code>一个年迈谋士严肃地说。</code></p>\n<p>✅ 正确写法：</p>\n<pre><code>年龄约五十岁，声音低沉有轻微沙哑，语速缓慢沉稳，\n语气中带有常年运筹帷幄的平静与压迫感，\n字与字之间有停顿，呼吸深沉。</code></pre>\n<p>❌ 错误写法：<code>女主悲伤地说。</code></p>\n<p>✅ 正确写法：</p>\n<pre><code>年轻女性声音，声线柔和但微微颤抖，\n语速比平时慢，每句话尾音轻微拖长，\n气息不稳，有压抑的哽咽感。</code></pre>\n<hr>\n<h2>控制语气：情绪词是结果，不是过程</h2>\n<p>\"愤怒地说\"\"悲伤地讲\"只描述了情绪结果，没有描述声音过程。AI 更容易理解的是声音结构：</p>\n<table><thead><tr><th>情绪</th><th>声音结构</th></tr></thead><tbody><tr><td>愤怒</td><td>音量提高，语速加快，咬字变重，句尾收紧</td></tr><tr><td>悲伤</td><td>音量下降，语速缓慢，气息变轻，尾音拖长</td></tr><tr><td>冷静</td><td>语速稳定，语气平和，每个字清晰</td></tr><tr><td>压迫</td><td>前半句平静，后半句语速渐快、音量渐低，尾音下沉</td></tr></tbody></table>\n<h3>案例：反派军师从平静到压迫</h3>\n<p>❌ 错误写法：<code>\"你以为自己赢了？\"他愤怒地说，\"不！你只是走进了我的陷阱！\"</code></p>\n<p>✅ 正确写法：</p>\n<pre><code>前半句语速平缓，带有讽刺和掌控感，\n\"不！\"字加重后语速加快、尾音下沉，\n逐渐展现威胁和压迫感。\n停顿和尾音下沉让台词更具压迫感。</code></pre>\n<h3>案例：古装美女的隐忍</h3>\n<pre><code>第一句\"你为何迟迟不来\"：语气平稳，尾音轻微上扬，\n表现出隐忍的期待和轻微的不解。\n\n第二句\"是我哪里做错了吗\"：语气开始轻微颤抖，\n尾音拖长，表现出内心的不安与期盼。</code></pre>\n<hr>\n<h2>控制多句台词：按时间顺序写声音变化</h2>\n<p>在长对话中，角色的情感往往是逐渐变化的。按时间顺序控制声音的递进：</p>\n<ol><li><strong>初始状态</strong> — 语速较慢，带有思考或犹豫</li><li><strong>情感升温</strong> — 语速加快，语气出现爆发</li><li><strong>情感消解</strong> — 语气恢复平静或释然，语速放慢</li></ol>\n<h3>案例：父亲与女儿的对话</h3>\n<p>场景设定：</p>\n<pre><code>父亲威严，语气低沉，语速较慢。\n女儿年轻，语气从犹豫到坚定。</code></pre>\n<p>声音提示词：</p>\n<pre><code>父亲：语气低沉威严，语速缓慢，每句话尾音下沉，\n表现出不容置疑的权威感。\n女儿：开始时语气犹豫，语速较慢，气息不稳；\n逐渐变得坚定，语速加快，音量提高，\n最后一句语气恢复平静，但尾音带有微微颤抖。</code></pre>\n<hr>\n<h2>控制语速：标点符号就是节奏器</h2>\n<table><thead><tr><th>标点</th><th>作用</th></tr></thead><tbody><tr><td>逗号 ，</td><td>短暂停顿，语速稍慢</td></tr><tr><td>句号 。</td><td>完整停顿，语速正常</td></tr><tr><td>省略号 ……</td><td>延长停顿，语速放慢，带有犹豫或思考</td></tr><tr><td>感叹号 ！</td><td>情绪爆发，语速加快</td></tr><tr><td>换行</td><td>段落停顿，节奏切换</td></tr><tr><td>短句</td><td>节奏加快</td></tr><tr><td>长句</td><td>情绪铺陈</td></tr></tbody></table>\n<p>示例：</p>\n<pre><code>\"你……难道就这么离开了吗？\"</code></pre>\n<p>省略号带出角色的犹豫与不舍，语速放慢，情感加深。</p>\n<hr>\n<h2>标点控声实战深化（Seedance 2.0）</h2>\n<blockquote>来源：[[sources/Seedance 2.0 标点控声]]（AI 智能夏老师 2026-06-28）</blockquote>\n<h3>核心结论</h3>\n<p>AI 默认不懂情绪，必须在提示词中显式写<strong>发声方式 + 节奏描述 + 音调变化 + 标点符号</strong>，角色说话才能符合想象。</p>\n<h3>标点的核心地位：省略号</h3>\n<p>在 Seedance 2.0 演示中，「省略号可以达到声断气连，意犹未尽的感觉」是整段视频的核心技巧。原文案例：</p>\n<pre><code>\"你……到底爱不爱我……\"</code></pre>\n<p>省略号不是装饰，是 AI 视频生成中<strong>最被低估的情绪控制工具</strong>：</p>\n<ul><li>AI 不一定理解\"悲伤地说\"</li><li>但能映射\"……\"到\"声断气连、意犹未尽\"的物理发声特征</li></ul>\n<h3>拆句 + 标点 = 分镜节奏</h3>\n<p>通过「换行拆句 + 标点组合」控制多段台词的情感阶段，每个阶段对应一个镜头画面：</p>\n<pre><code>你，\n到底爱不爱我，\n我知道你一直很爱我，\n可是我已结婚了，</code></pre>\n<p>逐句解析：</p>\n<table><thead><tr><th>句</th><th>标点</th><th>情感阶段</th><th>镜头表现</th></tr></thead><tbody><tr><td>`你，`</td><td>逗号</td><td>试探开场</td><td>人物特写 + 短促开口</td></tr><tr><td>`到底爱不爱我，`</td><td>逗号</td><td>质问克制</td><td>镜头推近 + 语气下沉</td></tr><tr><td>`我知道你一直很爱我，`</td><td>逗号</td><td>情感升温</td><td>镜头稳持 + 语速放慢</td></tr><tr><td>`可是我已结婚了，`</td><td>逗号</td><td>无奈收尾</td><td>镜头缓拉 + 尾音拖长</td></tr></tbody></table>\n<p><strong>关键洞察</strong>：每一行 = 一个情感落点 = 一个镜头分镜。逗号控制画面内的停顿，换行控制画面间的切换。</p>\n<h3>与现有方法的连接</h3>\n<ul><li>配合「<a href=\"#\" class=\"wiki-link\" data-name=\"AI角色声音控制\">AI角色声音控制</a>」中\"控制语气\"章节的声音过程法：标点 = 声音过程的可视化指令</li><li>配合「<a href=\"#\" class=\"wiki-link\" data-name=\"AI角色声音控制\">AI角色声音控制</a>」中\"多句台词\"章节的时间序：拆句 = 多镜头的时间线拆分</li><li>配合「<a href=\"#\" class=\"wiki-link\" data-name=\"AI空镜设计\">AI空镜设计</a>」：拆句的换行处可插入空镜作为情绪缓冲</li></ul>\n<hr>\n<h2>声音提示词模板</h2>\n<h3>单人单句模板</h3>\n<pre><code>角色声音设定：\n【年龄感】+【声线质感】+【整体语速】+【情绪底色】\n\n台词表达方式：\n【音量】+【语速】+【咬字】+【句尾处理】</code></pre>\n<h3>多句台词模板</h3>\n<pre><code>角色声音设定：\n【年龄感】+【声线质感】+【整体语速】+【情绪底色】\n\n台词节奏：\n第一句：【声音状态】+【语速】+【停顿】\n第二句：【情绪变化】+【重音】+【句尾】\n第三句：【音量变化】+【爆发或收住】\n第四句：【最终情绪落点】</code></pre>\n<hr>\n<h2>总结</h2>\n<p>控制 AI 声音的三个核心方法：</p>\n<ol><li><strong>用声音公式控制音色</strong>：年龄感 + 声线质感 + 语速 + 情绪底色 + 发声习惯</li><li><strong>用声音过程控制语气</strong>：把\"他很生气\"改成\"音量变高、咬字变重、句尾短促\"</li><li><strong>用标点符号控制语速</strong>：逗号减速，省略号停顿，感叹号爆发</li></ol>", "AI镜头语言进阶": "<h1>AI 镜头语言进阶</h1>\n<p>镜头不是记录，而是在选择。让观众看到什么、感受什么，都是你决定的。这套进阶镜头语言超越了基础运镜，深入到\"如何用镜头讲故事\"。</p>\n<hr>\n<h2>反向写提示词：镜头包裹动作</h2>\n<p>AI 在生成视频时并不是在理解你的画面，只是在按顺序执行提示词。正常的写法（先写动作、再写细节、最后写镜头）会导致画面像拼出来的一样。</p>\n<p><strong>核心技巧</strong>：把镜头信息写在最前面，让所有动作都被包裹在这个镜头里发生。比如：</p>\n<ul><li>先写\"低角度镜头缓慢推进\"，再写人物动作</li><li>先写\"手持镜头轻微晃动\"，再写场景内容</li></ul>\n<p>这样画面会有\"被拍出来的感觉\"，而不是\"生成出来的感觉\"。</p>\n<hr>\n<h2>以摄像机为参照系</h2>\n<p>AI 没有方向感，尤其是在画面只有局部的时候。很多人写\"人物向前走\"\"人物往后退\"，但 AI 只能随机判断前后。</p>\n<p><strong>正确写法</strong>：把自己想象成一台摄像机，让角色对着这台摄像机做动作：</p>\n<ul><li>朝镜头走 / 背对镜头离开</li><li>人物从画面左侧进入</li><li>人物正在靠近镜头</li></ul>\n<p>只要给了参照方向，就不会出错。</p>\n<hr>\n<h2>低角度原理</h2>\n<p>低角度可以快速去掉 AI 视频的假感，因为它天然带来两样东西：</p>\n<ol><li><strong>遮挡</strong> — 地面前景、脚步进入画面，制造空间层次</li><li><strong>透视</strong> — 人物被拉长，空间被放大，大脑会产生\"这是被拍出来的\"感觉</li></ol>\n<p><strong>进阶</strong>：不要只写\"低角度\"，要给它一个拍摄状态（低角度手持镜头轻微晃动、低角度前景虚化）。再进阶一步：不要一上来就给全画面信息，而是让观众有一个<strong>发现的过程</strong>（低角度从遮挡缓慢拉出）。</p>\n<hr>\n<h2>空镜三作用与放置位置</h2>\n<p>空镜不只是风景画面，摇晃的烛火、掉落在地上的发簪、门外突然停下的脚步都可以承担空镜的作用（电影叙事中这叫\"插入镜头\"）。</p>\n<blockquote>空镜的完整方法论（三类提取方法、五要素提示词公式、叙事改写、常见问题）详见 [[AI空镜设计]]</blockquote>\n<p><strong>三个作用</strong>：</p>\n<ol><li>交代故事发生的环境</li><li>控制视频的节奏和呼吸感</li><li>代替人物表达情绪</li></ol>\n<p><strong>三个放置位置</strong>：</p>\n<ol><li>一场戏开始之前 — 用环境空镜快速交代时间和地点</li><li>人物说完重要台词以后 — 加入道具或环境空镜，给观众留出消化情绪的时间</li><li>两场戏转换的时候 — 用空镜完成过渡，避免画面直接跳到下一个场景</li></ol>\n<p><strong>注意</strong>：空镜不是越多越好。一个空镜控制在一到三秒，只放在情绪需要停顿的位置。</p>\n<hr>\n<h2>情绪蒙太奇三法</h2>\n<p>很多人喜欢用人物状态去表达情绪（紧张、生气、失望），但真正能控制情绪节奏的是拍摄手法。不要只告诉 AI 角色\"看起来怎么样\"，要告诉 AI 画面\"让观众感受到什么\"。</p>\n<h3>方法一：用环境代替情绪</h3>\n<p><strong>底层原理：客观对应物法则（Objective Correlative）</strong></p>\n<p>人的内心情绪是抽象的。导演不会让演员干巴巴地说\"我好难过\"，而是把情绪投射到具象的天气、光影、场景的衰败感上。环境怎么变，观众的心就怎么走。</p>\n<p>❌ 错误写法（把情绪结果当指令）：</p>\n<pre><code>A young man standing in the room, looking very sad, crying, depressed.</code></pre>\n<p>→ AI 生成一张高清哭泣大头照，直白、没有留白、像假哭。</p>\n<p>✅ 正确写法（用环境承载情绪）：</p>\n<pre><code>电影级广角镜头，一个孤独的身影坐在昏暗空荡的公寓里，背对镜头。\n大雨拍打着巨大的玻璃窗，水滴模糊了窗外城市的霓虹灯。\n桌子上有一盆枯萎的盆栽。冷蓝和灰色的色调，高对比度，忧郁的氛围。</code></pre>\n<p>→ 阴冷光线、模糊雨滴、枯萎植物，已经把\"失落\"写满整个屏幕。人物甚至不需要露脸。</p>\n<blockquote>**核心公式**：隐藏面部/背影 + 恶劣天气 + 衰败静物 + 冷色调光影</blockquote>\n<h3>方法二：用对比制造情绪落差</h3>\n<p><strong>底层原理：库里肖夫效应（Kuleshov Effect）</strong></p>\n<p>观众对一个镜头的理解，很大程度上取决于它前后的镜头。情绪需要\"参照物\"。如果全片都是高潮，那等于没有高潮。极动之后接极静，大喜之后接大悲，反差才能引爆情绪。</p>\n<p>❌ 错误写法（情绪叠加法）：</p>\n<pre><code>人物奔跑 → 汽车追逐 → 怒砸桌子 → 激烈争吵</code></pre>\n<p>→ 画面过于密集，观众视觉疲劳，只觉得吵闹。</p>\n<p>✅ 正确写法（用反差制造情绪）：</p>\n<pre><code>镜头A（情绪高点：狂欢与拥挤）：\n拥挤的宴会厅，人群欢笑，灯光炫目，镜头快速扫过人群。\n\n镜头B（情绪低点：微小的脆弱感）：\n狭窄的阳台角落，人物靠在栏杆上，眼神放空，\n与身后热闹的宴会形成鲜明对比，环境声被闷住。</code></pre>\n<p>→ 从极度拥挤瞬间切入绝对安静，孤独感直击观众。</p>\n<blockquote>**核心公式**：极度喧闹（家中）→ 衬托绝对孤绝（角落）</blockquote>\n<h3>方法三：用特写放大情绪</h3>\n<p><strong>底层原理：视觉聚焦法则（Forced Attention）</strong></p>\n<p>特写的本质是强行剥夺观众的全局视野。当画面去掉背景、去掉多余肢体，只剩下一个极小的细节时，观众的注意力无处可逃，情绪被无限放大。</p>\n<p>❌ 错误写法（半身/全身像）：</p>\n<pre><code>A man is very angry and trying to hold back his anger, standing in the office.</code></pre>\n<p>→ AI 生成半身像，周围信息稀释了情绪。</p>\n<p>✅ 正确写法（极端景别 + 局部细节）：</p>\n<pre><code>手部特写，手指用力捏着陶瓷杯柄，指节发白，\n骨节微微颤抖，暖黄灯光在杯沿形成锐利高光。</code></pre>\n<pre><code>眼部微距特写，瞳孔轻微收缩，睫毛沾着细小的水珠，\n冷蓝环境光从左侧照亮半边眼眶。</code></pre>\n<p>→ 微距视角下质感更无敌，情绪穿透力成倍增加。</p>\n<blockquote>**核心公式**：[极端景别] + [局部细节/微小动作] + [光影质感]</blockquote>\n<hr>\n<h2>分镜落差制造情绪</h2>\n<p>情绪不是演出来的，而是被设计出来的。真正有情绪的畫面一定有变化：</p>\n<ul><li>前一个镜头很安静 → 几秒后风突然变大 → 落差就是情绪</li><li>先是混乱的环境 → 突然切到完全静止的人物 → 这种收放反而更压抑</li></ul>\n<p><strong>核心</strong>：情绪最强的时候不是画面本身，而是两个镜头之间的差。你要设计的不是一个画面，而是镜头之间的关系。</p>", "AI视觉语法体系": "<h1>AI 视觉语法体系</h1>\n<p>提示词不是命令，而是一门视觉语言。你不会用视觉说话，AI 就只能猜测你的想法。这套体系将提示词从\"许愿\"变成\"可执行的视觉规则\"。</p>\n<hr>\n<h2>提示词五板块结构</h2>\n<p>一个完整的提示词可以拆成五个板块，像语法结构一样保持完整才有可控性：</p>\n<ol><li><strong>情绪</strong> — 画面想传达什么感觉</li><li><strong>主体</strong> — 谁/什么在画面中</li><li><strong>光线</strong> — 光从哪里来、什么方向、什么颜色</li><li><strong>镜头</strong> — 用什么焦段、什么角度、什么景别</li><li><strong>细节</strong> — 质感、纹理、微妙的视觉特征</li></ol>\n<p><strong>具体永远比简短更有力量</strong>。不要写\"光线好\"，要写\"85毫米镜头、平视构图、轻微压缩感\"。</p>\n<hr>\n<h2>词序规则</h2>\n<p>AI 在生成视频时并不是在理解你的画面，它只是在按顺序执行提示词。所以词序直接决定了生成效果：</p>\n<ol><li><strong>主体前置</strong> — 让 AI 先把重点放在你最关心的元素上。主体放后面，AI 的注意力会被分散到其他元素</li><li><strong>光影中置</strong> — AI 渲染光影时会参考前面已生成的主体。光影放后面，AI 容易不管主体随便布光</li><li><strong>抽象词后置</strong> — 抽象词（高级感/氛围感）容易被 AI 理解为全局调整项，放前面会破坏主体和光影。应该拆成可量化的操作放在最后</li></ol>\n<p><strong>反向写提示词</strong>：正常的逻辑是先写动作再写细节最后写镜头，但这样 AI 会把信息拆开一段一段去完成，画面像拼出来的。反过来——先写镜头再写动作——AI 会认为这些动作是在一个画面里完成的，更真实。</p>\n<hr>\n<h2>摄影三参数</h2>\n<p>在提示词中加入三个摄影参数，画面立刻不一样：</p>\n<ol><li><strong>相机角度</strong> — 平视显得正常真实，低角度让主体更有力量，俯视带来距离感和掌控力</li><li><strong>镜头类型</strong> — 35mm 广阔有电影感，85mm 适合特写有压缩感</li><li><strong>光圈大小</strong> — F1.4 背景虚化到极致，F0.6 虚化细节刚刚好</li></ol>\n<hr>\n<h2>解决词穷</h2>\n<ol><li><strong>先用 AI 把你的感觉具象化</strong> — 不要一上来写提示词，先把想法直接告诉 AI（说感觉、说氛围），让 AI 帮你拆解对应的动作、节奏和画面变化</li><li><strong>让 AI 补全看不见的部分</strong> — 最容易词穷的是微表情和细微动作，让 AI 反推现实，拆解表情由哪些面部变化和身体反应组成</li><li><strong>让环境参与进来</strong> — 人物动了，环境一定会回应。让 AI 推演可能产生的连锁反应</li></ol>\n<hr>\n<h2>反向提示词的本质</h2>\n<p>反向提示词不是否定，而是一种合理的<strong>减法</strong>。AI 默认会给画面加量加脏，要画面显贵，你要做的是\"剪词\"：</p>\n<ul><li><strong>剪噪点</strong> — AI 底图暗藏噪点，让画面变廉价</li><li><strong>剪塑料感</strong> — AI 最喜欢加假反光（皮肤反光离谱、布料亮得像 PVC）</li><li><strong>剪假光</strong> — 光边太软、亮点太炸、被薄雾吞掉形状的光</li></ul>\n<p>把噪音剪掉，风格才会稳定，质感才不会被 AI 自己毁掉。</p>", "AI提示词修正思路": "<h1>AI 提示词修正思路</h1>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《AI总是看不懂你的提示词》</blockquote>\n<p>></p>\n<blockquote>相关概念：[[AI底层机制与高级控制]]（知识诅咒、权重竞争是修正思路的理论基础）、[[AI 生图决策规则]]（修正思路与决策规则互补）</blockquote>\n<hr>\n<h2>问题本质</h2>\n<p>AI 看不懂你的提示词时，不是因为你写得不够多，而是因为：</p>\n<ol><li><strong>AI 更擅长执行显性动作</strong>，不擅长补全隐性逻辑</li><li><strong>提示词有执行权重</strong> — AI 不是在理解句子，而是在竞争性地抓取信号</li><li><strong>你脑子里的隐含空间关系，AI 不知道</strong></li></ol>\n<p><strong>核心</strong>：AI 不会真正理解你脑子里的隐含空间关系、意图逻辑。它只会根据训练中学到的概率关系，优先去实现提示词里最明确、最容易视觉化、最强动作化的部分。</p>\n<hr>\n<h2>修正三步法</h2>\n<h3>第一步：删高干扰动作</h3>\n<p>有些动作天然很强（如\"双手抬起\"\"双手合十\"），模型一旦抓到这个动作，往往会为了把这个姿态做得更明显，去牺牲身体的朝向和头部的逻辑。</p>\n<p><strong>操作</strong>：检查提示词中是否有强度过高、会压制其他指令的动作词。如果有，删掉或弱化。</p>\n<h3>第二步：修正强磁</h3>\n<p>抽象词（如\"虔诚\"\"仰望\"）不如具体动作词（如\"拜佛\"\"转头\"）效果好。</p>\n<p><strong>操作</strong>：把抽象词换成具体的、AI 容易视觉化的动作描述。</p>\n<table><thead><tr><th>❌ 抽象</th><th>✅ 具体</th></tr></thead><tbody><tr><td>虔诚</td><td>双手合十、闭目、鞠躬</td></tr><tr><td>仰望</td><td>抬头看向上方</td></tr><tr><td>参拜</td><td>拜佛</td></tr></tbody></table>\n<h3>第三步：明确动作歧义</h3>\n<p>同一个词在 AI 的训练数据里可能有多种理解。</p>\n<p><strong>操作</strong>：用更精确的词替代容易产生歧义的词。</p>\n<hr>\n<h2>实战案例</h2>\n<p><strong>原始提示词问题</strong>：写了\"前方背景中的巨大佛像\"，但 AI 生成的结果驴唇不对马嘴。</p>\n<p><strong>原因分析</strong>：</p>\n<ul><li>\"前方\"在 AI 的理解中是相对概念——参考图人物脸朝左，脸的前方也算\"相对前方\"</li><li>\"双手合十\"是极强的姿态动作，模型优先执行这个动作，弱化了方向感</li><li>AI 会折中：左边画外也可能有佛像</li></ul>\n<p><strong>修正后</strong>：</p>\n<ul><li>删掉高干扰动作（弱化双手合十的权重）</li><li>把\"抬头\"换成\"转头\"（更精确的方向控制）</li><li>把\"参拜\"换成\"拜佛\"（消除歧义）</li></ul>", "AI环境空间设计": "<h1>AI 环境空间设计</h1>\n<p>环境从来不是配角。它不是用来衬托人物的，而是决定这个世界能不能被相信。</p>\n<hr>\n<h2>环境三层写法</h2>\n<p>大多数人写环境时习惯用一个整体去概括，但在 AI 的理解中，这种写法本质上是信息丢失。正确做法是把空间<strong>拆开描述</strong>，在提示词中明确三层内容：</p>\n<ol><li><strong>前景</strong> — 最近距离的元素，提供空间层次和遮挡</li><li><strong>中景</strong> — 主体所在的位置，核心内容区域</li><li><strong>远景</strong> — 背景环境，交代空间纵深</li></ol>\n<p>告诉 AI 画面是如何被看到的，而不是画面里有什么。</p>\n<hr>\n<h2>环境因果逻辑</h2>\n<p>很多人写环境只写名字但没有因果——信息看起来很多，但 AI 并不会去思考它们的关系。画面会有一种\"拼贴感\"。</p>\n<p>正确的做法是写出<strong>逻辑关系</strong>：</p>\n<ul><li>因为有一盏背景灯，所以照亮了墙面</li><li>因为有绿植遮挡，所以有阴影</li><li>因为光源从窗外照入，所以室内有光束</li></ul>\n<p>当这些因果关系被写进提示词，画面的真实感会随之提升。</p>\n<hr>\n<h2>场景一致性</h2>\n<p>AI 没有空间记忆，它并不懂透视，只是在模仿透视。每次生成都需要重新理解你的要求。</p>\n<p><strong>小场景</strong>：生成一张全景图去裁切。注意这张图不是给人看的，而是切镜头用的素材库。确定好视角后做透视调整、光影调整，再把人物融进去。</p>\n<p><strong>大场景</strong>：大场景一定会有细节被漏掉。答案不是让它不变，而是<strong>不要让观众注意到它在变</strong>：</p>\n<ol><li>保证大结构一样（空间布局、光的方向、大的物体位置）</li><li>主动弱化细节（减少复杂纹理，加点景深或轻微晃动）</li></ol>\n<p><strong>核心</strong>：不要试图让 AI 完全一致，你要做的是让它看起来一致。</p>\n<hr>\n<h2>伪透视三技巧</h2>\n<p>AI 有一个深层的弱点——它其实不懂透视，只是在模仿透视。利用语言误导可以让它跳出默认透视规则，做出更戏剧性的画面。</p>\n<ol><li><strong>方向词控制延伸</strong> — AI 判断透视的第一依据是线条朝哪里收缩。用\"对角延伸感\"\"向前方向外拉伸\"代替\"前景中景背景\"，AI 会把地面拉得更长、把建筑往后推</li><li><strong>密度词控制远近</strong> — AI 判断深度的第二个依据是密度变化（近处密、远处稀）。给密度暗示，AI 会自动把画面分层</li><li><strong>夸张词骗比例</strong> — AI 判断透视的最后一个关键点是物体相对尺寸的落差。把景别夸张化（\"巨大的前景\"/\"缩小的远景\"），AI 会认为你要的是夸张透视摄影</li></ol>", "视觉平衡与动线构图": "<h1>视觉平衡与动线构图</h1>\n<p>构图不只是让画面好看，更是让观众的眼光和判断力被看到。很多创作者只关注\"画什么\"（主体），忽略了\"怎么画\"（形式）。当你不指定构图时，AI 模型会倾向于生成最四平八稳的居中构图——没有错，但平庸、缺乏情绪、没有呼吸感。</p>\n<hr>\n<h2>三分法与呼吸感</h2>\n<h3>AI 的\"居中陷阱\"</h3>\n<p>无论是 Midjourney 还是即梦 AI，当你输入\"一个漂亮的女孩在雨中\"时，90% 的情况下 AI 会把主体放在画面正中央。这种\"证件照\"式的构图最大问题是\"视线阻断\"——观众目光直接落在中心，看一眼就结束了，无法在画面中游走。</p>\n<h3>三分法（Rule of Thirds）</h3>\n<p>将画面横竖各分三等分，形成\"井\"字格。将主体放置在四条线或四个交叉点上（即画面的 1/3 或 2/3 处）。</p>\n<p><strong>视觉心理学</strong>：当主体偏离中心时，画面的一侧会留出\"负空间\"（Negative Space）。这个空间不仅让画面有了呼吸感，更暗示了主体与环境的关系，引导观众去想象主体\"看着哪里\"或\"走向哪里\"。</p>\n<h3>实战操作</h3>\n<p><strong>公式</strong>：[主体描述] + [位置/构图词] + [环境/负空间描述]</p>\n<p>❌ 错误示范（居中构图）：</p>\n<pre><code>A beautiful woman sitting in a cafe, drinking coffee, cinematic lighting.</code></pre>\n<p>→ 人物正脸看镜头，居中，背景虚化，像普通游客照。</p>\n<p>✅ 正确示范（三分法）：</p>\n<pre><code>A young woman sitting at a corner table in a cozy cafe, positioned on the right third of the frame,\nher gaze directed towards the left side of the frame, leaving the left two-thirds as negative space\nshowing the rain-streaked window and street outside. Warm ambient lighting, shallow depth of field.</code></pre>\n<p>→ 人物在右侧三分线上，视线望向左侧大面积留白的窗外街道，画面有了故事感。</p>\n<p><strong>工具特异性技巧</strong>：</p>\n<ul><li><strong>Nano Banana Pro</strong>：可直接用对话式描述\"请把人物构图安排在画面的右下角，左上角留白展示天空\"</li><li><strong>即梦 AI/可灵（视频生成）</strong>：生成首帧时务必使用三分法，如 <code>Subject positioned at the left third</code>，这样视频生成时 AI 更可能根据留白空间生成运镜（如向右平移）</li></ul>\n<hr>\n<h2>视觉动线引导</h2>\n<p>很多人生图时只描述人物和场景，忽略了构图。AI 默认会使用中心构图，但中心构图往往缺乏方向感，让画面显得没有情绪。</p>\n<p>如果你什么都不写，AI 会倾向生成静态平均分布的畫面。当你在提示词中明确写入<strong>动线来源</strong>，AI 就会生成视线流动的画面。</p>\n<h3>什么是视觉动线</h3>\n<p>如果说主体位置决定了观众第一眼看哪里，那么视觉动线就决定了观众第二眼、第三眼看哪里。</p>\n<p>AI 生成大场景（城市、风景）时容易犯\"平均分布\"的毛病——画面里全是细节，但没有重点。观众的眼睛不知道该往哪放，导致视觉疲劳。</p>\n<h3>构建\"隐形路标\"</h3>\n<p>需要在提示词中明确写入能产生线条的元素，或直接描述视线的流动方向。</p>\n<p><strong>核心关键词库</strong>：</p>\n<ul><li>Leading lines, converging lines, diagonal lines, S-curve, vanishing point</li><li>One-point perspective, linear perspective, forced perspective</li><li>Visual flow from foreground to background, depth cue</li><li>Framing, natural frame, foreground element</li></ul>\n<h3>实战案例：打造电影级纵深感</h3>\n<p><strong>普通描述</strong>（无动线）：</p>\n<pre><code>A futuristic museum interior, white walls, abstract art.</code></pre>\n<p>→ 画面散乱，没有重点。</p>\n<p><strong>动线优化描述</strong>：</p>\n<pre><code>Wide angle shot, strong leading lines from ceiling lights converging towards the center,\nfuturistic museum interior, one-point perspective, deep depth of field, minimalist composition.</code></pre>\n<p>→ 顶灯形成的强力引导线将视线引向中心，一点透视产生纵深感。</p>\n<h3>视频生成中的动线</h3>\n<p>在视频生成中，动线决定了运镜的逻辑。要分两步走：</p>\n<p><strong>步骤一：文生图</strong> — 生成一张看起来马上要冲出去的静态图</p>\n<pre><code>A warrior standing at the center of a long, straight ancient corridor.\nStrong converging lines from the walls and pillars on both sides\npoint towards the vanishing point at the far end. Low angle shot,\ndramatic lighting casting long shadows towards the viewer.</code></pre>\n<p><strong>步骤二：图生视频</strong> — 激活静帧中的动线</p>\n<pre><code>Camera rapidly pushes forward along the corridor towards the warrior,\nthe pillars on both sides quickly passing by in the peripheral vision,\ncreating a strong sense of speed and depth.</code></pre>\n<hr>\n<h2>视觉重量分配</h2>\n<p>很多人一提到平衡第一反应就是对称。但平衡并不等于对称，而是<strong>视觉重量的分配</strong>。</p>\n<h3>三个维度</h3>\n<table><thead><tr><th>维度</th><th>原理</th><th>示例</th></tr></thead><tbody><tr><td>**亮度平衡**</td><td>亮的地方比暗的地方重（吸睛）</td><td>左边暗主体 → 右边需要亮色或高光来平衡</td></tr><tr><td>**色彩平衡**</td><td>暖色/高饱和度比冷色/低饱和度重</td><td>左边红色主体 → 右边需要小面积亮色平衡</td></tr><tr><td>**体量平衡**</td><td>大物体比小物体重</td><td>左边大物体 → 右边需要多个小物体或强色彩来平衡</td></tr></tbody></table>\n<h3>实战案例：商业产品图</h3>\n<p>假设要为黑色香水做海报。主体是黑色的，如果在画面左边、背景全黑就看不见了；背景全白又太突兀。</p>\n<p><strong>策略</strong>：主体在左（暗调），右侧需要一个亮色物体或光源来平衡。</p>\n<pre><code>A black perfume bottle placed on the left third of the frame.\nThe left side is shrouded in deep shadow, creating a sense of mystery.\nOn the right two-thirds, a single beam of warm golden light cuts through the darkness,\nilluminating a single white flower petal. The contrast between the dark left\nand the illuminated right creates a perfect visual balance. Dark and moody,\nchiaroscuro lighting, high contrast.</code></pre>\n<hr>\n<h2>构图核心词库与万能公式</h2>\n<h3>改变主体位置（打破中心构图）</h3>\n<ul><li>Rule of thirds, off-center composition, subject on the left/right third</li><li>Negative space, breathing room, asymmetrical balance</li><li>Extreme left/right composition, pushed to the edge</li><li>Placed in the lower/upper third</li></ul>\n<h3>建立视觉引导（拒绝散乱）</h3>\n<ul><li>Leading lines, converging lines, diagonal composition</li><li>One-point perspective, vanishing point, S-curve</li><li>Visual flow, guided eye movement, depth cue</li><li>Framing, natural frame, foreground framing</li></ul>\n<h3>掌控画面平衡（提升高级感）</h3>\n<ul><li>Visual weight distribution, asymmetrical balance</li><li>Color balance, warm vs cool contrast</li><li>Light and shadow balance, chiaroscuro</li><li>Left-right contrast, foreground-background balance</li></ul>\n<h3>万能填空公式</h3>\n<pre><code>[构图方式] + [主体描述与位置] + [环境与引导线] + [光影/风格/平衡元素]</code></pre>\n<p><strong>示例</strong>：</p>\n<pre><code>Rule of thirds composition, a warrior standing on the left third,\nstrong leading lines from a stone bridge converging to the right vanishing point,\ngolden hour light casting long shadows across the frame, dramatic sky,\ndeep depth of field.</code></pre>\n<h3>视频创作者特别提示</h3>\n<p>对于即梦 AI / 可灵 / 海螺等视频工具，提示词中加入动态构图词至关重要：</p>\n<ul><li>Camera pans left/right following the subject's movement</li><li>Dynamic composition, camera moves along the leading lines</li><li>The composition creates momentum pushing towards the right</li><li>Camera tracks forward through the negative space</li></ul>\n<hr>\n<h2>手绘草图强控制</h2>\n<p>提示词其实有三种类型，图片提示词的权重是最高的。你只要给足图片里的信息，哪怕画得很简陋，AI 也能生成出来。</p>\n<p><strong>操作方法</strong>：</p>\n<ol><li>先把脑海里的画面画出来（完全不需要绘画基础，人物用火柴人代替）</li><li>两个信息一定要画清楚：人物的动作和站位、整个画面的构图关系</li><li>用不同颜色标出不同元素（如黑色和红色区分人物和椅子）</li><li>除了草图，再准备两个画面：人物四视图 + 场景参考图</li><li>把这几张图片全部上传到 AI 画布，配合提示词</li></ol>\n<p><strong>注意</strong>：如果要做多人物画面，用不同颜色标注人物即可。AI 目前能听明白。</p>", "AI氛围与色彩控制": "<h1>AI 氛围与色彩控制</h1>\n<p>氛围的本质不是增加，而是取捨。当你开始决定谁被看见、谁被忽略，画面才真正开始有情绪。</p>\n<hr>\n<h2>氛围三要素</h2>\n<p>一张图的氛围感由三个层面组成：<strong>明暗、冷暖、虚实</strong>。</p>\n<h3>明暗</h3>\n<p>很多人以为氛围感是颜色决定的，但氛围的基础其实是光。如果整张图亮度接近，不管怎么加氛围都会显得假。真正的压力感是大面积暗部，只有一小块光打在人物身上。</p>\n<p><strong>第一步必须告诉 AI：哪里是高光，哪里是暗部</strong>。当亮暗拉开，情绪才有落点。</p>\n<h3>冷暖</h3>\n<p>很多人让 AI 调整氛围时同时写暖光、冷光、环境色，这在 AI 里等于告诉模型每种颜色权重一样，结果颜色没有重点。</p>\n<p>正确做法是<strong>先确定一个主情绪颜色，再把其他颜色全部降级</strong>。</p>\n<h3>虚实</h3>\n<p>当所有地方都清晰时，画面一定没有氛围。因为真实世界里人不会同时看清所有东西。</p>\n<ul><li>人物清晰 + 环境虚化 → 整个世界都在远离主角的感觉（内在的孤独）</li><li>环境清晰 + 人物微虚 → 被环境放大的孤独</li></ul>\n<p>虚实本质是主次关系。当主次关系明确，空间和情绪自然就出来了。</p>\n<hr>\n<h2>调色三法</h2>\n<ol><li><strong>把审美拆成数据</strong> — 不要直接让 AI 模仿某电影风格。把审美拆成 AI 能执行的东西：四项分布、明暗比例、色温倾向。这些才是 AI 能听懂的</li><li><strong>用 JSON 控制色彩</strong> — 把色彩数据整理成 JSON 结构的调色规则，AI 按规则计算，而不是凭感觉猜风格</li><li><strong>验证效果</strong> — 人眼是最不可靠的工具。把调色后的画面和参考图一起交给 AI，让 AI 对比色彩特征。如果描述高度一致，说明调色路径正确</li></ol>\n<hr>\n<h2>减法审美</h2>\n<p>高級畫面裡的光都是有因果的。做减法有时候比加法更有用：</p>\n<ol><li><strong>剪掉复杂背景</strong> — 一个画面里满满的元素往往没有重点。明确主体与背景关系，让细节分层</li><li><strong>剪掉复杂光影</strong> — 多光源只会让 AI 注意力分散。保留关键光源，明确光与影的因果关系</li><li><strong>剪掉色彩杂乱</strong> — AI 会把所有颜色平均处理。限定主色和辅色，删除多余色，让整体色彩统一</li></ol>\n<hr>\n<h2>特征塌陷机制</h2>\n<p>AI 在生成画面时会自动压缩某些视觉特征。理解这个机制就能让画面各有情绪浓度：</p>\n<ol><li><strong>压缩非主体特征</strong> — 在提示词里写\"模糊次要元素\"或\"降低细节密度\"，AI 会主动弱化非主体，画面情绪会更集中</li><li><strong>利用特征略微塌陷制造张力</strong> — 加入\"轻微塌陷\"\"边缘融化\"，AI 会生成微妙的模糊和漂移，让画面张力增强</li><li><strong>强化局部特征对比</strong> — 当某些特征被压缩时，在关键区域增强对比（强调光影落点、色彩重点、动作焦点），AI 会把注意力集中在你想要的地方</li></ol>\n<hr>\n<h2>色调即情绪（核心理念）</h2>\n<blockquote>真正决定电影感的从来不是内容，而是情绪。色调本质上就是控制情绪最直接的方法。</blockquote>\n<p><strong>色调与情绪对应</strong>：</p>\n<table><thead><tr><th>色调</th><th>情绪</th><th>场景示例</th></tr></thead><tbody><tr><td>冷蓝灰</td><td>孤独、悲凉</td><td>卖报男孩走在雨夜中</td></tr><tr><td>暖橙黄</td><td>回忆、生活感</td><td>情侣在咖啡馆聊天</td></tr><tr><td>青绿色</td><td>废土、危险、末日</td><td>废墟中的未来世界</td></tr></tbody></table>\n<p><strong>实操流程</strong>：</p>\n<ol><li>从喜欢的电影/海报中提取截图</li><li>用 AI 生成色卡</li><li>把色卡 + 普通视频拖入 AI 工具，使用\"全能参考模式\"应用色调</li></ol>\n<p><strong>色卡获取提示词</strong>：</p>\n<pre><code>Extract the color palette from this image. Provide hex codes and describe the mood/tone of each color.</code></pre>\n<blockquote>相关：[[AI视频电影质感]]（整合了色调=情绪、留白=呼吸、瑕疵=真实三要素）</blockquote>", "AI影调控制": "<h1>AI 影调控制</h1>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《一个提示词瞬间提升质感》</blockquote>\n<p>></p>\n<blockquote>相关概念：[[AI生图两段式]]（影调控制在情绪版阶段叠加）、[[AI打光五法]]（影调与光线的配合）</blockquote>\n<hr>\n<h2>什么是影调</h2>\n<p>影调不是滤镜。影调是画面中从最暗到最亮之间各级明暗层次的分布关系，以及这种明暗关系所形成的整体视觉倾向。<strong>滤镜是最后贴上去的，但影调是从拍摄之前就已经设计好的</strong>。</p>\n<hr>\n<h2>低长调（Low-key + High Contrast）</h2>\n<p><strong>定义</strong>：以暗部为主要画面基底，同时保留完整调域跨度的影调结构。画面整体处于低亮度倾向，但通过局部高光、深黑位、暗部细节和中间调层次形成强烈而受控的明暗组织。</p>\n<p><strong>直接可用的提示词</strong>：</p>\n<pre><code>low-key lighting, high contrast, deep shadows with detail,\ncontrolled highlights, dramatic chiaroscuro.</code></pre>\n<p><strong>代表作品</strong>：</p>\n<ul><li>《七宗罪》— 城市室内犯罪现场，暗部占主导，局部硬光切出人物</li><li>《银翼杀手2049》— 大面积低亮度空间+精准高光+漂亮体积光</li><li>《沉默的羔羊》— 人物脸部被局部光照亮，背景下沉到暗部</li><li>《蝙蝠侠：黑暗骑士》— 暗部压得很深，但人物轮廓/脸部/墙面仍有层次</li></ul>\n<p><strong>为什么 DC 比漫威更压抑</strong>：影调的运用不同。低长调天然带来压迫感、紧张感和质感。</p>\n<hr>\n<h2>影调在 AI 中的应用</h2>\n<p><strong>动作犯罪片</strong>：</p>\n<pre><code>Low-key lighting, high contrast, deep shadows,\nvolumetric beams cutting through darkness,\nurban night setting, gritty texture, cinematic mood.</code></pre>\n<p><strong>高端男性香水广告</strong>：</p>\n<pre><code>Low-key lighting with controlled highlights,\nsmooth specular rolloff on glass surfaces,\ndeep blacks with subtle reflection details,\nluxurious and understated atmosphere.</code></pre>\n<p><strong>氛围转换</strong>（一秒从少儿频道变迷雾剧场）：</p>\n<pre><code>Add low-key lighting, increase contrast,\ncrush blacks while retaining highlight details,\natmospheric haze, cinematic shadow distribution.</code></pre>", "AI视频动作设计": "<h1>AI 视频动作设计</h1>\n<p>AI 视频动作设计的核心不是让角色\"做动作\"，而是让角色\"有结构地运动\"。动作崩坏从来不是随机问题，它一定对应着一条写错了的提示词逻辑。</p>\n<hr>\n<h2>ARC 视角（动作游戏视角）</h2>\n<p>如果你不知道怎么写打斗，记住一个关键词就够了：<strong>ARC 视角</strong>（动作游戏视角）。</p>\n<p>三个作用：</p>\n<ol><li>让镜头跟着攻击方向走</li><li>让命中瞬间有停顿感，画面更有重量</li><li>自动强化镜头反馈（轻微镜头震动、画面受到打击的反馈）</li></ol>\n<p>三种高级运镜：跟隨主角动量运镜、跟随敌人受力反馈运镜、连续移镜到底运镜。</p>\n<hr>\n<h2>打斗前摇/中/后结构</h2>\n<p>打击感从来不是从\"打\"开始的。任何有力量的動作在发生前一定会有前摇：</p>\n<ol><li><strong>前摇</strong> — 把动作发生前的身体状态写清楚（重心变化、短暂停顿、肌肉收紧）。AI 知道接下来需要爆发力</li><li><strong>中</strong> — 用具体动作描述代替抽象成语。不要写\"刀光剑影\"，要写\"武器在近距离高速交错，攻击方向不断改变\"</li><li><strong>后</strong> — 命中瞬间让镜头、光影、画面结构一起发生反应（轻微镜头震动、运动模糊、环境元素轻微位移）</li></ol>\n<hr>\n<h2>减少动词，增加方式词</h2>\n<p>很多人写动作时喜欢堆叠动词（走、跑、跳、回头），这在 AI 眼里叫\"指令冲突\"，会导致角色动作不协调。</p>\n<p>正确做法：</p>\n<ul><li>减少动词数量，增加<strong>运动方式描述</strong></li><li>保留一个核心动作，用方式词去限定节奏和状态（犹豫的、持续的、重心转移的）</li><li>这样动作才会有连续性</li></ul>\n<hr>\n<h2>单主体动作原则</h2>\n<p>动作崩坏的根本原因是在同一时间给了角色多个身体主导权（既要面部表演又要大幅度位移），AI 不知道该以哪个部位作为动作核心。</p>\n<p>一个稳定的动作提示词<strong>永远只有一个主动作，其余都必须从属于它</strong>：</p>\n<ul><li>走路中回头看 → 主动作是 Walking，回头只是 HeadOrientation 的推审变化</li><li>动作一旦有了主次，画面就会干净利落</li></ul>\n<hr>\n<h2>对手戏人物调度</h2>\n<p>双人镜头不能只写\"两个人站在一起说话\"，要写清楚位置、视线、距离、遮挡和互动关系。写对手戏时，先想四个问题：</p>\n<ol><li>谁先出现？</li><li>谁先发现谁？</li><li>两个人的距离怎么变化？</li><li>最后谁改变了谁的行动？</li></ol>\n<h3>四镜头调度结构（以\"叫住他\"为例）</h3>\n<p><strong>镜头一：建立遮挡关系</strong></p>\n<ul><li>一个人物在明处经过，另一个人物在暗处观察（如藏于屏风后，只露出轻微晃动的发饰和衣角）</li><li>作用：让观众知道两个人的空间位置关系</li></ul>\n<p><strong>镜头二：表现观察和判断</strong></p>\n<ul><li>暗处人物小心探出头，先看一侧再快速看向另一侧，确认时机</li><li>作用：让人物有明确目的，不是随便出现</li></ul>\n<p><strong>镜头三：完成距离变化</strong></p>\n<ul><li>暗处人物提起裙摆快步追赶，镜头紧贴人物横向移动，衣物和配饰持续跟随</li><li>作用：拉近两人距离，同时通过跟随动作保持真实感</li></ul>\n<p><strong>镜头四：改变对方行动路线</strong></p>\n<ul><li>被追人物刚要转身，追赶人物先一步绕到前方挡住去路</li><li>作用：让两个人的关系真正成立——不是简单同框，而是主动改变了对方的行动</li></ul>\n<h3>多镜头调度思路</h3>\n<ol><li><strong>确定初始关系</strong> — 一明一暗、远近对立、背对背、隔屏风，还是同框？</li><li><strong>设计触发点</strong> — 脚步声、回头、眼神、台词、道具、突然靠近</li><li><strong>让一人先行动，另一人产生反应</strong> — 先探头→继续经过；追上去→停下；刚要转身→先一步挡住</li><li><strong>用动作、视线、声音或遮挡把镜头接起来</strong> — 每个镜头是同一段互动的连续变化，不是孤立画面</li></ol>\n<h3>常见错误</h3>\n<p>❌ 只写情节不写调度：<code>沈昭月走到裴景行面前说\"公子，留步\"</code> → 画面变成两个人站桩念台词</p>\n<p>✅ 正确写法：把一句话拆成一组人物调度（遮挡→观察→追赶→挡路），每个镜头都有明确的空间关系变化</p>\n<hr>\n<h2>人物一致性三法</h2>\n<ol><li><strong>将人物和场景拆分</strong> — 把人物和场景一起生成只会加大保持一致的难度。先生成人物四视图，让 AI 多角度理解角色形象</li><li><strong>先订动作，再进场景</strong> — 先让人物完成指定动作，再和目标场景做融图。动作本身会改变人物姿态比例</li><li><strong>将镜头拆开</strong> — 一个视频里动作越多人物越不稳定。把时间切碎、镜头拆开，尽量保持一个动作一段视频</li></ol>\n<hr>\n<h2>产品一致性（形状替换法）</h2>\n<p>AI 并不知道什么是同一个产品，它只是根据你给的信息判断这个东西像不像同一个东西。</p>\n<p>最精准的方法：</p>\n<ol><li>忘掉产品，用简单的几何形状代替它</li><li>先生成一组画面，用这组图生成视频</li><li>每隔一秒导出一张关键帧</li><li>用 Banana 把产品替换上去</li><li>再把替换后的画面丢给 Kling 做参考</li></ol>\n<hr>\n<h2>动作四层动态</h2>\n<p>让 AI 角色更有生命力，一个动作要写出四层动态：</p>\n<ol><li><strong>身体动作</strong> — 人物做了什么、往哪移动、速度如何（提起裙角、从暗巷跑向灯市）</li><li><strong>跟随动作</strong> — 衣物、头发、配饰随身体产生的反应（裙摆飞扬、头发晃动、耳坠摆动）</li><li><strong>环境变化</strong> — 人物移动时周围光线、空间的变化（从冷蓝暗巷跑向暖金灯市，暖金灯光逐渐覆盖面部）</li><li><strong>声音连接</strong> — 声音从远到近与画面移动方向对应（脚步声、灯市人声逐渐靠近）</li></ol>\n<p><strong>反面案例</strong>：</p>\n<pre><code>女孩朝镜头跑来，电影感，高质量，画面唯美。镜头轻微后退。</code></pre>\n<p>→ 只有动作结果，没有动作过程，AI 自行补全容易平移僵硬。</p>\n<p><strong>正确案例</strong>（四层动态写全）：</p>\n<pre><code>侧面跟拍，提起破损裙角，从冷蓝色暗巷快步跑向暖金灯市，\n头发、披帛和耳坠随奔跑飞扬，暖金灯光逐渐覆盖她的面部，\n脚步声，灯市人声逐渐靠近。</code></pre>\n<p><strong>万能提示词模板</strong>（将你的角色/场景填入即可）：</p>\n<pre><code>[角色描述]，[动作描述]，[移动方向/路径]，\n[衣物/配饰跟随动作]，[环境变化/光线变化]，\n[声音连接/环境音变化]。</code></pre>\n<h3>与<a href=\"#\" class=\"wiki-link\" data-name=\"AI角色资产搭建\">AI角色资产搭建</a>的关系</h3>\n<p>角色活人感的基础是资产完整性（脸+妆造+服装），但真正让角色\"活起来\"的是动作提示词中的四层动态。两者配合：资产决定角色长什么样，四层动态决定角色动起来像不像真人。</p>\n<hr>\n<h2>声音连接</h2>\n<p>关键动作配上细节音效会让画面更真实。常见场景：</p>\n<ul><li><strong>人物停下</strong> → 脚步声跟着停住</li><li><strong>从屏风后探头</strong> → 轻微衣料摩擦声</li><li><strong>步摇晃动、茶杯落桌、衣袖擦过手背</strong> → 补细节音效</li><li><strong>对视瞬间</strong> → 环境声稍弱，或加轻氛围音</li><li><strong>挡住去路瞬间</strong> → 轻微情绪重音</li></ul>\n<p>原则：音效不要加太满，重点卡在关键动作和情绪变化上。</p>", "时间补偿机制与动态词学": "<h1>时间补偿机制与动态词学</h1>\n<p>AI 有一个小众机制叫\"时间补偿\"——当你给 AI 一个时间状态，它会根据前后时间推测画面变化。这种猜时间的机制，会让静态画面出现意外的情绪感和动态感。</p>\n<hr>\n<h2>时间词三态触发</h2>\n<p>AI 在没有时间信息时，画面往往很死板。加入时间词可以触发不同的情绪效果：</p>\n<h3>过去式（刚刚、曾经）</h3>\n<p>触发<strong>情绪残留</strong>与光影延续。AI 会模拟前几秒的画面，自动延续光影和元素布局，让画面变化符合时间因果，产生情绪延续感。</p>\n<h3>现在式（正在、此刻）</h3>\n<p>赋予画面<strong>呼吸感与运动趋势</strong>。AI 会把场景视作正在进行的事件，在生成时动态调整元素，让主体和背景呈现运动趋势，光影和空间都更有呼吸感。</p>\n<h3>将来式（即将、可能性）</h3>\n<p>增强画面的<strong>紧张感与戏剧张力</strong>。因为未来的可能性很多，AI 在生成时会随机推演下一瞬可能发生的情况，加强紧张感和空间压迫，画面瞬间更有戏剧张力。</p>\n<hr>\n<h2>运动矢量反推</h2>\n<p>很多人反推视频的方法是截一张图然后让 AI 再生成，但这种方法永远无法复现原视频效果——因为你从一开始就把结果当成了过程。</p>\n<p>正确的做法是<strong>反推生成过程而不是画面内容</strong>：</p>\n<ol><li>找到起始帧、爆发帧和结尾帧，让 AI 反推出视频的生成逻辑与变化顺序</li><li>不要问 AI 这视频画了什么（这会诱导输出大量无效的修饰词），要让 AI 描述<strong>相机的运动矢量</strong>——焦距如何伸缩、坐标如何偏移、运动路径的参数化表达</li><li>把 AI 给的感性描述翻译成具体的参数指令</li></ol>\n<p><strong>本质</strong>：视频反推是在解构运动学规律，让你剥离画面的表象去触碰背后的参数逻辑。</p>\n<hr>\n<h2>时间逻辑约束</h2>\n<p>AI 视频本质是时间中发生的连续运动，而不是单帧画面堆叠。如果你只写\"人物向前走去\"这种简单描述，AI 虽然能理解，但看起来会僵硬。</p>\n<p>正确做法是在提示词里明确<strong>时间和动作的关系</strong>：</p>\n<ul><li>动作的起始状态</li><li>持续的时长</li><li>速度的变化</li></ul>\n<p>画面才会展现真实的运动节奏。</p>", "AI底层机制与高级控制": "<h1>AI 底层机制与高级控制</h1>\n<p>AI 有一些隐藏的行为机制。理解并利用这些机制，能让你从\"写提示词\"升级到\"操控模型\"。</p>\n<hr>\n<h2>误解机制三类型</h2>\n<p>AI 有一个毛病叫\"误解机制\"——你说一句话它会往另一个方向理解，但利用这个反向操作反而能提高画质。</p>\n<ol><li><strong>缺省误解</strong> — AI 会把缺失理解成默认效果。比如你要画面干净，它就给你加纹理；你要人物自然，它就给你上锐化滤镜。<strong>解法</strong>：明确告诉 AI 不要什么（不要纹理、不要锐化），你越确定它就能越精准</li><li><strong>抽象误解</strong> — AI 会把抽象词理解成画面特效。比如你要梦幻，它就开始画光晕；你要高级，它就开始塞光斑。<strong>解法</strong>：把抽象词拆成可量化的视觉行动（梦幻=低饱和+软光源+长焦压缩；高级=光线对比+部分留白）</li><li><strong>不确定误解</strong> — AI 会把不确定描述理解成自动补全。你在提示词里写\"自然感\"\"真实感\"，它会帮你补背景、补环境、补细节。<strong>解法</strong>：提前告诉它不要补的地方，把其他区域压干净</li></ol>\n<hr>\n<h2>风格泄漏三解法</h2>\n<p>AI 有一个隐藏机制叫\"风格泄漏\"——你没写风格样式时，AI 会从没写清的地方泄漏进自带的效果。</p>\n<ol><li><strong>明确锁定风格边界</strong> — 不要写\"不加效果\"（AI 不知道不加效果长什么样），而是直接指定参考类型（\"布列松的摄影风格\"），AI 就会按风格的定义执行</li><li><strong>风格分段写</strong> — 80% 的风格泄漏是因为把一整段提示词塞在一句话里。分段写：第一段写主体、第二段写光线、第三段写色彩、第四段写风格方向</li><li><strong>动态限制法</strong> — 在提示词里加入实时修正信号，告诉 AI 哪些元素是固定的、哪些可以自由发挥。既保留创意空间，又保证主体不被破坏</li></ol>\n<p><strong>核心</strong>：不是 AI 喜欢乱画，是你没给它设好边界。边界越清晰，画面越纯净。</p>\n<hr>\n<h2>鲁棒性破坏</h2>\n<p>让 AI 在可控范围内稍微失控一下，反而能得到更有张力、更鬆弛、更真实的画面。</p>\n<ol><li><strong>让构图失控</strong> — 把构图从规则换成趋势。不写精确位置，写\"主题位置留白区域视觉重心\"，AI 会因为不稳定的趋势词在构图阶段产生小浮动，让画面更自然</li><li><strong>让光线失控</strong> — 用\"多光源\"\"混合光\"给 AI 一个光源不稳定的输入，AI 在出图时会产生犹豫，这种犹豫会生成非常真实的随机光</li><li><strong>让风格失控</strong> — 加入\"我看到的/我感受到的\"等主观视角词，AI 就不会去蹭训练数据的套路，画面风格更特别</li></ol>\n<hr>\n<h2>JSON 提示词的本质</h2>\n<p>JSON 本身并不负责审美，它真正解决的问题只有一个——让结果变得更可控制。</p>\n<ul><li>JSON 只是一个结构化指令，不能让画面更艺术，只能让输出更干净</li><li>JSON 解决的是规划而不是创意。用 JSON 的前提是你必须有好的创意参考</li><li>JSON 不是在所有工具里都好用（在 Kling 里几乎没意义）。真正能把 JSON 用到极致的是偏工作流的 AI 工具</li></ul>\n<p><strong>核心</strong>：JSON 提示词解决的是掌控感和一致性，自由提示词保留的是探索空间和创造力。什么时候用取决于当前目标，而不是哪种写法更高级。</p>\n<hr>\n<h2>知识诅咒</h2>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《避免无效抽卡》</blockquote>\n<p><strong>问题</strong>：你默认 AI 知道的东西，AI 根本不知道。你写\"机甲\"，AI 不知道那是机甲还是外星人还是怪物。很多人反复抽卡，是因为一直在用自己能理解的语言写提示词，而不是 AI 能理解的语言。</p>\n<p><strong>核心</strong>：提示词是你和 AI 沟通的桥梁，不要让你和 AI 之间陷入知识的诅咒。</p>\n<p><strong>解法</strong>：将你能理解的抽象概念换成 AI 能理解的具体形象定义。写提示词后反问自己——\"如果我不知道这是什么，只看这段文字我能想象出来吗？\"</p>\n<hr>\n<h2>提示词权重竞争机制</h2>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《提示词没有执行顺序》</blockquote>\n<p><strong>核心观点</strong>：AI 提示词没有执行顺序，只有<strong>权重竞争</strong>。模型不是流程图，不会先识别主体再识别动作最后识别风格。提示词的结果只被以下 5 个因素影响：</p>\n<ol><li><strong>词本身够不够强</strong> — \"双手合十跪拜\"天然很强，\"克制自然的\"天然很弱。当强词和弱词同时出现，模型通常先满足强词</li><li><strong>词是否容易视觉化</strong> — \"抬头\"很容易视觉化，\"虔诚\"很抽象。模型通常先满足更明确的词</li><li><strong>词之间会不会重组冲突</strong> — \"背对镜头看向前方的佛像\"+\"让观众看到表情\"本身有冲突，模型会选折中方案</li><li><strong>训练数据里哪种组合更常见</strong> — 模型在训练中见过大量\"僧人+双手合十+侧面\"的数据模板，就更容易往这个方向靠</li><li><strong>参考图的影响</strong> — 参考图也在参与争夺最终解释权，提示词不是唯一控制源</li></ol>\n<p><strong>启示</strong>：提示词的本质不是在描述你想要什么，而是在<strong>决定 AI 优先看见什么</strong>。写提示词时考虑权重竞争，而不是\"按顺序写清楚\"。</p>", "风格提取与约束系统": "<h1>风格提取与约束系统</h1>\n<p>风格从来不是提示词，而是一套被反复执行的选择逻辑。当你能复用这套逻辑，你才真正拥有了这个风格。</p>\n<hr>\n<h2>寻找\"不可变约束点\"</h2>\n<p>很多人提取风格就是把图丢给 AI 让它反推提示词，但这样提取到的根本不是风格，而是那一次生成的结果。</p>\n<p><strong>三步正确提取</strong>：</p>\n<ol><li><strong>看\"没说什么\"而不是\"有什么\"</strong> — AI 在做反推时其实是在语义拟合，它会用最安全的词语去概括结果。正确做法是先找到画面的<strong>约束点</strong>——问 AI 这张图在生成时有哪些不可变的条件（构图和视角？空间关系？）。只有这些不可变条件才是风格存在的前提</li></ol>\n<ol><li><strong>让 AI 看共性而不是看独立</strong> — 单张图 AI 只能总结结果，总结不出真正的风格。多找几张同样风格但不同内容的画面，让 AI 找出这些画面的<strong>共性</strong>。这些被反复保留下来的选择才是真正的风格</li></ol>\n<ol><li><strong>复用画面结构搭建体系</strong> — 把前两步得到的条件搭建 AI 能长期执行的生成结构。拆分成四个板块：空间与构图、光线与氛围、色彩与质感、限制与规则。这样就能在不改变风格的前提下加入自己的内容</li></ol>\n<hr>\n<h2>风格边界锁定</h2>\n<p>AI 有一个隐藏机制叫\"风格泄漏\"——你没写风格样式时，AI 会从没写清的地方泄漏进自带的效果。</p>\n<p><strong>解法</strong>：</p>\n<ul><li>不要写\"不加效果\"（AI 不知道不加效果长什么样）</li><li>直接指定参考类型（\"布列松的摄影风格\"\"某部电影的调色\"）</li><li>AI 就会按风格的定义执行</li></ul>\n<p>这样你就不是禁止它做某事，而是告诉它应该拿套规则工作。</p>\n<hr>\n<h2>结构骨架反推</h2>\n<p>很多人在反推时会沉迷在\"电影感\"\"梦幻感\"这些风格词上。但风格词本身只是装饰，它并不决定画面最终长什么样。</p>\n<p>真正贯穿整个生成过程的是<strong>结构骨架</strong>：</p>\n<ul><li>构图</li><li>光照方向</li><li>主体与背景之间的关系</li></ul>\n<p>正确做法是让 AI 从<strong>生成逻辑出发</strong>，反推画面背后的结构骨架。否则只是在不断放大随机性。</p>\n<p><strong>验证方法</strong>：把反推得到的提示词先生成一张画面，再让 AI 对比画面进行自我分析。通过这种方式，不仅能发现提示词中失效的部分，还能找到真正起作用的条件。</p>", "AI视频提示词生成工作流": "<h1>AI 视频提示词生成工作流</h1>\n<blockquote>🚀 **如果不确定从哪开始**，先看 [[视频创作快速导航]]（按\"我当前在做什么\"组织的任务型 MOC）。<br>本页是**全局流程总图**，下面的 6 步是按顺序的核心流程。</blockquote>\n<p>三层结构：</p>\n<ul><li><strong>第一层（全局原则）</strong> — 任何时候都要记住，不绑在任何步骤上</li><li><strong>第二层（核心流程）</strong> — 每步必须走完，共 6 步</li><li><strong>第三层（进阶增强）</strong> — 走完核心后，按需选择</li></ul>\n<hr>\n<h2>第一层：全局原则</h2>\n<p>以下 3 条原则贯穿全程，每写一句话都要想到它们。</p>\n<h3>① 视觉描述优先</h3>\n<p>AI 需要的是视觉画面，不是文字描述。用\"嘴角下压微颤\"代替\"难过\"，用\"45度侧光\"代替\"高级感\"。</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"视觉描述优先原则\">视觉描述优先原则</a></p>\n<h3>② 克制原则</h3>\n<p>AI 对程度词和动态词容易走极端。用状态描述代替程度描述——不说\"非常亮\"说\"柔和的光线\"，不说\"快速跑\"说\"步伐急促\"。</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a></p>\n<h3>③ 变量与不变量</h3>\n<p>先锁死不变量（全片影调、人物锚点、风格），再开放变量（每个镜头的运镜、光源方向）。任何时候都分清楚哪些是锁死的、哪些是开放的。</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"变量与不变量分离\">变量与不变量分离</a></p>\n<hr>\n<h2>第二层：核心流程</h2>\n<p>每步必须走完。6 步结束后就能产出可用的提示词。</p>\n<h3>第1步：定故事</h3>\n<ul><li>[P0] 一句话说清：谁、做什么、为什么、结果</li><li>[P0] 核心行动是什么？所有镜头围绕它展开</li></ul>\n<p><strong>进阶</strong>：场景价值有变化吗？因果链通顺吗？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI导演创作思维#核心行动驱动\">AI导演创作思维#核心行动驱动</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"Causal Chain Audit\">Causal Chain Audit</a></p>\n<hr>\n<h3>第2步：定分镜</h3>\n<ul><li>[P0] 主镜定了吗？核心画面 3-4 个，删掉任何一个故事就不完整</li><li>[P0] 每个镜头标了景别、节奏、时长吗？</li></ul>\n<p><strong>进阶</strong>：信息价值和情绪价值判断了吗？节奏曲线设计了吗？需要空镜或首尾帧控制吗？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI分镜设计\">AI分镜设计</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"Pacing and Rhythm\">Pacing and Rhythm</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI首尾帧控制\">AI首尾帧控制</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI空镜设计\">AI空镜设计</a></p>\n<hr>\n<h3>第3步：定镜头</h3>\n<ul><li>[P0] 运镜词选了吗？推拉摇移跟绕甩、手持/固定/航拍</li><li>[P0] 镜头信息写在最前面了吗？（反向写提示词）</li></ul>\n<p><strong>进阶</strong>：以摄像机为参照系了吗？角度选了吗？需要前景遮挡吗？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI镜头语言进阶\">AI镜头语言进阶</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"视觉平衡与动线构图\">视觉平衡与动线构图</a></p>\n<hr>\n<h3>第4步：定光影</h3>\n<ul><li>[P0] 主光源方向在哪？同一个场景内所有镜头光影一致吗？</li></ul>\n<p><strong>进阶</strong>：色温是什么？补光怎么打？需要特殊光效吗？全片影调是什么？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI打光五法\">AI打光五法</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"光线布置模块化\">光线布置模块化</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI光源提示词模板库\">AI光源提示词模板库</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI影调控制\">AI影调控制</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI室内光控制\">AI室内光控制</a></p>\n<hr>\n<h3>第5步：定人物动作</h3>\n<ul><li>[P0] 画面里有人吗？如果有——只有一个主动作吗？</li><li>[P0] 多镜头同一个人物？资产三件套保持一致了吗？</li></ul>\n<p><strong>进阶</strong>：人物圣经写了吗？角色锚定了吗？微表情用控制强度/动作驱动/动态演变了吗？四层动态写全了吗？活人感检查了吗？双人以上用对手戏调度了吗？声音设计了吗？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI角色资产搭建\">AI角色资产搭建</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"角色锚定\">角色锚定</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计\">AI视频动作设计</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI角色声音控制\">AI角色声音控制</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"sources/微表情情绪特征集\">sources/微表情情绪特征集</a></p>\n<hr>\n<h3>第6步：写提示词</h3>\n<ul><li>[P0] 五板块结构用了吗？情绪+主体+光线+镜头+细节</li><li>[P0] 不变量锁死了吗？变量开放了吗？</li></ul>\n<p><strong>进阶</strong>：描述比重合理吗？如果是图片——先做信息版再做情绪版了吗？</p>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"AI视觉语法体系\">AI视觉语法体系</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"描述比重原则\">描述比重原则</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI生图两段式\">AI生图两段式</a></p>\n<hr>\n<h2>第三层：检查与修正</h2>\n<p>走完核心流程后，逐项检查。用到了就做，用不到就跳过。</p>\n<ul><li>[P1] <strong>反向约束</strong>：明确说不要什么</li><li>[P1] <strong>权重竞争</strong>：强词有没有碾压弱词？</li><li>[P1] <strong>知识诅咒</strong>：有没有默认 AI 知道的东西？</li><li>[P1] <strong>必要性测试</strong>：每个元素删掉它结果会变吗？</li><li>[P1] <strong>编辑三要素</strong>：变量+不变量+关键句</li><li>[P1] <strong>小步迭代</strong>：先出基础图再逐步编辑</li><li>[P1] <strong>生图决策规则</strong>：注意力前置、冗余信号稀释</li><li>[P1] AI 生成结果不对？三步修正：删高干扰动作→修正强磁→明确动作歧义</li></ul>\n<p><strong>参考</strong>：<a href=\"#\" class=\"wiki-link\" data-name=\"反向约束\">反向约束</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI底层机制与高级控制\">AI底层机制与高级控制</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"编辑三要素\">编辑三要素</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"小步迭代\">小步迭代</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI 生图决策规则\">AI 生图决策规则</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"AI提示词修正思路\">AI提示词修正思路</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a>、<a href=\"#\" class=\"wiki-link\" data-name=\"Cut Priority Method\">Cut Priority Method</a></p>", "AI生图两段式": "<h1>AI 生图两段式：信息版 → 情绪版</h1>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《一步错步步错》</blockquote>\n<p>></p>\n<blockquote>相关概念：[[AI影调控制]]（情绪版的核心是影调控制）</blockquote>\n<h2>核心原则</h2>\n<p>生图有顺序。先做<strong>信息版</strong>，再做<strong>情绪版</strong>。顺序错了就会无限套娃抽卡。</p>\n<hr>\n<h2>第一步：信息版</h2>\n<p><strong>目标</strong>：平光、可读性最高、所有细节看得清。</p>\n<p><strong>为什么</strong>：AI 在暗部和高光里看不清，看不清就会开始脑补——凭空加东西、改结构。所以人物、道具、构图、内容调整，<strong>必须在信息版里做完</strong>。</p>\n<p><strong>写法</strong>：用均匀柔和的正面光，不强调明暗对比，让所有元素清晰可见。</p>\n<hr>\n<h2>第二步：情绪版</h2>\n<p><strong>目标</strong>：在内容锁死的基础上，叠加影视化效果。</p>\n<p><strong>可叠加的元素</strong>：</p>\n<ul><li>影调氛围（低长调、高长调等）</li><li>情绪色彩（色温、色调）</li><li>明暗对比</li><li>轮廓光、逆光、体积光</li><li>舞烟、雨、雪等气氛</li><li>胶片感、颗粒、色彩风格</li></ul>\n<p><strong>这一步才是镜头语言的表演阶段</strong>，但它必须建立在内容稳定的基础上。</p>\n<hr>\n<h2>核心规则</h2>\n<ol><li><strong>内容锁死之后再上影调</strong> — 信息版确认内容无误后，再叠情绪版</li><li><strong>不要在情绪版上修改内容</strong> — 如果发现内容需要改，回到信息版重做，不要在情绪版上直接改</li><li><strong>换光影风格要回信息版</strong> — 如果要换完全不同的一套光影风格，需要回到信息版重做</li><li><strong>否则无限套娃</strong> — 影调会吞信息 → AI 看不清 → 脑补乱加 → 你改内容 → 影调风格被吞 → 再调影调 → 又吞信息 → ...</li></ol>\n<hr>\n<h2>示例流程</h2>\n<p><strong>信息版提示词</strong>：</p>\n<pre><code>A young woman in a white shirt, sitting at a wooden desk,\nsoft even lighting, all details clearly visible,\nneutral expression, centered composition.</code></pre>\n<p><strong>确认内容无误后，叠情绪版</strong>：</p>\n<pre><code>[信息版提示词保留]\nLow-key lighting, high contrast, warm tungsten light from the right,\ndeep shadows on the left side, volumetric smoke in the air,\ncinematic color grading with teal and orange tones,\nsubtle film grain.</code></pre>", "AI导演创作思维": "<h1>AI 导演创作思维</h1>\n<p>从\"指令使用者\"向\"创作者/导演\"的角色转变，是提升作品整体感的核心。很多人把 AI 当成输出工具，但真正会用 AI 的人把它当成生产系统。</p>\n<hr>\n<h2>调度优先原则</h2>\n<p>很多 AI 创作者会先生成分镜，再用分镜图去生视频。这种方式出来的视频效果好，是因为 AI 主动帮你解决了场面调度的模块——人物怎么站位、镜头怎么运动，AI 都替你做了决定。</p>\n<p>但问题就在这里：<strong>当调度是 AI 替你完成的，你并没有真正理解空间关系</strong>。</p>\n<p>电影学里有一个核心概念叫\"场面调度\"，它决定的是情绪方向和空间张力。分镜只是把镜头拆开，<strong>调度才是设计空间</strong>。正确的做法是先确定空间规则，学会了如何调度，才能知道自己哪个分镜出了问题。</p>\n<hr>\n<h2>核心行动驱动</h2>\n<p>在电影里，一场戏必须有一个核心行动展开（比如一个人试图逃离某个空间）。所有镜头、调度、节奏都围绕这个行动展开。</p>\n<p>很多 AI 视频的问题在于没有核心行动——画面虽然在动，但根本不知道核心是什么。正确的做法是<strong>先确定一个核心行动，再围绕这个动作做内容</strong>。行动先确定，画面才有方向。</p>\n<hr>\n<h2>补拍与重构思维</h2>\n<p>电影不是按顺序拍出来的，而是在剪辑中被重新构建的。很多 AI 创作者追求一次生成完整视频，但这样会失去修正的机会。</p>\n<p>真正的导演思维是<strong>允许不完整</strong>：</p>\n<ol><li>先生成结构段落</li><li>哪里弱就单独补一个镜头（转折不明显 → 补一个反应特写；节奏太平 → 补一个静止空镜）</li><li>最后剪辑在一起</li></ol>\n<hr>\n<h2>全流程自动化（Codex 应用）</h2>\n<p>利用 Codex 等工具实现工业化管线：</p>\n<ol><li>用导演 Skill 负责创作剧本和写短剧提示词</li><li>用生图 Skill 负责图片生成</li><li>把两个 Skill 丢给 Codex，告诉它想要的大致风格</li><li>Codex 自动调用两个 Skill，从剧本人物到分镜，按固定流程一步步执行</li><li>粘贴提示词，Codex 操控电脑在画布上分别上传资产和提示词</li></ol>\n<p>剪辑同样可以自动化：把所有素材放进同一个文件夹，告诉 Codex 视频的主题和节奏，它就会自动查看素材并挑选合适的片段，调用剪辑工具完成初剪。</p>\n<p><strong>核心</strong>：以前你是在操作 AI，现在更像是在训练一个懂你的创作助手。</p>\n<hr>\n<h2>画面结构拆解法</h2>\n<p>拿到一段参考视频时，不要用 AI 反推\"标签词\"（画面里有什么），而是要拆解\"画面结构\"（画面怎么构成的）。标签词定义了\"有什么\"，却忽略了\"动作过程\"与\"空间关系\"。</p>\n<h3>反推提示词的三大失控</h3>\n<ul><li><strong>动作缺乏时间线</strong>：写了\"欢快地跳舞\"，但 3 秒视频里怎么跳的？AI 只能随机分配</li><li><strong>镜头缺乏轨迹</strong>：写了\"动态运镜\"，但具体是环绕跟拍还是低角度上推？不规定轨迹就是空话</li><li><strong>空间位置随机</strong>：尸体在脚边还是远处？光是左侧轮廓光还是正面顺光？</li></ul>\n<h3>画面结构四维度</h3>\n<p>真正拆解一个画面时，要从四个维度入手：</p>\n<ol><li><strong>构图与机位</strong> — 远景/中景/近景/特写？平视/仰视/俯视？</li><li><strong>主体特征</strong> — 衣着材质（高反光皮革/粗糙亚麻）、具体姿态和表情</li><li><strong>光影与氛围</strong> — 主光源方向、环境补光、色彩倾向（冷调/暖调）</li><li><strong>环境纵深</strong> — 前景遮挡物、中景主体、背景虚化程度（景深）</li></ol>\n<h3>时间线逐帧拆解法</h3>\n<p>不要用一段话概括一个 15 秒视频。根据镜头切换和动作发生，将视频切割成不同时间节点。例如一个 5 秒的起步走视频：</p>\n<table><thead><tr><th>时间段</th><th>镜头</th><th>内容</th></tr></thead><tbody><tr><td>0-2 秒</td><td>特写</td><td>聚焦脚步，鞋底与地面摩擦，背景微虚</td></tr><tr><td>2-4 秒</td><td>拉远至中景</td><td>角色转身，衣服随动作摆动，主光源照亮侧脸</td></tr><tr><td>4-5 秒</td><td>推镜头</td><td>角色走向画面深处，融入背景光影</td></tr></tbody></table>\n<h3>物理世界描述原则</h3>\n<p>通过文字向 AI 传达物理规律，像在三维软件中建立场景一样思考：</p>\n<ul><li>❌ 不要写\"漂亮的光\" → ✅ 写\"左侧 45 度主光源打在面部，右侧有微弱的蓝色环境补光\"</li><li>❌ 不要写\"他在走路\" → ✅ 写\"步伐沉重，双臂自然摆动，镜头跟随后背平滑推进\"</li></ul>\n<blockquote>详细的动作过程描述方法参见 [[AI视频动作设计]]</blockquote>", "AI创意方法论": "<h1>AI 创意方法论</h1>\n<p>当所有人都能轻易做出高画质视频时，单纯的视觉刺激已经很难留住观众。创意往往来自\"不合理\"——观众在信息流里不是被\"清晰度\"吸引的，而是被\"违和感\"抓住的。这套方法论教你如何打破思维定势，让 AI 作品脱颖而出。</p>\n<hr>\n<h2>思路一：打破物理定律</h2>\n<p>很多人下意识追求画面\"真实\"——光影符合自然、重力往下掉、物体稳稳扎在地上。但这种追求\"合理\"的行为，正是困住想象力的主要原因。</p>\n<h3>维度一：逆转重力（Anti-Gravity）</h3>\n<p>让水往上流，万物失重。这是最直接、视觉冲击力最强的做法。</p>\n<p><strong>静态图公式</strong>：</p>\n<pre><code>主体 + 常规环境 + 反常理的物理状态 + 超现实主义风格 + 电影级光影</code></pre>\n<p><strong>示例</strong>：</p>\n<pre><code>电影级真实摄影。一只毛发逼真、戴着黑色粗项圈的北极熊，\n正用两只爪子捧着智能手机专注地看。北极熊坐在一块长满青苔的\n巨大岩石上，但这块岩石正悬浮在半空中。背景是绿色的森林，\n一条巨大的瀑布违背地心引力，水流正咆哮着向天空倒流。\n空中漂浮着失重的水珠和碎石。8k分辨率，极致细节。</code></pre>\n<p><strong>视频生成技巧</strong>：用\"图生视频\"，将静态图作为首帧导入。视频提示词只强调环境动态，不要描述主体动作，避免 AI 把画面\"纠正\"回正常状态。</p>\n<h3>维度二：质量与体积的悖论</h3>\n<p>让巨型建筑轻微漂浮。极其沉重、本应稳固连接地面的东西展现出轻盈姿态，产生巨大的视觉冲击力和科幻感。</p>\n<p><strong>示例</strong>：</p>\n<pre><code>一座高耸入云的摩天大楼，底部没有连接地面，\n像一个失重的气球在云层中轻微缓慢地上下浮动。\n底部能看到断裂的钢筋和掉落的泥土。</code></pre>\n<blockquote>**关键提示词**：Anti-gravity（反重力）、Levitating/Floating subtly（漂浮/轻微悬空）、Flowing upwards（向上流）</blockquote>\n<hr>\n<h2>思路二：让时间失控</h2>\n<p>大部分人对 AI 视频中\"时间\"的处理认知单一——慢放、加速、卡点。真正有冲击力的时间处理，是让时间\"出问题\"。</p>\n<h3>时空割裂感</h3>\n<p>让画面里的一部分时间飞逝，另一部分时间停滞。</p>\n<p><strong>出图技巧</strong>：强调背景的\"运动模糊\"和主体的\"绝对静止\"。</p>\n<p><strong>示例</strong>：</p>\n<pre><code>电影级摄影，深夜的繁华街道，车流和行人在背景中\n化作高速运动模糊的光轨。画面正中央，一个穿风衣的\n人物纹丝不动地站在原地，仿佛时间在他身上停滞。</code></pre>\n<h3>动作的非自然阻断</h3>\n<p>动作做到一半突然停住。</p>\n<p><strong>视频提示词</strong>：</p>\n<pre><code>人物正在奔跑，动作流畅自然，在某一帧突然完全静止，\n像被按下了暂停键，保持奔跑姿态悬浮在空中。</code></pre>\n<hr>\n<h2>思路三：把镜头变成角色</h2>\n<p>很多人把镜头当\"记录工具\"——永远在画面外旁观。创意很多时候不是内容新，而是\"观看方式\"新。</p>\n<h3>巨物降临视角</h3>\n<p>从地面看巨人，或动物视角看人类。改变常规平视角度，将镜头放置在极低位置，赋予它微小生物的身份。</p>\n<p><strong>示例</strong>：</p>\n<pre><code>极端低角度仰视镜头，从地面杂草的视角仰望，\n一个巨大的身影遮天蔽日般走过，靴子每一步\n都让地面轻微震动，草叶在镜头前晃动。</code></pre>\n<h3>局限的物理视角</h3>\n<p>把镜头塞进原本不可能放摄像机的地方，赋予它\"物品\"的视角。</p>\n<p><strong>示例</strong>：</p>\n<pre><code>从透明玻璃杯内部向外看，光线穿过水和杯壁产生折射，\n外部世界被扭曲放大。一只手从杯口伸入，指尖触碰水面，\n泛起涟漪，杯中的冰块轻轻碰撞杯壁。</code></pre>\n<blockquote>**关键提示词**：First-person POV from...（来自...的第一人称视角）、Extreme low/high angle looking at...（极端仰/俯视看着...）</blockquote>\n<hr>\n<h2>总结</h2>\n<p>在 AI 的世界里，规则可以被重写：</p>\n<ol><li><strong>打破物理定律</strong> — 逆转重力、质量悖论，制造反常理的视觉奇观</li><li><strong>让时间失控</strong> — 时空割裂、动作阻断，打造时空错乱的警觉感</li><li><strong>把镜头变成角色</strong> — 巨物视角、物品视角，用全新观看方式重塑故事</li></ol>", "物理模拟控制流（Cinema Studio）": "<h1>物理模拟控制流（Cinema Studio）</h1>\n<p>市面上大多数 AI 工具的问题其实很一致：生成的光很假、景深很糊、氛围感不像电影。而 Cinema Studio 这类工具的本质是把生成逻辑重做了一遍——按照真实世界的物理逻辑来渲染，而不是靠 AI 随机拼凑。</p>\n<hr>\n<h2>真实摄影机模拟</h2>\n<p>在生成时可以直接选择一台真实存在的电影摄影机来构建画面（比如 Arri Alexa 或者 RED），然后是镜头和焦段。</p>\n<p>不同镜头、不同焦段本身就会决定画面的虚化、光斑反射和整体气质。这些变化都是按照<strong>真实世界的物理逻辑</strong>在发生的，而不是靠 AI 随机拼出来。</p>\n<p>最终呈现的是一个真实比例、完整电影感的画面——不是抽卡抽出来的，而是在一个可控的渲染流程里直接生成的。</p>\n<hr>\n<h2>物理模拟引擎</h2>\n<p>新一代引擎（如 Nano Banana Pro）采用物理模拟和上下感知渲染：</p>\n<ul><li>它能像真实相机传感器一样读取光线、天气、位置</li><li>它能理解场景、物体和运动</li><li>让所有编辑都自然的不像是生成的</li><li>一句提示词就能切换风格</li><li>放入基础图 + 参考图，它会在保持身份完全一致的前提下把整套美学一键转移</li></ul>\n<p><strong>核心价值</strong>：当你终于能控制画面的时候，你不会再想着该怎么去骗模型，而是在想这一帧值不值得被拍出来。这才是创作真正开始的地方。</p>", "产物先行": "<h1>产物先行</h1>\n<p>写 AI 图像提示词的第一原则：<strong>先定义交付物类型，再写它长什么样子</strong>。</p>\n<h2>核心思想</h2>\n<p>不同产物触发模型不同的精修和布局逻辑：</p>\n<ul><li>广告图 → 创意简报写法，品牌约束清晰</li><li>信息图 → 结构+标签+箭头写法，密集文字用高档</li><li>Logo → 品牌约束（扁平/纯色/可缩放）</li><li>漫画 → 以动作为中心，每个版面一个动作</li><li>UI 模型 → 像描述已上线产品一样，不是设计草图</li></ul>\n<p>  - 教育图 → 受众+课程目标+视觉格式</p>\n<p>  - 幻灯片 → 像写工具一样规范，真实文本和数据</p>\n<p>  - <strong>九宫格批量预览</strong> → 三段式结构：整体布局说明 + 逐屏内容 + 全局风格统一描述</p>\n<p>提示词应该先说\"这是一张什么图\"，再说\"它长什么样子\"。</p>\n<hr>\n<h2>九宫格预览的特殊写法</h2>\n<p>九宫格（或任何多图网格预览）是一种特殊的交付物类型，它的提示词结构和单图不同：</p>\n<h3>三段式结构</h3>\n<pre><code>[第一部分：整体布局说明]\n描述网格布局格式（几行几列、整体比例），让 AI 知道这是多图预览，不是单张图。\n\n[第二部分：逐屏内容描述]\nFrame 1: [视觉描述]. 完整文案\nFrame 2: [视觉描述]. 完整文案\n...\n\n[第三部分：全局风格统一描述]\n全局风格（applies to all frames），只写一次，不在每个格子重复。</code></pre>\n<h3>要点</h3>\n<ul><li>每个 Frame 的视觉描述要简洁（只写\"有什么\"，不写\"长什么样\"）</li><li>每个 Frame 的文案必须完整保留</li><li>特殊 Frame 标注特殊视觉要求（如成分屏的微观科技感）</li><li>全局风格只写一次，不重复</li></ul>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "小步迭代": "<h1>小步迭代</h1>\n<p>不要让 AI 一次生成承担所有判断。<strong>先生成基础图，再逐步编辑，每步只改一个变量。</strong></p>\n<h2>核心原则</h2>\n<ul><li>生成阶段：先出一个基础版本（低档/中档），确认方向后再细化</li><li>编辑阶段：每轮只改变一个变量（天气/文字/产品/颜色），不要一次改多个</li><li>分步优势：每一步改错都可回退，不会一次生成全错</li></ul>\n<h2>和最小代价修订的关系</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"Cut Priority Method\">Cut Priority Method</a> 中提到的\"最小代价修订\"理念在小步迭代中体现为：出问题只改责任最小的那层，不全量返工。</p>\n<h2>质量档位配合</h2>\n<ul><li>低档 → 批量草图探索</li><li>中档 → 确认方向</li><li>高档 → 最终高保真输出</li></ul>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "变量与不变量分离": "<h1>变量与不变量分离</h1>\n<p>AI 图像编辑任务的核心方法论：<strong>先锁死不变量，再开放一个变量</strong>。</p>\n<h2>核心原则</h2>\n<p>编辑提示词的写法逻辑：<strong>先锁死全部内容，再开放一个变量</strong>。锁得越死，模型执行得越准。</p>\n<ul><li><strong>不变量</strong> — 必须保持不变的内容：人脸、身形、姿态、Logo、产品标签、相机角度、背景几何、光影逻辑</li><li><strong>变量</strong> — 允许模型改变的内容：翻译文字、替换衣服、移除物品、改变天气、替换产品</li><li><strong>关键句</strong> — \"只改 X，不要改变任何其他元素\"（简单但重要）</li></ul>\n<h2>使用场景</h2>\n<ul><li>风格迁移：保留参考图的视觉语言，改变主体或场景</li><li>虚拟试穿：保留面部/身材/姿态/头发，只改服装</li><li>产品替换：保留空间、光照、阴影、环境，只替换单个产品</li><li>天气/光照改变：保留身份/几何/相机角度，只改降雪/湿度/阴影方向</li><li>移除物品：明确移除什么，明确不改变什么，越简洁越好</li></ul>\n<h2>和克制原则的关系</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a> 要求用静态、状态、克制的描述来约束 AI。变量与不变量分离是这一原则在<strong>编辑任务</strong>中的具体应用——锁死不变量就是用克制的方式固定画面中不能变的部分。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "编辑三要素": "<h1>编辑三要素</h1>\n<p>AI 图像编辑任务提示词的核心结构，源自 OpenAI 官方 28 个案例的共同模式。</p>\n<h2>三要素</h2>\n<table><thead><tr><th>要素</th><th>说明</th><th>示例</th></tr></thead><tbody><tr><td>**变量**</td><td>允许模型改变什么</td><td>翻译文字、替换衣服、移除花、改天气</td></tr><tr><td>**不变量**</td><td>必须保持不变什么</td><td>人脸/身形/姿态/Logo/相机角度/背景/光影</td></tr><tr><td>**关键句**</td><td>只改什么，不改其他</td><td>\"只替换椅子，不要改变任何其他元素\"</td></tr></tbody></table>\n<h2>编辑提示词写法</h2>\n<ul><li>生成模式：给完整信息（产物/受众/构图/材质/文字/尺寸/质量）</li><li>编辑模式：说清楚改什么 → 再说清不改什么 → 越简洁越好</li></ul>\n<p>编辑三要素是 <a href=\"#\" class=\"wiki-link\" data-name=\"变量与不变量分离\">变量与不变量分离</a> 的操作化——把抽象原则变成了可执行的三步检查。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "角色锚定": "<h1>角色锚定</h1>\n<p>在多图系列中保持角色一致性的方法。<strong>先锁定角色的外观/比例/服饰/气质，后续所有场景复用这个锚定描述。</strong></p>\n<h2>核心方法</h2>\n<ol><li><strong>第一步：锚定角色</strong> — 写详细的角色描述（年龄、服装、表情、气质、风格）</li><li><strong>关键句</strong> — \"不要重新设计我的角色\"比任何描述都有效</li><li><strong>后续复用</strong> — 新场景提示词中复用角色描述 + \"保持角色一致性\"</li></ol>\n<p>角色锚定就像给模型一个角色的设定参数，后续所有场景都可以回到这个锚点。</p>\n<h2>和一致性锚点原则的关系</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"一致性锚点原则\">一致性锚点原则</a> 是更通用的概念（同一系列图片必须有锚点保持风格一致）。角色锚定是它在<strong>角色一致性</strong>场景下的具体应用。</p>\n<h2>参考来源</h2>\n<p><a href=\"#\" class=\"wiki-link\" data-name=\"sources/OpenAI-GPT-4o-Image-Generation-28案例\">sources/OpenAI-GPT-4o-Image-Generation-28案例</a></p>", "AI 生图决策规则": "<h1>AI 生图决策规则</h1>\n<p>从 imageforge-skill 的 19 条 if-then 规则中提炼的 6 条可复用规则。这些规则不是教育原理，是遇到具体问题时的可执行决策指令。</p>\n<hr>\n<h2>R1: 冗余信号稀释有效信号</h2>\n<p><strong>遇到：</strong> prompt 中有多于一个同义词修饰同一主体（如 \"beautiful, gorgeous, stunning\"）</p>\n<p><strong>做：</strong> 只保留最具体的一个，删除其余</p>\n<p><strong>原因：</strong> 注意力是零和资源，同义词占 3 倍注意力但不增加 3 倍信息</p>\n<p><strong>与克制原则的关系：</strong> 克制原则要求用静态、克制的描述避免 AI 走极端；本规则进一步量化——同义词不克制会稀释有效信号。</p>\n<hr>\n<h2>R2: Generic 对抗三层</h2>\n<p><strong>遇到：</strong> 输出\"好看但不是我想要的\" / prompt 无特异性风格词</p>\n<p><strong>做：</strong> 按优先级依次尝试：</p>\n<ol><li>特异性描述（\"琥珀色瞳孔\"而非\"漂亮眼睛\"）</li><li>反常规组合（\"蒸汽朋克医疗室\"）</li><li>风格锚定（具体媒介/年代/流派/作品名）</li></ol>\n<p><strong>如果三层都试过仍 generic：</strong> 检查特异性描述是否超出了模型训练分布（太罕见→模型退回已知分布）</p>\n<hr>\n<h2>R3: 注意力前置</h2>\n<p><strong>遇到：</strong> prompt 中主体不在前 20 词</p>\n<p><strong>做：</strong> 将主体移到 prompt 开头</p>\n<p><strong>遇到：</strong> prompt 超过 50 词</p>\n<p><strong>做：</strong> 逐条删词验证：去掉它会变吗？不变→删</p>\n<p><strong>与琥珀光影矩阵的关系：</strong> 你的全局引擎第一句就是 <code>High-end commercial product photography of [变量]</code>，主体在开头，符合本规则。</p>\n<hr>\n<h2>R4: 省略 = 模型接管</h2>\n<p><strong>遇到：</strong> 5 个关键维度（主体/风格/构图/光影/配色）任一未描述</p>\n<p><strong>做：</strong> 显式补充</p>\n<p><strong>原因：</strong> 不描述≠不存在，而是由模型默认分布填充（正面均匀照明/居中构图/高饱和）</p>\n<p><strong>例外：</strong> Flux 中省略≈隐式控制（T5 不做概率补充），可利用信息不对称控图</p>\n<p><strong>与视觉描述优先原则的关系：</strong> 视觉描述优先原则说\"要用具体的视觉语言\"，本规则进一步解释——不写具体语言时模型会用默认值填充，那个默认值往往不是你想要的。</p>\n<hr>\n<h2>R5: 加法 ≠ 增强</h2>\n<p><strong>遇到：</strong> 想写 \"add more details\" 或 \"enhance quality\" 或 \"4K/8K\"</p>\n<p><strong>做：</strong> 不写笼统增强，写具体增强方向</p>\n<ul><li>❌ \"add more details\" → 编码为\"更多元素\"而非\"更好看\"</li><li>✅ \"sharper texture on bark, more visible grain\" → 编码为\"在这个方向细化\"</li></ul>\n<p><strong>与反向约束的关系：</strong> 反向约束说\"明确说不要什么比只说要什么更有效\"，本规则是它的反面——明确说要什么的具体方向，比笼统说要增强更有效。</p>\n<hr>\n<h2>R6: 批量一致性数值锚点</h2>\n<p><strong>遇到：</strong> 批量产出同风格素材</p>\n<p><strong>做：</strong> 控制关键数值：</p>\n<ul><li>图生图重绘幅度：0.45-0.65（太低不变，太高漂移）</li><li>种子偏移：±3 以内漂移可控，超过 5 开始明显偏移</li><li>主体占比：≥30%（低于此值主体变糊）</li><li>固定风格后缀：同一批所有素材最后 5-10 词完全相同</li></ul>\n<p><strong>与一致性锚点原则的关系：</strong> 一致性锚点原则说\"同一系列必须有锚点保持风格一致\"，本规则给出具体量化参数——固定风格后缀和重绘幅度范围。</p>\n<hr>\n<h2>来源</h2>\n<p>提炼自 imageforge-skill 的 19 条 if-then 规则。完整规则列表见 <code>Skills/W5-图片设计/imageforge-skill/references/rules.md</code>。</p>", "利益视觉化原则": "<h1>利益视觉化原则</h1>\n<p>配图的本质是<strong>利益视觉化</strong>——图片要展示的是消费者获得的利益，而不是获得利益的过程或方法。利益是主角，产品是配角，渠道/方法是装饰。</p>\n<hr>\n<h2>核心内容</h2>\n<h3>视觉权重层级</h3>\n<pre><code>主角（利益元素）：视觉焦点，最突出，占据画面中心或前景\n    ↓\n配角（产品）：支持性元素，清晰可见但不抢镜，位于中景或侧面\n    ↓\n装饰（场景/渠道）：背景或边缘，弱化处理，暗示而非强调</code></pre>\n<p>⚠️ 以上是\"视觉权重\"关系，而非精确的\"画面占比\"。AI 工具无法精确控制各元素占画面的百分比，应通过提示词中的描述详细程度和空间位置词来控制视觉权重。</p>\n<h3>如何在提示词中体现视觉权重</h3>\n<table><thead><tr><th>视觉权重</th><th>提示词策略</th><th>关键词</th><th>字数占比</th></tr></thead><tbody><tr><td>主角（利益元素）</td><td>详细描述 + 突出位置</td><td>huge, eye-catching, prominently displayed, in the foreground, as the focal point</td><td>40-50%</td></tr><tr><td>配角（产品）</td><td>简洁描述 + 支持位置</td><td>supporting element, in the mid-ground, positioned beside/behind, clearly visible but secondary</td><td>25-35%</td></tr><tr><td>装饰（场景/渠道）</td><td>极简描述 + 背景位置</td><td>subtle, in the background, softly blurred, as a hint, small icon/badge</td><td>5-15%</td></tr><tr><td>氛围（光线/色彩）</td><td>简短描述</td><td>soft lighting, warm tones, gradient background</td><td>5-10%</td></tr></tbody></table>\n<h3>示例对比</h3>\n<p>❌ 错误示例（使用精确比例，AI 无法执行）：</p>\n<pre><code>Visual: 20% OFF tag occupies 45% of the canvas, product bottle occupies 30%, \nbackground occupies 25%</code></pre>\n<p>✅ 正确示例（使用视觉权重描述）：</p>\n<pre><code>Visual: A huge, eye-catching 20% OFF discount tag in deep red color, prominently \ndisplayed in the foreground as the focal point. The product bottle from reference \nimage is positioned as a supporting element in the mid-ground, clearly visible but \nsecondary to the discount tag. Soft peach gradient background with subtle glow.</code></pre>\n<p>视觉权重体现在：</p>\n<ul><li>主角（折扣标签）：huge, eye-catching, prominently, foreground, focal point（5 个强调词）</li><li>配角（产品）：supporting element, mid-ground, secondary（3 个定位词）</li><li>装饰（背景）：soft, subtle（2 个弱化词）</li></ul>\n<hr>\n<h2>为什么重要</h2>\n<p>很多配图设计的误区是\"把产品放在中间，把利益点写成文字说明\"——结果是用户看到一张产品图，没看到\"我为什么要买\"。</p>\n<p><strong>利益视觉化解决的核心问题：</strong></p>\n<ol><li>用户的注意力应该先被\"利益\"吸引，再被\"产品\"说服</li><li>文字描述的篇幅直接决定 AI 的注意力分配</li><li>配图逻辑决定了骨架选择——选错了主角，骨架再好也没用</li></ol>\n<hr>\n<h2>应用场景</h2>\n<h3>电商详情页</h3>\n<ul><li>每个卖点配图前，先问：消费者的利益是什么？</li><li>把利益视觉化为主角，产品放在支持位置</li><li>参见 <a href=\"#\" class=\"wiki-link\" data-name=\"配图思维链\">配图思维链</a></li></ul>\n<h3>社媒推广图</h3>\n<ul><li>折扣/优惠信息应作为主角（巨大的折扣标签），产品作为配角</li><li>渠道提示（App 图标、二维码）作为装饰，弱化处理</li></ul>\n<h3>产品发布主图</h3>\n<ul><li>Hero Shot 骨架例外：产品本身就是利益</li><li>此时产品既是主角也是利益载体</li></ul>\n<hr>\n<h2>配图思维链</h2>\n<p>每个卖点配图前，必须按以下模板进行推理：</p>\n<pre><code>【配图思维链】\n1. 卖点分析：\n   - 原始卖点：[用户提供的文案]\n   - 核心利益：[消费者得到什么]\n   - 获取方式：[消费者需要做什么]\n\n2. 视觉角色分配：\n   - 主角（利益元素）：[具体视觉元素，如：巨大的 20% 折扣标签]\n   - 配角（产品）：[产品在画面中的角色]\n   - 装饰（渠道/方法）：[如何暗示获取方式，如：小型账户图标]\n\n3. 构图逻辑：\n   - 视觉焦点：[主角占据画面中心/前景]\n   - 空间层次：[主角在前景 > 配角在中景 > 装饰在背景]\n   - 引导路径：[视觉如何引导用户从利益 → 产品 → 方法]\n\n4. 检查清单：\n   ✓ 利益元素是否是视觉焦点？\n   ✓ 产品是否清晰可见但不抢镜？\n   ✓ 渠道提示是否弱化处理？\n   ✓ 画面是否直观易懂？</code></pre>\n<h3>配图具体化原则</h3>\n<ul><li>❌ 抽象概念（如\"注册\"、\"上传\"、\"独家\"）</li><li>✅ 具体利益（如\"20% OFF 折扣标签\"、\"金币和现金\"、\"FREE 标签\"）</li></ul>\n<h3>常见错误示例</h3>\n<table><thead><tr><th>卖点</th><th>❌ 错误配图逻辑</th><th>✅ 正确配图逻辑</th></tr></thead><tbody><tr><td>注册送 20% 折扣</td><td>主角：注册界面<br>配角：产品</td><td>主角：巨大的 20% 折扣标签<br>配角：产品<br>装饰：小型账户图标</td></tr><tr><td>上传收据得现金</td><td>主角：手机上传界面<br>配角：收据</td><td>主角：大量金币和现金<br>配角：产品<br>装饰：小型 WhatsApp 图标</td></tr><tr><td>官网独家赠品</td><td>主角：浏览器窗口<br>配角：产品</td><td>主角：产品 + 巨大的 FREE 标签<br>装饰：浏览器窗口作为背景</td></tr></tbody></table>\n<h3>何时使用思维链</h3>\n<ul><li><strong>生成时</strong>：Phase 3.3 为每个卖点设计配图方案时，在选择骨架之前生成</li><li><strong>展示给用户</strong>：Phase 5 方案确认时，作为\"每个卖点的配图方案\"的一部分</li><li><strong>内部检查</strong>：Phase 6.5 方向性校验、Phase 7.2 细节校验、Phase 8.4 配图逻辑修正</li></ul>\n<hr>\n<h2>与相关原则的关系</h2>\n<h3><a href=\"#\" class=\"wiki-link\" data-name=\"描述比重原则\">描述比重原则</a></h3>\n<p>两者是<strong>策略→操作</strong>的递进关系：利益视觉化原则确定\"谁是主角\"，描述比重原则确定\"主角的描述占多少字数\"。先定主角再定比重，顺序不能颠倒。</p>\n<h3><a href=\"#\" class=\"wiki-link\" data-name=\"参考图优先原则\">参考图优先原则</a></h3>\n<p>参考图控制产品形态，利益视觉化控制画面构图。当利益元素需要参考图时（如折扣标签样式），参考图优先原则同样适用。</p>\n<h3><a href=\"#\" class=\"wiki-link\" data-name=\"文案完整保留与信息层级原则\">文案完整保留与信息层级原则</a></h3>\n<p>文案内容不受利益视觉化原则约束——无论文案多长都必须完整保留。文案是独立规则，利益视觉化管的是视觉描述部分。</p>\n<hr>\n<h2>常见误区</h2>\n<h3>❌ 误区 1：产品当主角，利益点写成文字</h3>\n<ul><li>结果：用户看到的是产品图，不是\"为什么要买\"</li><li>正确做法：利益点视觉化为主角，产品作为支持元素</li></ul>\n<h3>❌ 误区 2：把\"过程\"当\"利益\"</h3>\n<ul><li>结果：画面变成操作教程，而不是利益展示</li><li>正确做法：展示结果（利益），不展示过程（方法）</li></ul>\n<h3>❌ 误区 3：所有骨架都用产品当主角</h3>\n<ul><li>结果：画面千篇一律，用户分不清哪个是哪个卖点</li><li>正确做法：根据思维链分配主角，不同卖点的主角可以不同</li></ul>\n<h3>❌ 误区 4：抽象概念直接当主角</h3>\n<ul><li>结果：AI 不知道\"注册\"、\"上传\"长什么样</li><li>正确做法：把抽象概念转化为具体视觉元素（折扣标签、金币、FREE 标签）</li></ul>\n<hr>\n<h2>相关链接</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"描述比重原则\">描述比重原则</a> — 确定主角后，用字数分配控制视觉权重</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"参考图优先原则\">参考图优先原则</a> — 产品形态用参考图控制，不要文字描述</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"文案完整保留与信息层级原则\">文案完整保留与信息层级原则</a> — 文案不受利益视觉化约束，必须完整保留</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"一致性锚点原则\">一致性锚点原则</a> — 同一系列的利益视觉化风格要保持一致</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI视觉语法体系\">AI视觉语法体系</a> — 提示词五板块中的视觉描述如何体现利益视觉化</li></ul>", "AI空镜设计": "<h1>AI 空镜设计</h1>\n<p>空镜不只是风景画面。烛火被风吹得摇晃（说明门窗被打开）、发簪掉在地上（暗示匆忙离开）、门外的脚步突然停住（说明听见了不该听的）——只要镜头暂时不正面表现主要人物，却仍在传递剧情信息，就可以承担空镜的作用。</p>\n<hr>\n<h2>三个核心作用</h2>\n<h3>1. 交代环境，让观众迅速进入故事</h3>\n<p>一场戏开始前，观众需要知道故事发生在什么时间、什么地点、什么氛围中。与其让角色说\"外面下雨了，已经很晚了\"，不如先给出一扇被雨水打湿的窗、昏暗的街灯和空荡的巷口。几秒钟的环境空镜，就能完成文字需要多句话才能完成的说明。</p>\n<h3>2. 控制节奏，给内容留下呼吸</h3>\n<p>当人物说完一句重要台词，如果马上切到下一句或下一个动作，情绪很容易被打断。此时加入一至两秒的空镜，让观众看到茶水已经凉透、钟摆仍在摆动，情绪就会自然延长。空镜的停顿不是拖慢，而是让重要内容被真正接住。</p>\n<h3>3. 代替人物，含蓄地表达情绪</h3>\n<p>人物悲伤时，不一定要一直哭；人物焦虑时，也不必反复皱眉。空镜可以用外部事物表现内部情绪。摇晃的灯影可以表现不安，迟迟没有被推开的门可以表现等待，快要燃尽的蜡烛可以表现时间流逝。相比直接展示表情，这种表达更克制，也更容易形成余味。</p>\n<hr>\n<h2>三类空镜提取方法</h2>\n<p>写空镜提示词之前，先从当前场景提取三个内容：环境、道具、情绪。这一步能够防止提示词脱离剧情，也是最容易掌握的空镜设计方法。</p>\n<h3>环境空镜</h3>\n<p>回答\"故事发生在哪里\"。例如，先给出雨夜古宅、湿漉漉的屋瓦和昏暗灯笼，使观众立即知道这是一个寒冷、安静的夜晚。环境空镜不只说明地点，也提前规定了整场戏的光线、色彩和气氛。</p>\n<h3>道具空镜</h3>\n<p>回答\"什么物件与人物有关\"。酒杯、红绸、绣鞋和烛台都可以与婚礼、等待产生联系。它们不是随意摆放的古风装饰，而是人物处境留下的痕迹。选择道具时，应优先寻找剧本中被使用、被提及，或者能够代表人物关系的物品。</p>\n<h3>情绪空镜</h3>\n<p>回答\"此刻希望观众感受到什么\"。与其只靠女子落泪表达失落，不如让雨水不断落下、烛火轻轻摇晃、红绸垂在空荡的房间里。情绪被分散到环境和物件中，画面因此更含蓄，也更有层次。</p>\n<blockquote>**判断方法**：如果删掉这个空镜，观众对地点、时间、关系或情绪的理解完全没有变化，那么它很可能只是装饰。</blockquote>\n<hr>\n<h2>空镜提示词五要素公式</h2>\n<p>一个可用的空镜提示词至少要写清楚五项信息，可以记为：</p>\n<blockquote>**拍摄主体 + 主体状态 + 动态细节 + 光线氛围 + 镜头运动**</blockquote>\n<h3>1. 拍摄主体：镜头究竟拍什么</h3>\n<p>主体越明确，画面越稳定。若表现男主负伤归来，不要只写\"归来的将军\"，而应选择\"剑柄上磨损的红色同心结\"；若表现两人诀别，可以选择\"昭宁放入男主掌心的金色发簪\"。一个镜头最好只保留一个主要主体。</p>\n<h3>2. 主体状态：说明它此刻是什么样子</h3>\n<p>主体状态包括景别、位置、材质和当前状况。例如\"佩剑剑柄微距特写，同心结被雪水浸湿\"、\"两人交叠的手部特写，金色发簪放在男主掌心\"。这些信息能够告诉 AI 主体在画面中的大小和叙事重点。</p>\n<h3>3. 动态细节：让静物也有故事</h3>\n<p>视频提示词不能只有名词，还要写出变化。同心结的线头随风摆动，昭宁放下发簪后男主手指缓慢合拢，这些动作很小，却能把两人的关系转化为可见细节。每个镜头选择一条主要变化即可。</p>\n<h3>4. 光线氛围：统一画面气质</h3>\n<p>与其堆叠\"电影感、高级感、大片感\"，不如写清光源。男主雪夜归来时，用冷灰晨光表现疲惫，让府门内的暖光落在昭宁红衣上。清楚的光线关系比堆叠氛围词更有效。</p>\n<h3>5. 镜头运动：决定观众如何观看</h3>\n<p>环境交代可以从城门远景缓慢推向归来的男主；道具信息适合固定近景；分别时则让镜头停在逐渐远去的马蹄印上。运镜应简单明确，避免同时推进、旋转、环绕和升降。</p>\n<h3>万能提示词模板</h3>\n<pre><code>[主体]微距/特写/近景，[状态描述]，\n[动态变化]，[光线/色彩描述]，\n[镜头运动]，[环境音/氛围音]。</code></pre>\n<hr>\n<h2>叙事改写示例</h2>\n<p><strong>普通写法</strong>：将军回来了，剑上系着红绳。</p>\n<p>→ 只说明了事件，没有把两人的关系转化为具体、可见的镜头。</p>\n<p><strong>改写后</strong>：</p>\n<pre><code>佩剑剑柄微距特写，同心结被雪水浸湿，\n红色线头随寒风轻微摆动，冷灰晨光落在磨损的剑鞘上，\n固定近景，脚步声在雪地中逐渐靠近。</code></pre>\n<p>这条提示词没有直接说男主想念昭宁，而是让磨损的同心结说明他一直将她的心意带在身边。血迹、雪水和府门暖光共同表现这次归来的艰难。真正有效的情绪不是形容词越多越好，而是细节变化与人物关系一致。</p>\n<hr>\n<h2>放置位置与推荐结构</h2>\n<h3>三个放置位置</h3>\n<ol><li><strong>一场戏开始之前</strong> — 先用环境空镜交代时间和地点，再进入人物镜头。比如先拍宫门外的薄霜、战马和军旗，再切到人物告别，观众会立即明白即将出征。</li><li><strong>重要台词或动作之后</strong> — 关键对白之后可以切到道具特写，让情绪停留片刻，避免立刻切换到另一段表演。</li><li><strong>两场戏转换之间</strong> — 用相似的形状和连续的声音跨越时间和地点。男主上马离开后，从宫门石阶上的马蹄印接到边关泥地中的马蹄印，同时保留目送的情绪。</li></ol>\n<h3>推荐结构</h3>\n<blockquote>环境空镜交代地点 → 人物建立处境 → 关系道具补充信息 → 回到人物反应 → 情绪空镜完成落点</blockquote>\n<p>空镜需要围绕人物的关系变化，而不是临时加入无关的风景物件。</p>\n<hr>\n<h2>常见问题</h2>\n<h3>问题一：空镜与主角无关</h3>\n<p>不要加入单纯好看的云海宫殿。男主负伤归来时，拍他剑柄上昭宁亲手系的同心结，更能说明两人的关系。</p>\n<h3>问题二：一个镜头安排太多动作</h3>\n<p>三秒内只保留一个主要动作。放下发簪、握住发簪，不同时安排拥抱、转身、上马和关门。</p>\n<h3>问题三：对白与画面没有配合</h3>\n<p>昭宁说\"这不是父皇的印\"时，画面应切到缺角的朱砂印记，而不是加入无关的花草空镜。</p>\n<h3>问题四：空镜过多，人物关系被削弱</h3>\n<p>两人诀别时保留发簪和马蹄印即可。若继续加入落花、残月、孤雁和流水，反而会冲淡两人的表演。</p>\n<h3>问题五：人物或场景前后不一致</h3>\n<p>每个含人物的镜头都上传同一组参考图，固定角色外观；每组分镜同时参考同一张场景图，固定空间位置。场景可以切换，但同一场戏不能重新设计空间。</p>\n<hr>\n<h2>与相关概念的关系</h2>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI镜头语言进阶\">AI镜头语言进阶</a> — 镜头语言的整体体系，空镜是其中的一种镜头类型</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计\">AI视频动作设计</a> — 动作提示词与空镜配合使用，形成\"动作+停顿\"的节奏</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI导演创作思维\">AI导演创作思维</a> — 空镜放置位置与节奏控制的导演思维</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Show Don't Tell\">Show Don't Tell</a> — 空镜是用画面\"展示\"而非\"讲述\"的典型实践</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a> — 每个空镜也应有场景价值变化，没有变化就是废话</li></ul>", "AI Camera Movements": "<h1>AI Camera Movements</h1>\n<p>AI 视频生成中常用的运镜手法提示词。讲故事并不需要大量运镜，许多优秀电影仅用硬切，也能达到很好效果。</p>\n<hr>\n<h2>基础运镜</h2>\n<h3>推镜 (Push In)</h3>\n<p>镜头向主体前进，营造靠近、发现或压力的视觉感受。</p>\n<h3>拉镜 (Pull Out)</h3>\n<p>镜头从远景拉至主体特写，用于强调细节或突出情绪。</p>\n<h3>摇镜 (Pan)</h3>\n<p>摄影机左右或上下转动，用于展示环境或跟随运动。</p>\n<h3>移镜 (Dolly)</h3>\n<p>机位横向或纵向移动，常用于跟随主体或在空间穿行。</p>\n<h3>横移 (Truck)</h3>\n<p>镜头平行于主体侧移动，展示场景或制造动态感。</p>\n<h3>升降镜 (Pedestal)</h3>\n<p>摄影机垂直运动，创造从地面到高处的视角转换。</p>\n<h3>环绕镜 (Orbit)</h3>\n<p>围绕主体旋转拍摄，全方位展示其形态与状态。</p>\n<h3>变焦推拉 (Zoom)</h3>\n<p>通过焦距变化改变主体大小，快速强调画面焦点。</p>\n<hr>\n<h2>动态与情绪运镜</h2>\n<h3>手持抖动 (Handheld)</h3>\n<p>人为制造晃动感，常用于模拟纪实或紧张氛围。</p>\n<h3>甩镜 (Whip Pan)</h3>\n<p>镜头快速从一个目标摇到另一个，制造转场冲击力。</p>\n<h3>主观镜头 (POV)</h3>\n<p>模拟角色视点，让观众代入视角体验事件。</p>\n<h3>无人机航拍 (Aerial Drone)</h3>\n<p>从空中俯瞰，展现宏大场景或独特地貌风貌。</p>\n<h3>光学变焦 (Optical Zoom)</h3>\n<p>不移动机位，通过镜头焦距改变放大或缩小画面。</p>\n<h3>前跟镜 (Follow Front)</h3>\n<p>镜头跟随运动主体前方拍摄，强调其前进方向与目的。</p>\n<h3>侧跟镜 (Follow Side)</h3>\n<p>镜头与运动主体平行侧移，展现其行进姿态。</p>\n<h3>过肩镜 (Over the Shoulder)</h3>\n<p>越过角色肩膀拍摄对话对象，营造对话现场感。</p>\n<h3>荷兰角 (Dutch Angle)</h3>\n<p>倾斜镜头制造失衡感，常用于表达不安或紧张情绪。</p>\n<hr>\n<h2>角度与视角</h2>\n<h3>低角度 (Low Angle)</h3>\n<p>从下往上仰拍主体，使其显得高大、威严或具压迫感。</p>\n<h3>高角度 (High Angle)</h3>\n<p>从上往下俯拍主体，使其显得渺小、孤独或被审视。</p>\n<h3>鱼眼视角 (Fisheye)</h3>\n<p>使用广角镜头产生夸张畸变，营造奇幻或扭曲感。</p>\n<h3>旋转镜 (Spin)</h3>\n<p>镜头自身旋转，制造眩晕感或视角转换的戏剧效果。</p>\n<h3>鸟瞰顶拍 (Bird's Eye View)</h3>\n<p>从正上方垂直向下拍摄，获得平面化或几何化构图。</p>\n<hr>\n<h2>进阶运镜技巧</h2>\n<h3>遮挡渐显 (Reveal)</h3>\n<p>利用前景物体部分遮挡画面，增加层次感与神秘感。</p>\n<h3>穿越镜头 (Fly Through)</h3>\n<p>镜头穿过缝隙或物体，创造进入新空间的过渡感。</p>\n<h3>拉焦切换 (Rack Focus)</h3>\n<p>改变焦点，使画面前后景依次清晰，引导注意力。</p>\n<h3>子弹时间 (Bullet Time)</h3>\n<p>多机位环绕慢拍摄，冻结时间展示动作细节。</p>\n<h3>贴地穿越 (Low Glide)</h3>\n<p>镜头极低角度掠过地面，营造高速或危机临场感。</p>\n<h3>螺旋上升 (Spiral Up)</h3>\n<p>镜头围绕主体旋转并上升，常用于英雄出场或宏大揭示。</p>\n<h3>环绕下降 (Spiral Down)</h3>\n<p>镜头围绕主体旋转并下降，常用于悬念营造或场景结束。</p>\n<h3>低视角街 (Low Street Level)</h3>\n<p>在较低角度拍摄街道或人群，模拟行人或近距离观察视角。</p>\n<h3>跟随推进 (Follow Push)</h3>\n<p>边跟随运动主体边向前推进，强化追逐感或运动的紧张感。</p>\n<h3>低弧绕行 (Low Arc Orbit)</h3>\n<p>以低弧度弧形轨迹环绕主体，增加动感与视觉新鲜感。</p>\n<hr>\n<hr>\n<h2>英文提示词速查（Seedance 词汇表）</h2>\n<blockquote>来源：第三方整理的 Seedance 2.5 提示词指南（非官方）。写提示词时直接复制这些英文词到 prompt 中。</blockquote>\n<h3>基础运镜</h3>\n<table><thead><tr><th>你想要的效果</th><th>提示词里写</th></tr></thead><tbody><tr><td>镜头靠近主体</td><td>`slow push in` / `dolly in`</td></tr><tr><td>镜头拉远</td><td>`pull back` / `dolly out`</td></tr><tr><td>横向滑动</td><td>`tracking shot left/right`</td></tr><tr><td>镜头升高</td><td>`crane up` / `boom up`</td></tr><tr><td>镜头降低</td><td>`crane down` / `boom down`</td></tr><tr><td>跟着主体走</td><td>`steadicam follow shot`</td></tr><tr><td>围绕主体旋转</td><td>`orbit shot` / `360 arc`</td></tr><tr><td>快速甩过去</td><td>`whip pan left/right`</td></tr><tr><td>固定不动</td><td>`static shot` / `locked off camera`</td></tr></tbody></table>\n<h3>角度</h3>\n<table><thead><tr><th>你想要的效果</th><th>提示词里写</th></tr></thead><tbody><tr><td>俯拍</td><td>`bird's eye view` / `top-down`</td></tr><tr><td>低角度</td><td>`worm's eye view` / `low angle`</td></tr><tr><td>手拿晃动感</td><td>`handheld camera`</td></tr><tr><td>平滑滑行</td><td>`gimbal shot`</td></tr><tr><td>焦点切换</td><td>`rack focus to subject`</td></tr></tbody></table>\n<h3>进阶运镜</h3>\n<table><thead><tr><th>你想要的效果</th><th>提示词里写</th></tr></thead><tbody><tr><td>无人机航拍下降</td><td>`aerial drone descending`</td></tr><tr><td>FPV 穿越</td><td>`FPV drone fly-through`</td></tr><tr><td>子弹时间</td><td>`matrix bullet time`</td></tr><tr><td>变焦推拉（眩晕效果）</td><td>`dolly zoom` / `vertigo effect`</td></tr><tr><td>快速变焦</td><td>`crash zoom`</td></tr><tr><td>缓慢变焦</td><td>`slow zoom in/out`</td></tr><tr><td>甩镜头模糊</td><td>`panning blur`</td></tr><tr><td>微抖动</td><td>`micro-jitter`</td></tr></tbody></table>\n<h2>灯光词汇表</h2>\n<blockquote>**一个灯光关键词 > 十个形容词。** 如果生成的画面看起来\"平\"，先换灯光词，不要改主体描述。</blockquote>\n<table><thead><tr><th>你想要的感觉</th><th>提示词里写</th></tr></thead><tbody><tr><td>暖色电影感</td><td>`golden hour cinematography`</td></tr><tr><td>黄昏/黎明</td><td>`magic hour` / `blue hour`</td></tr><tr><td>夜景暖光</td><td>`tungsten practical lighting`</td></tr><tr><td>戏剧感/神秘</td><td>`chiaroscuro lighting`</td></tr><tr><td>影棚干净</td><td>`soft box three-point lighting`</td></tr><tr><td>赛博朋克</td><td>`neon-drenched night scene`</td></tr><tr><td>纪录片自然光</td><td>`natural available light`</td></tr><tr><td>恐怖片底光</td><td>`harsh under-lighting`</td></tr><tr><td>美妆/时尚</td><td>`butterfly lighting`</td></tr><tr><td>阴天户外</td><td>`diffused cloudy daylight`</td></tr><tr><td>逆光轮廓</td><td>`rim lighting` / `backlighting`</td></tr><tr><td>体积光（上帝光）</td><td>`volumetric lighting` / `god rays`</td></tr><tr><td>高调/明亮</td><td>`high-key lighting`</td></tr><tr><td>低调/暗调</td><td>`low-key lighting`</td></tr><tr><td>电影青橙调</td><td>`cinematic teal and orange`</td></tr><tr><td>黑白 noir</td><td>`noir high contrast black and white`</td></tr><tr><td>老胶片</td><td>`nostalgic vintage film`</td></tr><tr><td>发光梦幻</td><td>`ethereal glowing light`</td></tr></tbody></table>\n<hr>\n<h2>Connections</h2>\n<ul><li>运镜描述属于<a href=\"#\" class=\"wiki-link\" data-name=\"视觉描述优先原则\">视觉描述优先原则</a>的一部分，要用具体的视觉语言，而不是抽象形容词</li><li>选择运镜时遵循<a href=\"#\" class=\"wiki-link\" data-name=\"描述比重原则\">描述比重原则</a>，重要的运镜多描述，次要的少描述</li><li>灯光词的使用印证了<a href=\"#\" class=\"wiki-link\" data-name=\"摄影语言锚定质感\">摄影语言锚定质感</a>——用具体的摄影术语替代抽象形容词</li><li>AI 生成视频时，运镜提示词要克制，不要同时用太多运镜手法</li></ul>", "Pacing and Rhythm": "<h1>Pacing and Rhythm — 节奏控制</h1>\n<p>节奏是 AI 视频中最容易被忽略的维度。很多人关注\"画面好不好看\"，但忽略了\"画面停留多久\"——而停留时间决定了观众的情绪强度。</p>\n<hr>\n<h2>理解节奏的本质</h2>\n<p>节奏不是剪辑速度，而是<strong>信息释放的密度和时机</strong>。</p>\n<ul><li>快节奏 = 单位时间内信息量大，观众来不及消化，产生紧张/兴奋/压迫感</li><li>慢节奏 = 单位时间内信息量小，观众有时间感受，产生沉思/放松/压抑感</li></ul>\n<p>AI 视频的问题在于：<strong>AI 默认走\"匀速\"</strong>——每个镜头停留时间差不多，没有快慢变化。匀速 = 没有节奏。</p>\n<hr>\n<h2>三个控制维度</h2>\n<h3>1. 镜头时长控制</h3>\n<p>最直接的节奏控制手段。通过提示词规定每个镜头的停留时间。</p>\n<p><strong>快节奏</strong> — 每个镜头 1-2 秒，快速切换：</p>\n<pre><code>Rapid cuts, quick shot changes every 1-2 seconds,\nfast-paced editing, urgent rhythm.</code></pre>\n<p><strong>慢节奏</strong> — 每个镜头 3-5 秒以上，缓慢过渡：</p>\n<pre><code>Slow pacing, each shot lingers for 3-5 seconds,\ngentle transitions, deliberate rhythm.</code></pre>\n<p><strong>变速</strong> — 从慢到快或从快到慢：</p>\n<pre><code>The pacing starts slow, each shot held for 3 seconds,\nthen accelerates, cuts becoming quicker and more urgent.</code></pre>\n<h3>2. 动作节奏控制</h3>\n<p>通过动作本身的快慢来控制节奏。参考 <a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计#四层动态\">AI视频动作设计#四层动态</a>。</p>\n<p><strong>核心</strong>：动作节奏 = 前摇（准备）→ 动作（爆发）→ 后摇（余韵）</p>\n<ul><li><strong>前摇长 + 动作快</strong> = 紧张感（拔刀前先停顿，然后瞬间拔出）</li><li><strong>前摇短 + 动作慢</strong> = 无力感（想抬手但抬不起来）</li><li><strong>前摇 + 动作 + 后摇 完整</strong> = 真实感（每个动作都有准备和收尾）</li></ul>\n<p><strong>提示词示例</strong>：</p>\n<pre><code>The character pauses, takes a breath, then suddenly bursts into action.\nThe movement is explosive but brief. Afterwards, a moment of stillness.</code></pre>\n<h3>3. 情绪节奏控制</h3>\n<p>节奏服务于情绪。不同情绪需要不同的节奏。参考 <a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a>。</p>\n<table><thead><tr><th>情绪</th><th>节奏策略</th></tr></thead><tbody><tr><td>紧张/悬疑</td><td>先慢后快，逐渐加速，最后一刻爆发</td></tr><tr><td>悲伤/沉思</td><td>全程慢节奏，镜头停留时间长，让观众感受</td></tr><tr><td>兴奋/欢乐</td><td>快节奏，轻快的镜头切换</td></tr><tr><td>压抑/窒息</td><td>慢节奏 + 固定机位，让观众感到被困住</td></tr><tr><td>梦境/诡异</td><td>节奏不规律，有时快有时慢，让观众不安</td></tr></tbody></table>\n<hr>\n<h2>最短路径与节奏的关系</h2>\n<blockquote>参考 [[AI首尾帧控制#理解首尾帧的本质]]</blockquote>\n<p>首尾帧的最短路径机制本质上就是节奏问题。AI 默认走\"匀速最短路径\"——从 A 到 B 一步到位，没有节奏变化。</p>\n<p><strong>解法</strong>：在提示词中明确写出节奏变化。不是只写\"从 A 到 B\"，而是写\"先慢→然后加速→最后减速到达\"。</p>\n<pre><code>The transition starts slowly, then gradually accelerates,\nbefore slowing down again at the end.\nThe rhythm feels deliberate, controlled.</code></pre>\n<hr>\n<h2>节奏检查清单</h2>\n<p>写完提示词后，按这个清单检查节奏：</p>\n<ul><li>[ ] 每个镜头的停留时间有没有变化？还是全部一样长？</li><li>[ ] 快节奏的地方是否真的写了\"快\"？还是只写了动作？</li><li>[ ] 慢节奏的地方有没有给观众留出感受的时间？</li><li>[ ] 情绪转折的地方，节奏有没有跟着变？</li><li>[ ] 有没有用空镜来控制呼吸感？（参考 <a href=\"#\" class=\"wiki-link\" data-name=\"AI空镜设计\">AI空镜设计</a>）</li><li>[ ] 首尾帧过渡有没有写节奏变化？</li></ul>", "AI首尾帧控制": "<h1>AI 首尾帧控制</h1>\n<blockquote>来源：[[sources/何止维AI创作系列合辑]] — [[何止维]]《首尾帧不好用了吗？分享一个用它做的电影感梦境转场》</blockquote>\n<hr>\n<h2>理解首尾帧的本质</h2>\n<p>首尾帧的机制是：你给我 A 点和 B 点，我帮你走完从 A 到 B 的路，而且我用<strong>最短路径</strong>走。</p>\n<p>这不是 bug，这是它的设计原则。所以你的问题不是\"AI 做不好首尾帧\"，而是你给了 A 和 B，但你没告诉 AI 中间要走哪条路。AI 选了最短的那条（叠化瞬移），你就觉得它做错了。</p>\n<hr>\n<h2>四步思维模型</h2>\n<p>遇到首尾帧场景时，按这个顺序思考：</p>\n<h3>第一步：识别最短路径陷阱</h3>\n<p>问自己：如果 AI 用最懒的方式从 A 到 B，它会怎么做？</p>\n<ul><li>起床上班 → 直接起床→上班（跳过洗漱早餐交通）</li><li>卧室到梦境 → 直接叠化瞬移（跳过渐变过程）</li></ul>\n<p>想清楚 AI 会怎么偷懒，你才知道要拦什么。</p>\n<h3>第二步：决定拦什么</h3>\n<p>不需要拦住所有东西。只拦<strong>破坏你想要的感觉</strong>的那部分。</p>\n<ul><li>梦境转场要的是\"诡异渐变感\" → 所以拦的是\"干净利落的叠化\"</li><li>空间切换要的是\"丝滑过渡感\" → 所以拦的是\"生硬的跳切\"</li></ul>\n<p>不是写得越多越好，是<strong>只拦关键的那一个</strong>。</p>\n<h3>第三步：给一条替代路径</h3>\n<p>拦住了 AI 的捷径之后，必须给一条新路让它走。</p>\n<ul><li>拦了\"叠化瞬移\" → 给\"空间逐渐溶解、环境慢慢重塑\"</li><li>拦了\"镜头乱转\" → 给\"镜头旋转角度锁死\"</li></ul>\n<p>不给替代路径，AI 就卡住了——它不知道该怎么走，只能乱走。</p>\n<h3>第四步：加气质词收尾</h3>\n<p>到这一步，路径已经清晰了。但这条路是\"干巴巴的过渡\"还是\"有灵魂的转场\"，取决于你加的那个气质词。</p>\n<ul><li>梦境转场 → 加\"失重\"</li><li>时空穿越 → 加\"扭曲\"</li><li>记忆闪回 → 加\"模糊溶解\"</li></ul>\n<p>这个气质词就是整段过渡的情绪锚点。</p>\n<h3>第五步：用感官细节填充路径</h3>\n<p>替代路径是一条\"路线图\"，感官细节是这条路线上观众能感知到的具体信号。不是堆地名地标，而是问自己：</p>\n<ul><li>这个过程中能看到什么变化？（颜色、形状、光影）</li><li>这个过程中能感觉到什么？（温度、速度、重量）</li><li>这个过程中有什么微小的伴随现象？（水珠、碎屑、烟雾、反光）</li></ul>\n<p><strong>规则</strong>：每一段路径变化，至少配1个感官细节。不是写\"花开了\"，而是写\"花瓣边缘先卷起，然后一片一片向外翻\"。</p>\n<table><thead><tr><th>场景</th><th>路线图</th><th>感官细节</th></tr></thead><tbody><tr><td>花开</td><td>花苞→绽放</td><td>花瓣翻卷的次序、花蕊露出的过程、水珠在花瓣上的颤动</td></tr><tr><td>泡面</td><td>干面→热面</td><td>水面上升的速度、蒸汽的形状、脱水蔬菜重新舒展</td></tr><tr><td>城市穿梭</td><td>巴黎→纽约</td><td>建筑风格的切换、光线的变化、街景元素的交替</td></tr><tr><td>白纸→精装书</td><td>纸→书</td><td>纸张折叠的次序、封面包裹的过程、烫金浮现的瞬间</td></tr></tbody></table>\n<p><strong>核心</strong>：不说\"花开了\"，说\"花瓣一片一片向外翻卷\"。不说\"到了纽约\"，说\"建筑从古典石雕变成了玻璃幕墙\"。</p>\n<hr>\n<h2>示例一：从白天到夜晚的时光流逝</h2>\n<p>套用五步思维模型：</p>\n<ol><li><strong>最短路径陷阱</strong>：AI 直接画面一黑→变夜晚（跳切）</li><li><strong>拦什么</strong>：拦跳切，要的是渐进的时间感</li><li><strong>替代路径</strong>：天空变色 → 光影拉长 → 灯光亮起</li><li><strong>气质词</strong>：静谧、流逝感</li><li><strong>感官细节</strong>：天空颜色渐变过程（蓝→橙→紫→黑）、影子在地面缓慢移动的轨迹、路灯一盏接一盏亮起的次序</li></ol>\n<p><strong>完整提示词</strong>：</p>\n<pre><code>Camera rotation locked, fixed angle throughout.\nThe sky gradually shifts from bright blue to warm orange,\nstreaks of purple appearing as the sun dips lower.\nShadows creep slowly across the ground, growing longer,\nthe angle of light becoming more horizontal.\nOne by one, street lights begin to glow,\nfirst flickering, then steady.\nA window light turns on in the distance.\nThe entire transition feels gentle, quiet,\nlike time itself is flowing softly.</code></pre>\n<hr>\n<h2>示例二：护肤品从埃菲尔铁塔飞到自由女神像</h2>\n<p>首帧：护肤品在埃菲尔铁塔旁</p>\n<p>尾帧：护肤品停在自由女神像火炬旁</p>\n<p>套用五步思维模型：</p>\n<ol><li><strong>最短路径陷阱</strong>：AI 让护肤品直接瞬移到自由女神像旁边</li><li><strong>拦什么</strong>：拦瞬移，要的是丝滑的跨国飞行感</li><li><strong>替代路径</strong>：从埃菲尔铁塔出发 → 低空穿过巴黎 → 进入纽约市区 → 抵达自由女神像</li><li><strong>气质词</strong>：轻盈、灵动</li><li><strong>感官细节</strong>：建筑风格从古典石雕变成玻璃幕墙、光线从巴黎的暖黄变成纽约的冷白、街道的宽窄变化、掠过塞纳河水面时的倒影</li></ol>\n<p><strong>完整提示词</strong>：</p>\n<pre><code>首帧：护肤品在埃菲尔铁塔旁\n尾帧：护肤品停在自由女神像火炬旁\n中间过程：\nCamera rotation locked, smooth continuous movement.\nThe skincare product lifts from beside the Eiffel Tower,\nthen descends to street level. It glides past Haussmann buildings,\ntheir cream stone facades warm in the afternoon light.\nThe product skims over the Seine, a brief reflection rippling below.\nAs it crosses the ocean, the architecture shifts—\nclassic stone雕花 gives way to glass and steel,\nyellow taxis replace bicyclettes,\nthe light turns cooler, more metallic.\nThe product weaves through Manhattan's canyon-like streets,\nthen rises gently toward the Statue of Liberty,\nlanding softly beside the torch.\nThe transition feels light, agile, exploratory.</code></pre>\n<hr>\n<h2>什么时候用首尾帧</h2>\n<p>首尾帧最适合<strong>非常规大运镜和大场景变换</strong>——梦境转场、空间切换、场景叠化、时光流逝。普通镜头（人物说话、日常动作）不需要用首尾帧，用了反而大材小用。</p>\n<hr>\n<h2>附录：这个页面在完整流程中的位置</h2>\n<p>本页面的\"五步思维模型\"只是整个 AI 视频创作流程中的<strong>一个环节</strong>——剧本扩充。它前面有故事来源，后面有提示词执行。</p>\n<h3>上游（故事从哪来）</h3>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI导演创作思维\">AI导演创作思维</a> — \"核心行动驱动\"：先确定一个核心行动（比如一个人试图逃离），所有镜头围绕它展开；\"调度优先\"：先确定空间规则再拆镜头；\"画面结构拆解法\"：拿到参考视频时拆解构图/主体/光影/环境四维度</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a> — \"场景价值转换\"：每个场景的情绪要有正负变化（紧张→更紧张，或紧张→放松），没变化就是废话</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Causal Chain Audit\">Causal Chain Audit</a> — \"因果链审计\"：检查每个场景是不是由前一个导致的（不只是时间顺序），否则就是无效镜头</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"Show Don't Tell\">Show Don't Tell</a> — \"展示而非讲述\"：用动作和物件展示信息，不要用描述性语言直接说</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI创意方法论\">AI创意方法论</a> — \"打破物理定律、让时间失控、把镜头变成角色\"：当需要非现实风格（如夸张/梦境/幻想）时参考</li></ul>\n<h3>本页面（剧本扩充）</h3>\n<p>拿到简短故事后，按四步走：</p>\n<ol><li><strong>拆场景分镜</strong> — 把一句话故事拆成 3-5 个场景，每个场景标出情绪</li><li><strong>每场走五步法</strong> — 识别陷阱→拦什么→替代路径→气质词→感官细节</li><li><strong>叠加镜头+光影</strong> — 参考下方维度</li><li><strong>写完整提示词</strong> — 每个场景一段</li></ol>\n<h3>下游（扩充完后去哪）</h3>\n<p>剧本扩充完成后，还要处理以下环节：</p>\n<p><strong>分镜与镜头设计</strong></p>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI镜头语言进阶\">AI镜头语言进阶</a> — 反向写提示词（镜头包裹动作）、以摄像机为参照系、低角度原理、空镜三作用、情绪蒙太奇</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a> — 运镜词库：推拉摇移跟绕甩、手持/航拍/过肩/荷兰角</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI空镜设计\">AI空镜设计</a> — 三类空镜提取方法、五要素公式、放置策略</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"视觉平衡与动线构图\">视觉平衡与动线构图</a> — 前景遮挡、视觉动线、构图术语</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"物理模拟控制流（Cinema Studio）\">物理模拟控制流（Cinema Studio）</a> — 真实摄影机模拟</li></ul>\n<p><strong>动作与人物调度</strong></p>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计\">AI视频动作设计</a> — 单主体动作原则、四层动态（身体/跟随/环境/声音）、对手戏四镜头调度结构</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI角色资产搭建\">AI角色资产搭建</a> — 微表情控制、活人感、多人动作调度</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI长视频丝滑衔接\">AI长视频丝滑衔接</a> — 多段 15 秒视频拼接方法</li></ul>\n<p><strong>光影与氛围</strong></p>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI打光五法\">AI打光五法</a> — 侧逆光/轮廓光/侧光/硬光/低位光</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI氛围与色彩控制\">AI氛围与色彩控制</a> — 氛围三要素（明暗/冷暖/虚实）、减法审美</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI影调控制\">AI影调控制</a> — 低长调/高长调</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI光源提示词模板库\">AI光源提示词模板库</a> — 20 种光源模板</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI室内光
