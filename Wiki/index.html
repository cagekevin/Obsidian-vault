控制\">AI室内光控制</a> — 光源锚定、衰减路径、漫反射</li></ul>\n<p><strong>声音设计</strong></p>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI角色声音控制\">AI角色声音控制</a> — 声音公式、语气控制、标点符号控制语速</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"sources/Seedance 2.0 标点控声\">sources/Seedance 2.0 标点控声</a> — 省略号=声断气连、拆句=分镜节奏</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计#声音连接\">AI视频动作设计#声音连接</a> — 关键动作配细节音效（脚步声、衣料摩擦、环境声变化）</li></ul>\n<p><strong>提示词组织与修正</strong></p>\n<ul><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI视觉语法体系\">AI视觉语法体系</a> — 提示词五板块结构：情绪/主体/光线/镜头/细节</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI 生图决策规则\">AI 生图决策规则</a> — 注意力前置、冗余信号稀释、省略接管</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI提示词修正思路\">AI提示词修正思路</a> — 如果 AI 生成跟预期不一样，三步修正</li><li><a href=\"#\" class=\"wiki-link\" data-name=\"AI底层机制与高级控制\">AI底层机制与高级控制</a> — 知识诅咒、权重竞争、误解机制</li></ul>\n<blockquote>不是每次都要走完所有下游环节。根据场景需要选 2-3 个叠加即可。比如紧张追逐戏优先走镜头+动作+声音，氛围转场优先走光影+空镜。</blockquote>", "AI分镜设计": "<h1>AI 分镜设计</h1>\n<p>分镜是将剧本从文字转化为影像的视觉化预演。在 AI 视频创作中，分镜设计决定了镜头怎么切、节奏怎么走、情绪怎么落。</p>\n<hr>\n<h2>主镜设计：先决定拍什么</h2>\n<blockquote>来源：[[sources/老白的分镜 万能分镜思路]]</blockquote>\n<p>分镜的第一步不是\"怎么切镜头\"，而是<strong>\"哪些镜头该存在\"</strong>。</p>\n<p>很多人设计分镜时每个步骤都拍一个镜头，看起来很完整，但观众看完没印象。因为<strong>每个镜头都在争夺观众的注意力</strong>——给了不重要东西一个镜头，观众就分了一部分注意力给它。分给不重要东西的多了，分给重要东西的就少了。</p>\n<p><strong>解法</strong>：先定主镜，再围绕主镜加其他镜头。</p>\n<h3>什么是主镜</h3>\n<p>主镜 = 你想让观众<strong>记住</strong>的核心画面。一个故事通常只有 3-4 个核心信息点，每个点用一个画面定下来。</p>\n<p><strong>标准</strong>：如果把所有辅助镜头都删掉，只保留主镜，观众还能看懂这个故事。主镜就是故事的最低完整版本。</p>\n<h3>主镜设计步骤</h3>\n<ol><li><strong>列出核心信息点</strong> — 这个故事有哪些观众必须知道的信息？</li><li><strong>每个点定一个画面</strong> — 这个信息用哪个画面呈现最有力？</li><li><strong>检查必要性</strong> — 删掉这个画面，故事还完整吗？不完整就留着，完整就删掉</li><li><strong>为对比预留角度</strong> — 如果后文要用对比手法（有 vs 没有），主镜的角度要为对比留好伏笔</li></ol>\n<h3>案例：招财猫故事的主镜</h3>\n<p>核心信息点只有 4 个：</p>\n<ol><li>门口有招财猫 → 主镜：门口全景，招财猫在显眼位置</li><li>屋里也有招财猫 → 主镜：屋内中景，招财猫和角色同框</li><li>门口的招财猫不见了 → 主镜：和主镜1同一角度，但招财猫消失</li><li>屋里的招财猫也不见了 → 主镜：和主镜2同一角度，但招财猫消失</li></ol>\n<p>主镜1和3做对比，主镜2和4做对比——所以主镜1和2的角度要提前为对比留好。</p>\n<h3>主镜 vs 辅助镜</h3>\n<table><thead><tr><th>主镜</th><th>辅助镜</th></tr></thead><tbody><tr><td>观众必须记住的信息</td><td>帮助主镜更好地呈现的信息</td></tr><tr><td>删掉故事就不完整</td><td>删掉故事仍然完整</td></tr><tr><td>多拍、反复拍</td><td>少拍、快速过</td></tr><tr><td>定好角度后不变</td><td>围绕主镜灵活调整</td></tr></tbody></table>\n<h3>核心判断：这个镜头让观众得到了什么？</h3>\n<p>分镜设计时，每决定一个镜头就问自己两个问题：</p>\n<blockquote>1. **观众看完这段画面，脑子里多了什么信息？**（信息价值）<br>2. **观众看完这段画面，心里感受到了什么？**（情绪价值）</blockquote>\n<p><strong>两个标准，决定镜头的去留</strong>：</p>\n<table><thead><tr><th>信息价值</th><th>情绪价值</th><th>判断</th></tr></thead><tbody><tr><td>高</td><td>高</td><td>**必留**——核心主镜，反复强调</td></tr><tr><td>低</td><td>高</td><td>**考虑留**——情绪积累镜头，不能砍太多</td></tr><tr><td>高</td><td>低</td><td>**精简后留**——功能性镜头，能合并就合并</td></tr><tr><td>低</td><td>低</td><td>**砍掉**——废镜，观众看完什么都没得到</td></tr></tbody></table>\n<p><strong>注意</strong>：不是所有镜头都要有高信息量。有些镜头的作用是积累情绪——比如开锁的过程，观众虽然只得到\"他在开锁\"这一个信息，但紧张感在发酵。这种镜头砍掉，故事的情绪厚度就没了。</p>\n<p>老白的招财猫故事不需要情绪积累（悬疑感来自信息差），所以他的判断标准只需要\"信息效率\"。但需要情绪张力的故事，必须同时考虑两个维度。</p>\n<p>确定了主镜之后，需要用手法让观众注意到它们：</p>\n<h3>五种常见场景的答案</h3>\n<p>以下手法不是并列的技巧，而是\"这个镜头让观众得到了什么信息？\"在不同场景下的答案。</p>\n<hr>\n<p><strong>场景一：辅助内容必须拍，但本身没信息价值</strong></p>\n<p>比如走位——观众看完得到的信息是\"他在走路\"，等于什么都没得到。但不能不拍，否则空间关系不成立。</p>\n<p><strong>答案</strong>：把核心信息和辅助内容合并到同一段时间里。让角色拿着招财猫进门，走位的过程中招财猫始终在画面显眼位置。同一个时间段，信息密度翻倍——观众既看到了\"他在走位\"，也看到了\"招财猫在他手里\"。</p>\n<hr>\n<p><strong>场景二：核心信息不够突出，观众可能错过</strong></p>\n<p>比如招财猫——它是核心信息，但如果只用全景拍，观众可能没注意到。</p>\n<p><strong>答案</strong>：多拍。给特写、给局部、给正面、给反应镜头。不是\"多一个镜头\"，而是<strong>用多个镜头从不同角度反复强调同一个信息</strong>，让观众不可能错过。</p>\n<hr>\n<p><strong>场景三：核心信息太直白，观众看到但没有情绪反应</strong></p>\n<p>比如\"屋里也有招财猫\"——直接切一个招财猫的镜头，观众看到了，但心里没有波澜。</p>\n<p><strong>答案</strong>：先撑着不给。先拍角色的反应（他看到了什么？表情变了），观众的好奇心被吊起来，然后再给核心画面。这个先后顺序本身就是情绪设计——先让观众\"想知道\"，再让观众\"看到\"。</p>\n<p><strong>反向用法</strong>：让观众比角色早知道信息。不是所有信息都要藏着，有时候让观众先知道，会产生\"替角色着急\"的效果。两种用法互补——一个让观众好奇，一个让观众着急。</p>\n<hr>\n<p><strong>场景四：信息是\"变化\"——东西从有到无</strong></p>\n<p>比如\"门口的招财猫不见了\"——直接说\"它消失了\"，观众听到了但感受不到。</p>\n<p><strong>答案</strong>：同一角度拍\"有\"和\"没有\"，让观众自己发现变化。先给\"有\"的画面足够时间让观众记住，再切到\"没有\"的同一画面。观众不需要你告诉，他自己就能感受到\"不见了\"。</p>\n<p><strong>关键</strong>：定主镜时就要为后面的对比预留角度。这不是事后选的，是事前定的。</p>\n<hr>\n<p><strong>场景五：信息是\"关系\"——A和B有联系</strong></p>\n<p>比如\"招财猫和角色之间的关系\"——直接说\"他看到了招财猫\"，太生硬。</p>\n<p><strong>答案</strong>：用镜头运动建立连接。摇镜从角色的脸摇到招财猫，观众自动认为\"他在看招财猫\"——不需要台词，不需要字幕。用镜头运动把两个元素串联起来，让观众自己感受它们的关系。</p>\n<p>音乐也是同样的逻辑——没出事的时候不加音乐，出事那个点加上音乐。用音乐的\"突然出现\"来强调\"这个时刻很重要\"，比多给一个镜头更有效。</p>\n<h3>与四步法的关系</h3>\n<p>主镜设计解决<strong>\"哪些镜头该存在\"</strong>，四步法解决<strong>\"每个镜头怎么做\"</strong>。</p>\n<p>先用主镜法决定拍什么——砍掉不需要的镜头，保留核心的主镜。再用四步法设计每个主镜和辅助镜的景别/运镜/节奏。</p>\n<hr>\n<h2>分镜设计四步法</h2>\n<h3>第一步：拆场景</h3>\n<p>拿到简短故事后，先拆成 3-5 个场景。每个场景只有一个核心事件。</p>\n<p><strong>规则</strong>：一个场景 = 一个核心行动 + 一个情绪变化。如果一场戏有两个核心事件或两种情绪变化，拆成两个场景。</p>\n<p>参考 <a href=\"#\" class=\"wiki-link\" data-name=\"Causal Chain Audit\">Causal Chain Audit</a> — 检查每个场景是不是由前一个导致的。</p>\n<h3>第二步：定景别</h3>\n<p>每个场景选择主景别。景别决定了观众和角色的距离感。</p>\n<table><thead><tr><th>景别</th><th>作用</th><th>什么时候用</th></tr></thead><tbody><tr><td>远景/全景</td><td>交代环境、位置关系</td><td>场景开头、动作结束</td></tr><tr><td>中景</td><td>展示动作和对话</td><td>大多数叙事场景</td></tr><tr><td>特写/大特写</td><td>强调情绪、细节</td><td>情感爆发、关键道具</td></tr><tr><td>过肩镜</td><td>建立对话关系</td><td>双人对话</td></tr></tbody></table>\n<p>参考 <a href=\"#\" class=\"wiki-link\" data-name=\"AI镜头语言进阶#以摄像机为参照系\">AI镜头语言进阶#以摄像机为参照系</a> — 用\"朝镜头/背对镜头\"代替\"向前/向后\"。</p>\n<h3>第三步：选运镜</h3>\n<p>每个场景的镜头运动方式。运镜决定了画面的动感和节奏。</p>\n<table><thead><tr><th>运镜</th><th>节奏感</th><th>什么时候用</th></tr></thead><tbody><tr><td>固定镜头</td><td>安静、沉稳</td><td>对话、沉思、紧张前奏</td></tr><tr><td>推镜</td><td>靠近、聚焦</td><td>情绪强化、揭示</td></tr><tr><td>拉镜</td><td>远离、释放</td><td>场景结束、情绪放松</td></tr><tr><td>摇镜/移镜</td><td>动态、发现</td><td>跟随动作、展示环境</td></tr><tr><td>手持抖动</td><td>紧张、纪实</td><td>追逐、打斗、慌乱</td></tr><tr><td>环绕镜</td><td>审视、强调</td><td>展示主体、情绪高潮</td></tr></tbody></table>\n<p>参考 <a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a> — 完整运镜词库。</p>\n<h3>第四步：定节奏</h3>\n<p>每个场景的节奏设计。节奏决定了观众的情绪强度。</p>\n<table><thead><tr><th>节奏</th><th>镜头时长</th><th>情绪</th></tr></thead><tbody><tr><td>快</td><td>1-2 秒/镜</td><td>紧张、兴奋、慌乱</td></tr><tr><td>中</td><td>2-3 秒/镜</td><td>正常叙事</td></tr><tr><td>慢</td><td>3-5+ 秒/镜</td><td>沉思、压抑、悲伤</td></tr></tbody></table>\n<p>参考 <a href=\"#\" class=\"wiki-link\" data-name=\"Pacing and Rhythm\">Pacing and Rhythm</a> — 节奏控制的完整方法论。</p>\n<hr>\n<h2>景别运用指南</h2>\n<p>景别不是随便选的，它直接影响观众的情绪反应：</p>\n<p><strong>特写</strong> — 强制观众关注。用于情感爆发的瞬间、关键道具、角色的微表情。</p>\n<p><strong>中景</strong> — 最自然的叙事距离。用于大多数对话和动作场景。</p>\n<p><strong>全景</strong> — 让观众看到全貌。用于开场建立空间、动作结束后的落点。</p>\n<p><strong>过肩镜</strong> — 建立人物之间的空间关系。用于对话场景，让观众知道谁在和谁说话。</p>\n<p><strong>常见错误</strong>：全程用中景，没有景别变化 → 画面单调，没有节奏感。</p>\n<hr>\n<h2>镜头数量与节奏</h2>\n<p>一个场景的分镜面板数量直接决定了剪辑节奏：</p>\n<ul><li><strong>面板越多</strong> → 镜头切换越频繁 → 节奏越快（适用于动作场景）</li><li><strong>面板越少</strong> → 镜头持续时间越长 → 节奏越慢（适用于对话或情绪场景）</li></ul>\n<p><strong>参考</strong>：15 秒的 AI 视频，通常 3-5 个镜头切换。少于 3 个太闷，多于 7 个太碎。</p>\n<hr>\n<h2>从文字到分镜的示例</h2>\n<p><strong>简短故事</strong>：小偷扮女仆潜入贵妇家，打开保险柜，不拿钱只拿护肤品，然后坐直升机逃走。</p>\n<p><strong>分镜设计</strong>：</p>\n<table><thead><tr><th>镜号</th><th>景别</th><th>运镜</th><th>节奏</th><th>内容</th></tr></thead><tbody><tr><td>1</td><td>过肩→特写</td><td>固定</td><td>慢</td><td>门缝里露出一只眼睛，女仆装的小偷闪进来</td></tr><tr><td>2</td><td>中景→特写</td><td>推镜</td><td>慢→紧张</td><td>蹲在保险柜前，手指颤抖地转密码锁</td></tr><tr><td>3</td><td>特写</td><td>固定</td><td>快</td><td>保险柜打开，手越过黄金，精准拿起护肤品</td></tr><tr><td>4</td><td>低角度全景</td><td>摇镜→仰拍</td><td>快</td><td>撕掉女仆装，跑上天台，跳上直升机</td></tr><tr><td>5</td><td>远景</td><td>拉镜</td><td>慢</td><td>直升机倾斜，消失在天际线</td></tr></tbody></table>\n<p>参考 <a href=\"#\" class=\"wiki-link\" data-name=\"AI首尾帧控制#示例二：护肤品从埃菲尔铁塔飞到自由女神像\">AI首尾帧控制#示例二：护肤品从埃菲尔铁塔飞到自由女神像</a> — 完整提示词写法。</p>", "AI长视频丝滑衔接": "<h1>AI长视频丝滑衔接</h1>\n<p>AI 视频工具目前单次只能生成 15 秒，要做长视频必须把多段 15 秒拼接起来。直接拼接会导致色彩突变、动作断掉、画面跳跃。解决方法是引入传统电影剪辑的逻辑，而不是硬续长镜头。</p>\n<h2>方法一：切换景别和角度</h2>\n<p>两段视频衔接时\"怪怪的\"，是因为把相似的角度和景别连在了一起。</p>\n<p>解决方式：用尾帧生成多机位九宫格变体，选择<strong>不同景别或不同角度</strong>的画面作为下一段的首帧。通过画面的切换，两段视频自然衔接在一起。</p>\n<h2>方法二：切换视角 + 动作衔接</h2>\n<p><strong>单纯切换视角</strong>会有\"跳切\"感，<strong>纯动作衔接</strong>又像硬续长镜头。两者结合才最自然。</p>\n<p>在动作进行中切镜，同时<strong>切换视角/景别</strong>，利用<strong>视觉暂留</strong>——人眼在看到画面后，影像会在视网膜停留约 0.1-0.2 秒。大脑会把视角变化理解为\"导演切机位\"，而不是\"画面跳了\"。</p>\n<p>关键操作：截取动作进行到一半的那一帧 → 切换到不同景别/角度 → 下一段提示词用<strong>\"继续\"</strong>描述重叠动作（如\"继续抬起咖啡杯\"）。剪辑点放在动作进行到一半的位置。</p>\n<h2>方法三：分镜组接镜头</h2>\n<p>不要硬续长镜头。在真正的电影中，导演会把故事拆成多个镜头。既然工具一次只能生成 15 秒，就在<strong>故事板阶段</strong>把镜头衔接成 15 秒之内能完成的小剧情。</p>\n<p>操作：把剧本上传给 AI 生成带时间戳的分镜头脚本，每次选择 15 秒以内的镜头组（如 4s+3s+3s+4s=14s），每组只负责一个剧情阶段。组接起来既有电影节奏，又突破了 15 秒限制。</p>\n<h2>核心原则</h2>\n<p>真正限制 AI 长视频制作的不是 15 秒，而是<strong>硬续长镜头</strong>。电影本来就不是一镜到底，而是靠镜头组接完成叙事。学会切换景别和角度、学会在动作中衔接、再用分镜拆开剧情，就能像导演一样设计每一个镜头。</p>\n<h2>Connections</h2>\n<ul><li>方法三\"分镜组接\"与 <a href=\"#\" class=\"wiki-link\" data-name=\"从参考图到视频生成：AI思考链路SOP（优化版）\">从参考图到视频生成：AI思考链路SOP（优化版）</a> 中\"4 宫格→视频\"的思路一致</li><li>方法二\"动作重叠\"与 <a href=\"#\" class=\"wiki-link\" data-name=\"AI视频动作设计\">AI视频动作设计</a> 中的动作连续性相关</li><li>方法一\"切换景别和角度\"是传统电影剪辑的 <a href=\"#\" class=\"wiki-link\" data-name=\"AI Camera Movements\">AI Camera Movements</a> 在实际拼接中的应用</li></ul>", "AI视频电影质感": "<h1>AI视频电影质感</h1>\n<p>真正拉开差距的不是抽卡次数，也不是提示词长度，而是<strong>质感控制能力</strong>。</p>\n<blockquote>质感的本质从来不是信息量，而是控制力。</blockquote>\n<p>真正高级的视频都会同时做到三件事：</p>\n<ol><li><strong>颜色有情绪</strong></li><li><strong>空间有呼吸</strong></li><li><strong>材质有真实感</strong></li></ol>\n<hr>\n<h2>一、颜色有情绪</h2>\n<p>色调不是好看，是传递情绪。每种色调本身就是电影的一种情绪语言：</p>\n<table><thead><tr><th>色调</th><th>情绪</th><th>场景示例</th></tr></thead><tbody><tr><td>冷蓝灰</td><td>孤独、悲凉</td><td>卖报男孩走在雨夜中</td></tr><tr><td>暖橙黄</td><td>回忆、生活感</td><td>情侣在咖啡馆聊天</td></tr><tr><td>青绿色</td><td>废土、危险、末日</td><td>废墟中的未来世界</td></tr></tbody></table>\n<p><strong>核心认知</strong>：真正决定电影感的不是内容，而是情绪。色调是控制情绪最直接的方法。</p>\n<p><strong>实操流程</strong>：</p>\n<ol><li>从喜欢的电影/海报中提取截图</li><li>用 AI 生成色卡</li><li>把色卡 + 普通视频拖入 AI 工具</li><li>使用\"全能参考模式\"应用色调</li></ol>\n<hr>\n<h2>二、空间有呼吸</h2>\n<p>留白不是空，是给观众喘息。主次分明的镜头才是高级镜头。</p>\n<p><strong>三种留白技巧</strong>：</p>\n<ol><li><strong>主体突出</strong> — 背景简化，只为衬托主体</li></ol>\n<p>   - ❌ 卧室里堆满杂物 → ✅ 简洁背景，人物突出</p>\n<ol><li><strong>情绪留白</strong> — 用环境暗示情绪，而非直接展示</li></ol>\n<p>   - ❌ 人物站在天台 + 大量情绪描写 → ✅ 天台空旷 + 孤独感</p>\n<p>   - 留白让人物更有情绪，画面更高级</p>\n<ol><li><strong>想象空间</strong> — 不要把所有东西全部展示出来</li></ol>\n<p>   - ❌ 悲伤 = 哭泣的脸 + 大量环境描写 → ✅ 安静场景 + 暗示性细节</p>\n<p>   - 真正高级的情绪表现会刻意保留想象空间</p>\n<p><strong>本质</strong>：真正高级的镜头从来不是信息量最大的镜头，而是主次分明的镜头。</p>\n<hr>\n<h2>三、材质有真实感</h2>\n<p>AI 视频最大的问题：<strong>太新太完美</strong>。皮肤过度磨皮、金属像塑料、衣服像游戏建模——精致的虚假感。</p>\n<p><strong>解法：真实感来自不完美</strong></p>\n<h3>技法一：写状态，少写名字</h3>\n<table><thead><tr><th>❌ 错误</th><th>✅ 正确</th></tr></thead><tbody><tr><td>写\"金属\"</td><td>写\"轻微氧化、边缘磨损\"</td></tr><tr><td>写\"皮肤\"</td><td>写\"轻微毛孔、肌理变化\"</td></tr><tr><td>写\"布料\"</td><td>写\"旧衣服的褶皱、织物纹理\"</td></tr></tbody></table>\n<p>理解的不是物体，而是<strong>状态</strong>。</p>\n<h3>技法二：主动制造瑕疵</h3>\n<p>高级电影喜欢保留不完美：</p>\n<p><strong>人物类</strong>：</p>\n<ul><li>轻微毛孔</li><li>肤色变化</li><li>头发碎发</li><li>眼下阴影</li><li>旧衣服褶皱</li></ul>\n<p><strong>环境类</strong>：</p>\n<ul><li>灰尘</li><li>划痕</li><li>磨损老化痕迹</li></ul>\n<p>真实感的本质不是完美，而是<strong>可信</strong>。</p>\n<hr>\n<h2>核心原则</h2>\n<p>电影感不是加法，而是<strong>减法</strong>：</p>\n<ul><li>颜色减到一种主情绪</li><li>空间减到主次分明</li><li>材质减到可信的不完美</li></ul>\n<p>很多人拼命卷模型、卷清晰度，但真正厉害的人已经开始卷<strong>视觉语言</strong>了。</p>", "Seedance 2.0 标点控声": "", "AI视频电影质感底层逻辑": "", "Scene Value": "<h1>Scene Value</h1>\n<p>场景价值转换。每个场景/段落都要有价值变化，从+到-或从-到+。</p>\n<p>没有价值变化的场景，就不是场景，只是描述。</p>\n<hr>\n<h2>怎么用</h2>\n<h3>核心问题</h3>\n<p>写任何一个场景/段落之前，先回答四个问题：</p>\n<ol><li><strong>什么价值进入这个场景？</strong>（比如：信任）</li><li><strong>进入时是什么状态？</strong>（比如：团队信任领导）</li><li><strong>离开时是什么状态？</strong>（比如：团队怀疑领导）</li><li><strong>什么动作导致了这个变化？</strong></li></ol>\n<p>如果这四个问题答不上来，那这个场景要么不需要，要么需要重新想。</p>\n<h3>常见的价值对</h3>\n<table><thead><tr><th>正面</th><th>负面</th></tr></thead><tbody><tr><td>控制</td><td>无助</td></tr><tr><td>信任</td><td>背叛</td></tr><tr><td>爱</td><td>执念</td></tr><tr><td>生</td><td>死</td></tr><tr><td>自由</td><td>束缚</td></tr><tr><td>秩序</td><td>混乱</td></tr><tr><td>团队</td><td>工具</td></tr><tr><td>希望</td><td>绝望</td></tr><tr><td>知道</td><td>不知道</td></tr></tbody></table>\n<p>不只是这些，任何有正负两面的东西都可以作为价值。</p>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<blockquote>В любой сцене **что-то меняется** — от + к – или наоборот. Ценность входит в сцену в одном состоянии, выходит в другом.<br>（在任何场景里，**都有什么东西变了** — 从+到-或反过来。价值以一种状态进入场景，以另一种状态离开。）</blockquote>\n<blockquote>**Сцена без поворота значения = не сцена.** Это просто описание.<br>（**没有价值转折的场景 = 不是场景。** 只是描述而已。）</blockquote>\n<h3>写场景前的检查清单</h3>\n<p>写每个场景之前，都要过一遍：</p>\n<ol><li>Какая управляющая идея?（主控思想是什么？）</li><li>Какая ценность в эту сцену входит и какая выходит?（什么价值进，什么价值出？）</li><li>Какой этап Кэмпбелла?（坎贝尔的哪个阶段？）</li><li>Как сцена работает на хамартию героя?（这个场景怎么作用于主角的悲剧缺陷？）</li><li>Это сцена-перипетия или сцена-подготовка?（这是转折场景还是铺垫场景？）</li></ol>\n<p>答不上来 → 场景要么不需要，要么需要重新想。</p>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>不只是剧本，任何叙事/说服场景都能用：</p>\n<ul><li><strong>写文案</strong> — 每一段都要有价值变化，用户看完这段，对产品的看法变了吗？</li><li><strong>做视频</strong> — 每个镜头/片段都要有变化，观众的情绪/认知变了吗？</li><li><strong>做演讲</strong> — 每个部分都要有推进，听众的认知/态度变了吗？</li><li><strong>写销售信</strong> — 每一段都要让读者更想买一点，从\"不感兴趣\"到\"想买\"</li><li><strong>做详情页</strong> — 每一屏都要让用户更了解产品、更信任产品</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 平铺直叙，没有变化</h3>\n<p>最常见的错误。整个场景/段落只是在描述状态，没有任何变化。</p>\n<p>用户/观众看着看着就走神了，因为没有变化就没有张力。</p>\n<p><strong>没有变化的内容，都是废话。</strong></p>\n<h3>2. 变化太小，感觉不到</h3>\n<p>有变化，但变化太小，用户/观众感觉不到。</p>\n<p>比如从\"有点信任\"到\"比较信任\"，这个变化太小了，等于没有。</p>\n<p>变化要足够大，能明显感觉到。从\"完全信任\"到\"彻底怀疑\"，这才是有价值的变化。</p>\n<h3>3. 只有正面变化，没有负面</h3>\n<p>一直都是越来越好，没有挫折。</p>\n<p>这样的内容很假，也没有张力。真实的故事都是有起有落的。</p>\n<p>正负交替，节奏才好看。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Show Don't Tell\">Show Don't Tell</a></strong> — 价值变化是通过展示出来的动作实现的，不是说出来的</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Progressive Complications\">Progressive Complications</a></strong> — 每次变化的幅度要越来越大，越来越难</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a></strong> — 有价值转换的场景，删掉通常会影响结果；没有价值转换的场景，删掉通常不影响</li></ul>", "Show Don't Tell": "<h1>Show Don't Tell</h1>\n<p>展示而非讲述。用动作、物件、画面展示信息，不用描述性的语言直接说出来。</p>\n<p>观众/用户自己看出来的，比你直接告诉他的，印象深 10 倍。</p>\n<hr>\n<h2>怎么用</h2>\n<p><strong>核心原则：能展示的，就不要说。</strong></p>\n<h3>替换方法</h3>\n<p>把\"直接说\"改成\"用动作/物件展示\"：</p>\n<table><thead><tr><th>直接说（不好）</th><th>展示出来（好）</th></tr></thead><tbody><tr><td>她怀孕了</td><td>验孕棒、婴儿房、摸肚子的动作</td></tr><tr><td>他很伤心</td><td>空椅子、撕碎的照片、独自喝酒</td></tr><tr><td>他们关系不好</td><td>吃饭不说话、各走各的、摔门</td></tr><tr><td>他很有钱</td><td>戴的表、开的车、住的房子、别人对他的态度</td></tr><tr><td>时间很紧张</td><td>时钟特写、急促的脚步声、满头大汗</td></tr></tbody></table>\n<h3>判断标准</h3>\n<blockquote>如果把这句话/这个描述删掉，观众从画面/动作里还能看出来吗？<br>能 → 就是展示，不是讲述<br>不能 → 就是讲述，要改</blockquote>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<h3>只用动作动词</h3>\n<blockquote>Глаголы действия. Никаких описаний.<br>（动作动词。不要任何描述。）</blockquote>\n<p>剧本里只写能看到、能听到的东西。只写动词（打、走、抓、看、说）。</p>\n<p>不写：</p>\n<ul><li>\"他感到...\"</li><li>\"他明白...\"</li><li>\"他脑子里闪过...\"</li><li>\"气氛很紧张...\"</li></ul>\n<p>这些都是观众看不到的，写了也没用。演员会演出来，不用你写。</p>\n<h3>例子</h3>\n<p>❌ «Серый рассвет окрашивает горные вершины в розоватые тона. Древний храм возвышается над пропастью.»</p>\n<p>（灰色的黎明把山峰染成粉红色。古老的寺庙矗立在深渊之上。）</p>\n<p>✅ «EXT. ГОРЫ — РАССВЕТ. Три точки несутся над снежным гребнем.»</p>\n<p>（外景。山脉 — 黎明。三个点在雪脊上飞奔。）</p>\n<p>❌ «Герой чувствует, что его сердце разрывается от боли потери. Его глаза наполнены тоской.»</p>\n<p>（主角感到他的心因失去的痛苦而破碎。他的眼睛充满了忧伤。）</p>\n<p>✅ «Герой СМОТРИТ на гору.»</p>\n<p>（主角看着山。）</p>\n<p>（他的感受，演员会演出来。）</p>\n<hr>\n<h2>在出图里怎么用</h2>\n<p>出图也是一样的道理：</p>\n<p>❌ \"很悲伤的氛围\" — AI 不知道\"悲伤\"长什么样</p>\n<p>✅ \"一个人坐在空房间里，窗外在下雨\" — 画面自己会说话</p>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<ul><li><strong>写文案</strong> — 用具体场景代替抽象形容词</li><li><strong>做广告</strong> — 用使用场景代替功能描述</li><li><strong>做演讲</strong> — 用故事代替道理</li><li><strong>出图</strong> — 用具体画面代替情绪描述</li><li><strong>写代码注释</strong> — 用代码示例代替文字描述</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 怕观众看不懂，忍不住解释</h3>\n<p>最常见的错误。觉得观众/用户可能看不懂，就忍不住直接说出来。</p>\n<p>但实际上，观众自己看出来的，比你直接告诉他的，印象深得多。</p>\n<p><strong>相信观众的智商。</strong></p>\n<h3>2. 把\"展示\"理解为\"更详细的描述\"</h3>\n<p>不是说描述得更详细就是展示。</p>\n<p>\"他非常非常伤心，眼泪像断了线的珍珠一样往下掉\" — 这还是讲述，只是描述得更详细了。</p>\n<p>\"他站在墓碑前，手里攥着一张旧照片，指节发白\" — 这才是展示。</p>\n<h3>3. 所有信息都要展示</h3>\n<p>不是所有信息都需要展示。</p>\n<p>核心信息、关键情绪 → 要展示</p>\n<p>背景信息、过渡信息 → 可以直接说，节省时间</p>\n<p>判断标准：这个信息重要吗？重要 → 展示；不重要 → 直接说。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a></strong> — 价值转换是通过展示出来的动作实现的，不是说出来的</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"克制原则\">克制原则</a></strong> — 克制的描述才能给观众/用户留想象空间，展示而非讲述本身就是一种克制</li></ul>", "Causal Chain Audit": "<h1>Causal Chain Audit</h1>\n<p>因果链审计。检查每个步骤/场景是不是由前一个导致的，而不只是时间顺序。</p>\n<p>好的结构是因果的，不是时间顺序的。</p>\n<hr>\n<h2>怎么用</h2>\n<h3>核心测试</h3>\n<p>对每个场景/步骤，问自己：</p>\n<blockquote>**这个场景/步骤，是因为前一个发生了才发生的吗？**</blockquote>\n<p>两个答案：</p>\n<table><thead><tr><th>答案</th><th>判断</th><th>说明</th></tr></thead><tbody><tr><td>**ПОТОМУ ЧТО（因为...）**</td><td>✅ 因果关系</td><td>好的结构</td></tr><tr><td>**ПОСЛЕ ЭТОГО（在这之后...）**</td><td>❌ 时间顺序</td><td>有问题，需要改</td></tr></tbody></table>\n<p>如果只是\"在这之后\"，那这两个场景/步骤之间没有因果关系，是松散的。</p>\n<h3>审计标签</h3>\n<p>审计时，用标签标记问题：</p>\n<ul><li>⚠ [ПРИЧИННОСТЬ] — 场景/步骤不是从前一个来的，因果断裂</li><li>⚠ [ЦЕННОСТЬ] — 场景/步骤没有推动价值变化（见 <a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a>）</li><li>⚠ [БИБЛИЯ] — 和已有的设定/规则冲突</li><li>⚠ [ТЕМП] — 节奏不对，太长或太短</li></ul>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<blockquote>Каждая сцена начинается с «потому что»? (Сцена N произошла, ПОТОМУ ЧТО в сц. N-1 случилось X.)<br>（每个场景都是\"因为\"开头的吗？场景 N 发生了，**因为**场景 N-1 里发生了 X。）</blockquote>\n<blockquote>Если сцена начинается с «после этого» — это провал. Хорошая структура — каузальная, не хронологическая.<br>（如果场景是\"在这之后\"开头的 — 那就是失败。好的结构是因果的，不是时间顺序的。）</blockquote>\n<h3>审计流程</h3>\n<p>用户要审计因果关系时：</p>\n<ol><li>通读整个剧本/大纲</li><li>对每个场景，检查是不是由前一个场景导致的</li><li>用上面的标签标记问题</li><li>给出修复建议</li></ol>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>任何有逻辑、有流程的场景都能用：</p>\n<ul><li><strong>写代码</strong> — 每个函数/模块的调用，是不是有必要的前置条件？</li><li><strong>做产品流程</strong> — 用户每一步操作，是不是由上一步导致的？有没有多余的步骤？</li><li><strong>写方案</strong> — 每个结论，是不是由前面的论据推导出来的？</li><li><strong>做设计流程</strong> — 每个页面，是不是用户在前一个页面的操作导致的？</li><li><strong>写教程</strong> — 每个步骤，是不是前一个步骤的自然结果？</li><li><strong>做项目计划</strong> — 每个任务，是不是必须等前一个完成了才能开始？</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 把时间顺序当成因果关系</h3>\n<p>最常见的错误。因为 A 发生在 B 前面，就以为 A 导致了 B。</p>\n<p>但实际上，时间先后不等于因果关系。</p>\n<p>\"我早上喝了一杯水，然后下午下雨了\" — 这是时间顺序，不是因果关系。</p>\n<h3>2. 因果链断裂</h3>\n<p>中间缺了一环，导致逻辑跳步。</p>\n<p>比如：\"主角发现了线索，然后坏人被抓了\" — 中间缺了\"主角怎么用线索找到坏人\"的环节。</p>\n<p>用户/观众会觉得：啊？怎么就到这了？</p>\n<h3>3. 因果关系太弱</h3>\n<p>有因果关系，但太弱了，不足以导致后面的结果。</p>\n<p>比如：\"主角说了一句话，然后坏人就投降了\" — 这一句话的力量太弱了，不足以让坏人投降。</p>\n<p>因果关系要足够强，才能让用户/观众信服。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a></strong> — 因果链推动价值变化，每个因果环节都应该带来价值的转换</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a></strong> — 如果一个步骤/场景删掉了，后面的还能成立，说明因果关系不强，可能是多余的</li></ul>", "If You Remove It Does It Change": "<h1>If You Remove It Does It Change</h1>\n<p>必要性测试。删掉它，结果会变吗？</p>\n<p><strong>如果删掉一个场景，电影结局没变 → 场景多余，删掉。</strong></p>\n<hr>\n<h2>W6 怎么用</h2>\n<h3>每个场景都要过这个测试</h3>\n<p>问自己：把这个场景删掉，电影结局会变吗？</p>\n<ul><li><strong>会变</strong> → 场景需要，保留</li><li><strong>不会变</strong> → 场景多余，毫不犹豫删掉</li><li><strong>只改变语气/情绪</strong> → 呼吸场景。缺时间时可以删，但会损失质感</li></ul>\n<h3>删减时的优先级</h3>\n<p>在 <code>timing-and-cutting.md</code> 的删减优先级里：</p>\n<ul><li>最安全的删减：重复的、平行的、多余的反应镜头</li><li>绝对不能碰：高潮、突转、发现、关键转折点</li></ul>\n<hr>\n<h2>来源</h2>\n<p>从 W6-俄语详细剧本技能的方法论层和时间剪辑层提炼。亚里士多德《诗学》中的\"行动统一性\"原则 + W6 的具体删减方法。</p>", "Cut Priority Method": "<h1>Cut Priority Method</h1>\n<p>删减优先级方法。需要删减内容时，按优先级从最不重要的开始删，保留核心。</p>\n<p>不是平均删减，也不是从头删到尾，而是有策略地删。</p>\n<hr>\n<h2>怎么用</h2>\n<h3>核心原则</h3>\n<p><strong>先删最不重要的，保留核心。</strong></p>\n<p>删减不是\"每个地方都删一点\"，而是\"先删最没用的，实在不够再删次重要的\"。</p>\n<h3>优先级分层</h3>\n<p>从安全到风险，分四层：</p>\n<table><thead><tr><th>优先级</th><th>类型</th><th>说明</th><th>删了会怎么样</th></tr></thead><tbody><tr><td>**最优先删（安全）**</td><td>重复的、多余的</td><td>同样的信息说了好几遍，只留最强的那一个</td><td>几乎没影响</td></tr><tr><td>**次优先删（较安全）**</td><td>装饰性的、呼吸感的</td><td>不影响核心逻辑，但影响氛围和节奏</td><td>核心不变，体验略降</td></tr><tr><td>**谨慎删（有风险）**</td><td>次要支线、次要角色</td><td>对主线有影响，但不大</td><td>核心还在，但丰富度下降</td></tr><tr><td>**绝对不能删**</td><td>核心转折点、关键节点</td><td>整个故事/逻辑的支柱</td><td>删了整个东西就垮了</td></tr></tbody></table>\n<h3>删减步骤</h3>\n<ol><li><strong>先算清楚</strong> — 当前有多长/多大，目标是多长/多大，差多少</li><li><strong>列清单</strong> — 把所有元素列出来，按上面的优先级分类</li><li><strong>从最安全的开始删</strong> — 先删重复的、多余的</li><li><strong>不够再往下</strong> — 如果还不够，再删装饰性的</li><li><strong>实在不行再动次要的</strong> — 万不得已才删次要支线</li><li><strong>核心绝对不动</strong> — 无论如何都不能碰核心转折点</li></ol>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<h3>删减优先级（从安全到风险）</h3>\n<h4>1. 安全的（可以放心删）</h4>\n<ul><li><strong>重复的 beat</strong> — 同一个情绪在三个场景里重复，只留最强的那个</li><li><strong>并行的 beat</strong> — 撞了三下、主角试了四次、五个群众反应，缩到 2 次（三的法则：展示-展示-点）</li><li><strong>重复动作的台词</strong> — 主角在哭，还说\"我很难过\"，删掉台词</li><li><strong>没有价值转换的过渡场景</strong> — 主角从 A 地到 B 地，对话不推动剧情</li></ul>\n<h4>2. 中等的（小心删）</h4>\n<ul><li><strong>长的参数描述</strong> — 详细的服装、场景描述，缩到 1 行</li><li><strong>扩展的动作</strong> — 主角做了三件事，其实一件就行，留最重要的</li><li><strong>场景内的反应镜头</strong> — 蒙太奇里 4 个反应脸，缩到 2 个</li></ul>\n<h4>3. 风险的（实在不行再删）</h4>\n<ul><li><strong>整个喜剧或情感过渡场景</strong> — 可能会影响节奏，但能省出时间</li><li><strong>次要角色的副线</strong> — 如果主角有次要的成长弧线，可以缩短，但不能完全删掉</li></ul>\n<h4>4. 绝对不能删的</h4>\n<ul><li><strong>激励事件（Inciting Incident）</strong></li><li><strong>转折点（Peripeteia）</strong></li><li><strong>发现时刻（Anagnorisis）</strong></li><li><strong>危机抉择（Crisis dilemma）</strong></li><li><strong>高潮（Climax）</strong></li><li><strong>后面会用到的物件伏笔</strong></li></ul>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>任何需要删减的场景都能用：</p>\n<ul><li><strong>写文案</strong> — 字数超了，先删重复的、修饰性的，最后才动核心卖点</li><li><strong>做 PPT</strong> — 页数太多，先删重复的、装饰性的，最后才动核心逻辑</li><li><strong>写代码</strong> — 要精简代码，先删没用的变量、重复的逻辑，最后才动核心算法</li><li><strong>做设计</strong> — 画面太满，先删多余的装饰元素，最后才动核心信息</li><li><strong>做产品</strong> — 功能太多，先删没人用的、边缘的，最后才动核心功能</li><li><strong>出图</strong> — 元素太多，先删次要的、装饰性的，最后才动主体</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 平均删减</h3>\n<p>最常见的错误。每个地方都删一点，觉得这样\"公平\"。</p>\n<p>但这样的结果是：核心也被削弱了，多余的还留着。</p>\n<p><strong>好的删减是：多余的全删掉，核心一点不动。</strong></p>\n<h3>2. 从头删到尾</h3>\n<p>从开头开始删，删到够了为止。</p>\n<p>但开头通常是铺垫，结尾通常是高潮，中间才是最容易有水份的。</p>\n<p><strong>先找最水的地方删，不是从头删。</strong></p>\n<h3>3. 舍不得删自己写的</h3>\n<p>沉没成本谬误。觉得这段写得挺好的，舍不得删。</p>\n<p>但判断标准不是\"写得好不好\"，而是\"有没有必要\"。（见 <a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a>）</p>\n<p>写得再好，没必要就是没必要。</p>\n<h3>4. 一上来就动核心</h3>\n<p>觉得要删很多，一上来就把核心转折点删了。</p>\n<p>核心是支柱，删了整个东西就垮了。</p>\n<p><strong>永远从最不重要的开始删，核心最后才考虑（最好永远不考虑）。</strong></p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a></strong> — 判断某个东西能不能删的标准</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Scene Value\">Scene Value</a></strong> — 有价值转换的场景通常比较重要，优先级靠后；没有价值转换的场景通常可以先删</li></ul>", "Spot Edit Principle": "<h1>Spot Edit Principle</h1>\n<p>点式修改原则。只改用户要求改的那一点，不全量返工，不\"顺便改进\"旁边的。</p>\n<p>改哪里动哪里，不牵一发而动全身。</p>\n<hr>\n<h2>怎么用</h2>\n<p>用户说改 A，就只改 A，不要因为改了 A 就顺便把 B、C、D 都改了。</p>\n<p><strong>三个原则：</strong></p>\n<ol><li><strong>精准定位</strong> — 找到用户要求修改的最小单元（一个词、一句话、一个场景、一个功能）</li><li><strong>只改那个单元</strong> — 不要扩大范围，不要\"顺便优化\"</li><li><strong>只改输出文件</strong> — 用户能看到的那个文件改了就行，不要动其他没提到的</li></ol>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<blockquote>**Точечный Edit.** Не переписывай всю сцену из-за одной реплики.<br>（点式编辑。不要因为一句台词就重写整个场景。）</blockquote>\n<p>用户说改某句台词 → 只改那句台词，不动其他台词，不重写整个场景。</p>\n<p>用户说改某个场景的节奏 → 只调那个场景的节奏，不动前后场景。</p>\n<p>改完之后只重新生成用户能看到的那个文件，其他文件不动。</p>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>任何修改场景都能用：</p>\n<ul><li><strong>改代码</strong> — 用户说改某个功能，就只改那个功能，不要顺便重构整个文件</li><li><strong>改设计</strong> — 用户说改某个颜色，就只改那个颜色，不要顺便把整个配色都换了</li><li><strong>改文案</strong> — 用户说改某句话，就只改那句话，不要顺便把整段都重写了</li><li><strong>改 PPT</strong> — 用户说改某一页，就只改那一页，不要顺便把整个模板都换了</li><li><strong>改图片</strong> — 用户说改某个元素，就只改那个元素，不要重画整张图</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. \"反正都改了，顺便优化一下\"</h3>\n<p>最常见的错误。觉得既然都打开了，顺便把旁边的也优化一下。</p>\n<p>但这样做的问题：</p>\n<ul><li>改得越多，引入新 bug 的概率越大</li><li>用户可能只想要那一点改动，不想要其他\"优化\"</li><li>改完之后用户可能不认识了，以为你改错了</li></ul>\n<p><strong>用户要什么就给什么，不要自作主张加东西。</strong></p>\n<h3>2. 觉得原来的写得不好，忍不住重写</h3>\n<p>看到原来的内容觉得\"这写得不行\"，就忍不住全部重写。</p>\n<p>但用户的需求是\"改 A\"，不是\"重写整个东西\"。</p>\n<p>如果你觉得整体都有问题，可以提建议，但不要直接就改了。</p>\n<h3>3. 修改范围扩散</h3>\n<p>改了 A，发现 B 也要跟着改，改了 B 发现 C 也要改... 最后改了一大堆。</p>\n<p>如果发现改 A 会影响 BCD，先停下来，告诉用户：\"改 A 的话 BCD 也要跟着改，要不要一起改？\"</p>\n<p>不要自己默默就把 BCD 都改了。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Single Version Principle\">Single Version Principle</a></strong> — 给方案的时候只给一个版本，修改的时候也只改那一个版本</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"If You Remove It Does It Change\">If You Remove It Does It Change</a></strong> — 判断某个东西要不要删，也是最小化原则</li></ul>", "Single Version Principle": "<h1>Single Version Principle</h1>\n<p>单一版本原则。给用户方案时只给一个最优解 + 理由，不给一堆选项让用户选。</p>\n<p>你是专家，你来判断哪个最好，然后告诉用户为什么好。</p>\n<hr>\n<h2>怎么用</h2>\n<h3>核心做法</h3>\n<ol><li><strong>你先判断</strong> — 你是专家，你分析哪个方案最好</li><li><strong>只给一个</strong> — 只给你认为最好的那个版本</li><li><strong>给出理由</strong> — 告诉用户为什么这个是最好的</li><li><strong>等用户反馈</strong> — 用户说不行，再调整，不要一次给五个让用户挑</li></ol>\n<h3>为什么只给一个</h3>\n<ul><li><strong>减少用户决策负担</strong> — 用户找你是要解决方案，不是要做选择题</li><li><strong>体现专业性</strong> — 你是专家，你应该知道哪个最好</li><li><strong>提高效率</strong> — 不用在多个方案之间来回比较，直接在最优解上迭代</li><li><strong>避免选择困难</strong> — 选项越多，用户越难选，越容易纠结</li></ul>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<blockquote>**НЕ показывай 5 вариантов.** Один вариант + аргумент.<br>（**不要**给 5 个版本。一个版本 + 理由。）</blockquote>\n<blockquote>**Один вариант, не пять.** Когда предлагаешь сцену — даёшь одну версию + аргумент. Если пользователь её отвергает, спрашиваешь узкий бинарный вопрос и даёшь следующую одну.<br>（一个版本，不是五个。你给场景的时候，给一个版本 + 理由。如果用户否定了，问一个窄的二进制问题，然后给下一个版本。）</blockquote>\n<h3>具体流程</h3>\n<ol><li>先给一个版本的场景</li><li>下面附上 3-5 行分析（为什么这么写、价值怎么转换、有什么潜在问题）</li><li>然后问用户要什么修改（窄的问题，不是\"你觉得怎么样\"）</li><li>用户说不行，再问具体哪里不行，然后改下一版</li></ol>\n<p>不是一次给 5 个版本让用户挑。</p>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>任何给用户方案的场景都能用：</p>\n<ul><li><strong>做设计</strong> — 只给一个最优设计 + 理由，不给 3 个方向让用户选</li><li><strong>写方案</strong> — 只给一个推荐方案 + 理由，不给 5 个备选</li><li><strong>做推荐</strong> — 只推荐一个最合适的 + 理由，不给一堆选项</li><li><strong>写代码</strong> — 只写一种最优实现，不写好几种实现让用户选</li><li><strong>出图</strong> — 只出一版最优的，不出 10 张让用户挑</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 怕用户不满意，多给几个保底</h3>\n<p>最常见的错误。觉得多给几个选择，用户总能挑到一个满意的。</p>\n<p>但实际上：</p>\n<ul><li>用户会纠结，选择困难</li><li>用户会觉得你不专业，连哪个最好都不知道</li><li>效率低，每个方案都要花时间做，但最后只用一个</li></ul>\n<p><strong>相信你的专业判断。</strong> 你觉得哪个最好，就给哪个。</p>\n<h3>2. 给了一堆方案，但每个都不深入</h3>\n<p>每个方案都只做了个大概，没有深入思考。</p>\n<p>与其做 5 个半成品，不如把 1 个做精。</p>\n<h3>3. 用户说\"多给几个选项看看\"</h3>\n<p>有时候用户会主动要求多给几个选项。</p>\n<p>这时候可以给，但不要给太多，2-3 个足够，而且每个都要有明确的差异和理由。</p>\n<p>不要因为用户说\"多给几个\"，就随便凑数。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Binary Question\">Binary Question</a></strong> — 用户否定之后，用窄的二进制问题来澄清，而不是再给一堆版本</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Spot Edit Principle\">Spot Edit Principle</a></strong> — 修改的时候也只改那一点，不全部重写</li></ul>", "Binary Question": "<h1>Binary Question</h1>\n<p>二进制提问法。信息不够时，问窄的、是/否型的二选一问题，不问大而空的开放问题。</p>\n<p>用户回答一个字就能继续，沟通效率最高。</p>\n<hr>\n<h2>怎么用</h2>\n<h3>核心原则</h3>\n<p>当你需要用户澄清时，<strong>不要问开放问题，要问二进制问题</strong>。</p>\n<table><thead><tr><th>开放问题（不好）</th><th>二进制问题（好）</th></tr></thead><tbody><tr><td>\"你想要什么风格？\"</td><td>\"你想要偏理性还是偏感性？\"</td></tr><tr><td>\"这个场景你觉得怎么样？\"</td><td>\"这个方向对吗？\"</td></tr><tr><td>\"你想要多长的？\"</td><td>\"控制在 30 秒以内可以吗？\"</td></tr><tr><td>\"你觉得哪里不行？\"</td><td>\"是方向不对，还是节奏不对？\"</td></tr></tbody></table>\n<h3>为什么二进制问题更好</h3>\n<ol><li><strong>用户好回答</strong> — 是/否，或者二选一，不用想太多</li><li><strong>信息密度高</strong> — 一个问题就能排除一半的可能性</li><li><strong>效率高</strong> — 几个二进制问题就能定位到用户真正想要的</li><li><strong>不会把用户问烦</strong> — 开放问题用户不知道怎么回答，容易卡住</li></ol>\n<h3>进阶：逐步缩小范围</h3>\n<p>用多个二进制问题逐步缩小范围，像二分查找一样：</p>\n<ol><li>先问大方向：\"是 A 方向还是 B 方向？\"</li><li>再问细节：\"那是 A1 还是 A2？\"</li><li>最后确认：\"就这个，对吗？\"</li></ol>\n<p>几个问题下来，就能精准定位用户需求。</p>\n<hr>\n<h2>在 W6 剧本技能里怎么用</h2>\n<blockquote>Если контекста не хватает для уверенного решения, **не выдумывай**. Задай ОДИН узкий бинарный вопрос.<br>（如果没有足够的上下文来做确定的决策，**不要瞎编**。问**一个**窄的二进制问题。）</blockquote>\n<blockquote>Бинарный вопрос — лучший вопрос. Пользователь отвечает «защищает» — у тебя есть направление. И только тогда пишешь.<br>（二进制问题是最好的问题。用户回答\"保护\" — 你就有了方向。然后你再写。）</blockquote>\n<h3>用户否定时的用法</h3>\n<p>用户说\"不行\"、\"不对\"、\"不好\"的时候：</p>\n<ol><li>不要道歉个没完</li><li>不要再扔 5 个版本过去猜</li><li>问一个问题：具体哪里不行？</li></ol>\n<p>   - 方向？</p>\n<p>   - 语气？</p>\n<p>   - 节奏？</p>\n<p>   - 某句具体的台词？</p>\n<p>   - 角色行为逻辑？</p>\n<ol><li>用户回答之后，给一个解决方案，不是五个</li></ol>\n<hr>\n<h2>还可以用在哪些地方</h2>\n<p>任何需要澄清需求的场景都能用：</p>\n<ul><li><strong>需求沟通</strong> — 确认用户想要什么</li><li><strong>问题排查</strong> — 定位问题出在哪</li><li><strong>方案确认</strong> — 确认用户是不是要这个</li><li><strong>用户访谈</strong> — 快速获取用户反馈</li><li><strong>做决策</strong> — 快速缩小选择范围</li></ul>\n<hr>\n<h2>常见坑</h2>\n<h3>1. 问大而空的开放问题</h3>\n<p>最常见的错误。觉得问得越开放，得到的信息越多。</p>\n<p>但实际上，开放问题用户不知道怎么回答，要么答非所问，要么干脆不答。</p>\n<p><strong>越具体的问题，越容易得到有用的答案。</strong></p>\n<h3>2. 一次问好几个问题</h3>\n<p>\"你觉得是方向不对，还是节奏不对，还是台词不行？\"</p>\n<p>用户会混乱，不知道该回答哪个。</p>\n<p><strong>一次只问一个问题。</strong> 得到答案之后再问下一个。</p>\n<h3>3. 问题不够窄</h3>\n<p>\"你想要长一点还是短一点？\" — 这个还不够窄，多长算长？多短算短？</p>\n<p>更好的问法：\"控制在 30 秒以内可以吗？\"</p>\n<p><strong>越具体、越有明确选项的问题，越好。</strong></p>\n<h3>4. 明明可以自己判断，还要问</h3>\n<p>有些问题你作为专家应该能判断，就不要问用户。</p>\n<p>二进制提问是在你<strong>确实无法确定</strong>的时候才用，不是什么都问用户。</p>\n<hr>\n<h2>和其他概念的关系</h2>\n<ul><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Single Version Principle\">Single Version Principle</a></strong> — 只给一个版本，用户否定之后用二进制问题澄清，而不是再给一堆版本</li><li><strong><a href=\"#\" class=\"wiki-link\" data-name=\"Intent Recognition\">Intent Recognition</a></strong> — 意图识别的本质就是把用户的输入归类到有限的几个选项里，也是一种二进制/多进制判断</li></ul>", "Andrej Karpathy": "", "kepano-obsidian-skills": "", "Ar9av-obsidian-wiki": "", "ballred-obsidian-claude-pkm": "", "Claudian-YishenTu": "", "Nexus-claudesidian-mcp": "", "rvk7895-llm-knowledge-bases": "", "Antigravity Tools": "", "LM Studio": "", "oMLX": "", "OptiQ": "", "Tencent Cloud Copilot": "", "Google ADK": "", "claude-obsidian-ecosystem-research": "", "Ollama Official Documentation": "", "Claude Code + Ollama Tutorial": "", "Claude Code + LM Studio Tutorial": "", "oMLX Tutorial": "", "OptiQ Tutorial": "", "5 Agent Skill Design Patterns": "", "Google OKF 2026": "", "刺猬星球-镜头角度电影感": ""};

function renderTree() {
    const el = document.getElementById('tree');
    let html = '';
    let totalItems = 0;
    treeData.forEach(cat => {
        html += `<div class="nav-group-title collapsed" onclick="toggleCat(this)">${cat.category}</div>`;
        html += `<div class="cat-items collapsed" id="cat-${cat.category}">`;
        
        cat.subcategories.forEach(sub => {
            html += `<div class="nav-sub-title collapsed" onclick="toggleSub(this)">${sub.name}</div>`;
            html += `<div class="sub-items collapsed" id="sub-${sub.name}">`;
            sub.items.forEach(item => {
                html += `<div class="nav-item" onclick="showDetail('${item.name}', this)" data-name="${item.name}">${item.name}</div>`;
                totalItems++;
            });
            html += `</div>`;
        });
        
        cat.standalone.forEach(item => {
            html += `<div class="nav-item" onclick="showDetail('${item.name}', this)" data-name="${item.name}">${item.name}</div>`;
            totalItems++;
        });
        html += `</div>`;
    });
    el.innerHTML = html;
    document.getElementById('stats').textContent = `INDEXED: ${totalItems} NODES`;
}

function toggleCat(el) { el.classList.toggle('collapsed'); el.nextElementSibling.classList.toggle('collapsed'); }
function toggleSub(el) { el.classList.toggle('collapsed'); el.nextElementSibling.classList.toggle('collapsed'); }

function showOverview() {
    document.querySelectorAll('.nav-item.active').forEach(e => e.classList.remove('active'));
    
    let html = `<h1 class="article-title">System Overview</h1>
                <div class="article-meta"><span>ROOT DIRECTORY</span></div>
                <div class="overview-grid">`;
                
    treeData.forEach(cat => {
        const count = cat.subcategories.reduce((s, sub) => s + sub.items.length, 0) + cat.standalone.length;
        const subNames = cat.subcategories.map(s => s.name).join(' / ') || 'General Nodes';
        html += `<div class="overview-card" onclick="showCategory('${cat.category}')">
            <div class="count">${count}</div>
            <h2>${cat.category}</h2>
            <div class="sub-desc">${subNames}</div>
        </div>`;
    });
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
}

function showCategory(catName) {
    const cat = treeData.find(c => c.category === catName);
    if (!cat) return;
    
    let html = `<h1 class="article-title">${catName}</h1>
                <div class="article-meta"><span>CATEGORY VIEW</span></div>
                <div class="article-body">`;
                
    cat.subcategories.forEach(sub => {
        html += `<h3>${sub.name}</h3><ul>`;
        sub.items.forEach(item => {
            html += `<li><a href="#" onclick="showDetail('${item.name}'); return false;">${item.name}</a> <span style="color:var(--color-text-muted);font-size:14px;">— ${item.desc}</span></li>`;
        });
        html += `</ul>`;
    });
    
    if (cat.standalone.length > 0) {
        html += `<h3>General Items</h3><ul>`;
        cat.standalone.forEach(item => {
            html += `<li><a href="#" onclick="showDetail('${item.name}'); return false;">${item.name}</a> <span style="color:var(--color-text-muted);font-size:14px;">— ${item.desc}</span></li>`;
        });
        html += `</ul>`;
    }
    
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
}

function showDetail(name, el) {
    document.querySelectorAll('.nav-item.active').forEach(e => e.classList.remove('active'));
    if (el) el.classList.add('active');
    
    const sidebarItem = document.querySelector(`.nav-item[data-name="${name}"]`);
    if (sidebarItem) {
        sidebarItem.classList.add('active');
        // 展开所在分类和子分类
        let parent = sidebarItem.parentElement;
        while (parent) {
            if (parent.classList.contains('cat-items') || parent.classList.contains('sub-items')) {
                parent.classList.remove('collapsed');
            }
            if (parent.previousElementSibling && (parent.previousElementSibling.classList.contains('nav-group-title') || parent.previousElementSibling.classList.contains('nav-sub-title'))) {
                parent.previousElementSibling.classList.remove('collapsed');
            }
            parent = parent.parentElement;
        }
        // 滚动到侧边栏可见
        sidebarItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    const meta = pagesMeta[name] || {};
    const htmlContent = bodyHtml[name] || '<p>Content not found.</p>';
    const statusHtml = meta.status ? `<span class="status-badge">STATUS: ${meta.status}</span>` : '';
    
    document.getElementById('content-area').innerHTML = `
        <h1 class="article-title">${name}</h1>
        <div class="article-meta">
            ${statusHtml}
            <span>KNOWLEDGE NODE</span>
        </div>
        <div class="article-body">
            ${htmlContent}
        </div>
    `;
    
    document.querySelectorAll('.wiki-link').forEach(a => {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            showDetail(this.dataset.name);
        });
    });
}

renderTree();

// ── Fuse.js 搜索索引 ──
const fuseItems = [];
treeData.forEach(cat => {
    const allItems = [];
    cat.subcategories.forEach(sub => sub.items.forEach(it => allItems.push(it)));
    cat.standalone.forEach(it => allItems.push(it));
    allItems.forEach(item => {
        const bodyText = (bodyHtml[item.name] || '').replace(/<[^>]+>/g, '');
        fuseItems.push({ name: item.name, desc: item.desc, body: bodyText });
    });
});
const fuse = new Fuse(fuseItems, {
    keys: [
        { name: 'name', weight: 10 },
        { name: 'desc', weight: 3 },
        { name: 'body', weight: 1 }
    ],
    threshold: 0.4,
    includeScore: true
});

let searchTimer = null;
function onSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const q = document.getElementById('search').value.trim();
        if (!q) { showOverview(); return; }
        const results = fuse.search(q);
        let html = `<h1 class="article-title">Search Results</h1>
                    <div class="article-meta"><span>${results.length} RESULTS FOR "${q.toUpperCase()}"</span></div>
                    <div class="article-body">`;
        results.forEach(r => {
            const item = r.item;
            html += `<div class="search-result-item" onclick="showDetail('${item.name}')">
                <div class="search-result-title">${item.name}</div>
                <div class="search-result-desc">${item.desc}</div>
            </div>`;
        });
        html += '</div>';
        document.getElementById('content-area').innerHTML = html;
        document.querySelectorAll('.nav-item.active').forEach(e => e.classList.remove('active'));
    }, 200);
}

showOverview();
</script>
