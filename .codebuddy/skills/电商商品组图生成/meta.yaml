desc-en: "For producing platform-compliant e-commerce image sets when a real product photo is on hand. Takes a raw studio or phone shot of the product as input. Produces a coherent set of hero, white-background, lifestyle, on-model, macro detail, multi-angle, SKU swatch and PDP images for Amazon, Shopify, TikTok Shop, Taobao, Tmall and similar e-commerce platforms with automatic background and lighting optimization."
desc-cn: "适用于已有商品实拍照、需要批量上架或制作详情页的电商场景。输入商品原始实拍图(棚拍或手机随拍),输出主图、白底图、场景图、模特图、微距细节、多角度展示、SKU 色卡、详情页配图等成套商品图。自动优化背景与光线,适配 Amazon、Shopify、TikTok Shop、淘宝、天猫等主流电商平台规格。"
