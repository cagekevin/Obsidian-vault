display-name-zh: 线控轨迹运镜
version: 0.1.7
tag-en: "Visual Production / Prompt Engineering"
tag-cn: "视觉创作 / 提示词工程"
summary-en: "Path-Guided Camera Move turns clean and route-marked references into I2V prompt markdown."
summary-cn: "线控轨迹运镜提示词"
desc-en: "Path-Guided Camera Move converts two related images into a structured image-to-video prompt markdown: one clean visual reference and one red-arrow director route map. It analyzes the marked path, decides whether the route belongs to a moving subject or an FPV drone-like camera move, and adds synchronized real sound effects while strictly forbidding BGM or music."
desc-cn: "线控轨迹运镜将一张干净视觉参考图和一张红色箭头导演路线图，整理成固定格式的图生视频 Prompt Markdown。它会分析路线起点、经过节点、方向和终点；有主体时写主体运动与 FPV 跟随，无主体时写 FPV 无人机视角，并加入同步真实音效，严格禁止 BGM。"
author-en: "MiniMax Hub"
author-cn: "MiniMax Hub"
