desc-en: "For static poster design across 12 subtypes including Xiaohongshu cover, WeChat header, vertical story, film poster, music festival poster, magazine cover, book cover, album cover, ad banner, promo poster and Weibo banner formats. Takes design requirements and content brief as input. Produces a finished static poster evaluated and refined through a 5-module 19-item weighted rubric scoring system."
desc-cn: "适用于静态海报设计,覆盖 12 种子类型:小红书封面、公众号头图、Story 竖屏海报、电影海报、音乐节海报、杂志封面、书籍封面、专辑封面、广告横幅 banner、促销海报、微博 banner 等。输入设计需求与内容简报,输出成品静态海报。通过 5 模块 19 项加权评分体系进行质量评估与迭代打磨,确保设计产出的专业水准。"
