summary-en: "Audit skill quality and structure"
summary-cn: "审查Skill的质量与结构"
desc-en: "For auditing the quality and structure of an existing skill before publishing to the skill market. Takes a SKILL.md file or skill directory as input material. Produces a read-only quality report covering structure compliance, description quality assessment, trigger-word coverage analysis and best-practice conformance. Delivers an overall score with prioritized improvement suggestions for reaching publication standards."
desc-cn: "适用于发布前对已写好的 Skill 做质量审查的场景,确保达到上架标准。输入 SKILL.md 文件或 skill 目录,输出只读的质量审查报告。报告覆盖结构合规性检查、描述质量评估、触发词覆盖度分析、最佳实践合规性校验,并给出综合评分与优先级排序的改进建议,帮助作者高效提升 Skill 质量。"
