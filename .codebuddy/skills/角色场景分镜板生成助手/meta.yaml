summary-en: "Comprehensive design sheet from refs and script"
summary-cn: "由参考图与剧本生成综合设定图"
desc-en: "For pre-production comprehensive design sheets combining character, scene and storyboard on a single image canvas. Takes 1-4 character reference images plus a script or scene description as input. Produces a single design-document image with character sheets including turnaround and expression views, main scene concept art and a default 12-panel storyboard grid. Supports six visual styles for flexible art direction."
desc-cn: "适用于影视前期制作中将角色、场景、分镜整合到一张图上的综合设定文档。输入 1 至 4 张角色参考图与剧本或场景描述,输出单张专业设计文档图,包含角色三视图加立绘加表情集、主场景概念图、默认 12 格分镜故事板。提供 6 种视觉风格供灵活选择,满足不同美术方向的前期制作需求。"
